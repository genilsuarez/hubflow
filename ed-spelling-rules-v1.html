<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>-ed Spelling Rules v1</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#FF6B6B;    --red-light:#FFECEC;   --red-dark:#CC3333;
  --blue:#4A90D9;   --blue-light:#E4F0FF;  --blue-dark:#1B5EA8;
  --green:#3DBE7A;  --green-light:#E2FAF0; --green-dark:#1E7A48;
  --bg:#F7F9FC; --text:#1A2233; --muted:#8A94A6;
  --surface:#FFFFFF; --border:#E3E9F2;
}
[data-theme="dark"]{
  --bg:#12141F; --text:#E8E4F0; --muted:#7B7B9D;
  --surface:#1C1F30; --border:#2E3250;
  --red-light:#3D1A1A; --blue-light:#162040; --green-light:#122E1E;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);font-family:'Manrope',sans-serif;color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  transition:background .3s,color .3s;
}
@media(max-width:480px){
  html,body{overflow:auto;height:auto;min-height:100%;}
  body{min-height:100dvh;}
}

/* BACK + THEME BAR */
.top-bar{
  width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;
  padding:3px 14px 0;flex-shrink:0;
}
.back-link{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:.85rem;
  color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:4px;
  transition:opacity .2s;
}
.back-link:hover{opacity:.7;}
.theme-toggle{
  background:var(--surface);border:2px solid var(--border);border-radius:50px;
  padding:4px 10px;font-size:.75rem;cursor:pointer;color:var(--text);
  font-family:'Manrope',sans-serif;font-weight:700;transition:all .2s;
}
.theme-toggle:hover{border-color:var(--blue);}

/* HAMBURGER MENU — SIDEBAR */
.menu-toggle{
  background:none;border:none;cursor:pointer;font-size:1.3rem;
  color:var(--text);padding:4px;line-height:1;
  transition:transform .2s;
}
.menu-toggle:hover{transform:scale(1.1);}

.menu-overlay{
  display:none;position:fixed;inset:0;z-index:199;
  background:rgba(0,0,0,.4);
  opacity:0;transition:opacity .3s ease;
}
.menu-overlay.show{display:block;opacity:1;}

.menu-panel{
  position:fixed;top:0;left:0;bottom:0;
  width:260px;max-width:80vw;
  background:var(--surface);
  box-shadow:4px 0 30px rgba(0,0,0,.15);
  z-index:200;
  display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.menu-panel.show{transform:translateX(0);}

.menu-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 12px 8px;border-bottom:1.5px solid var(--border);
}
.menu-title{
  font-family:'Manrope',sans-serif;font-weight:800;font-size:.85rem;
  color:var(--text);display:flex;align-items:center;gap:5px;
}
.menu-close{
  background:none;border:none;cursor:pointer;
  font-size:1.2rem;color:var(--muted);padding:4px;
  border-radius:8px;transition:background .2s,color .2s;line-height:1;
}
.menu-close:hover{background:var(--border);color:var(--text);}

.menu-nav{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;
  gap:1px;padding:6px 8px;
}
.menu-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:8px;border:none;
  background:transparent;cursor:pointer;
  font-family:'Manrope',sans-serif;font-size:.76rem;font-weight:700;
  color:var(--text);transition:background .15s;
  width:100%;text-align:left;
}
.menu-item:hover{background:var(--border);}
.menu-item.active{background:var(--blue-light);color:var(--blue);}
[data-theme="dark"] .menu-item.active{color:#7AC7FF;}
.menu-item.locked{opacity:.45;cursor:not-allowed;}
.menu-item.locked::after{content:'🔒';margin-left:auto;font-size:.7rem;}
.menu-item-icon{font-size:.85rem;width:18px;text-align:center;flex-shrink:0;}
.menu-item .menu-val{margin-left:auto;color:var(--blue);font-weight:800;font-size:.72rem;}

.menu-divider{
  height:1px;background:var(--border);margin:3px 10px;
}
.menu-section-label{
  font-family:'Manrope',sans-serif;font-size:.55rem;font-weight:800;
  color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
  padding:3px 10px 1px;
}

.menu-footer{
  padding:8px 12px;border-top:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:.6rem;color:var(--muted);font-weight:700;
}

/* RULES — compact mini in menu */
.menu-rules-mini{
  display:flex;gap:3px;padding:2px 10px 4px;
}
.mini-rule{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;
  font-size:.55rem;font-weight:700;padding:3px 4px;
  border-radius:6px;border:1.5px solid transparent;text-align:center;
}
.mini-rule.red{background:var(--red-light);border-color:var(--red);color:var(--red-dark);}
.mini-rule.blue{background:var(--blue-light);border-color:var(--blue);color:var(--blue-dark);}
.mini-rule.green{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
[data-theme="dark"] .mini-rule.red{color:#FF9F9F;}
[data-theme="dark"] .mini-rule.blue{color:#7AC7FF;}
[data-theme="dark"] .mini-rule.green{color:#6FE8A8;}

/* FIXED HEADER */
.header{
  width:100%;max-width:760px;
  padding:3px 14px 3px;
  background:var(--bg);
  border-bottom:2px solid var(--border);
  flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  z-index:10;
  transition:background .3s;
}
@media(max-width:480px){
  .header{position:sticky;top:0;padding:2px 10px;}
  .top-bar{padding:2px 10px 0;}
}

/* TITLE */
.header-row{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;
}
h1{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:clamp(.85rem,2.8vw,1.2rem);
  margin-bottom:0;line-height:1.2;color:var(--text);
  display:flex;align-items:center;gap:6px;
}
.h1-suffix{
  font-family:'JetBrains Mono',monospace;font-weight:700;
  color:var(--blue);letter-spacing:-.02em;
}
.h1-label{font-weight:600;color:var(--muted);font-size:.88em;}
.ver-chip{
  font-family:'Manrope',sans-serif;font-size:.58em;font-weight:800;
  background:#EAF1FB;color:var(--blue);
  border-radius:5px;padding:1px 6px;letter-spacing:.02em;
  line-height:1.6;flex-shrink:0;
}
.header-badge{
  display:flex;align-items:center;gap:3px;
  font-family:'Manrope',sans-serif;font-size:.7rem;font-weight:700;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:50px;padding:2px 8px;color:var(--muted);
}
.badge-icon{font-size:.75rem;}
.badge-val{color:var(--text);font-weight:800;}

/* MODE TOGGLE */
.mode-bar{
  display:flex;background:var(--surface);border-radius:50px;padding:2px;gap:1px;
  box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:3px;
  border:2px solid var(--border);
}
.mode-btn{
  flex:1;font-family:'Manrope',sans-serif;font-size:.8rem;font-weight:700;
  padding:4px;border-radius:50px;border:none;cursor:pointer;
  transition:all .22s;color:var(--muted);background:transparent;
}
.mode-btn.active.study    {background:var(--blue);color:#fff;box-shadow:0 3px 10px rgba(74,144,217,.4);}
.mode-btn.active.challenge{background:linear-gradient(135deg,var(--red),#FF9F6B);color:#fff;box-shadow:0 3px 10px rgba(255,107,107,.4);}
.mode-btn.active.timed    {background:linear-gradient(135deg,#F7C948,#FF9F6B);color:#fff;box-shadow:0 3px 10px rgba(247,201,72,.4);}
.mode-btn.active.reverse  {background:linear-gradient(135deg,#9B59B6,#C97FE8);color:#fff;box-shadow:0 3px 10px rgba(155,89,182,.4);}
@media(max-width:480px){
  .mode-bar{margin-bottom:3px;padding:2px;}
  .mode-btn{font-size:.68rem;padding:3px;}
}

/* TIMER */
.timer-bar{
  display:none;align-items:center;justify-content:center;gap:8px;margin-bottom:2px;
}
.timer-bar.show{display:flex;}
.timer-display{
  font-family:'Manrope',sans-serif;font-weight:800;font-size:1.1rem;
  color:var(--red);min-width:50px;text-align:center;
}
.timer-display.warn{animation:pulse .5s infinite alternate;}
@keyframes pulse{from{opacity:1}to{opacity:.4}}

/* STREAK */
.streak-bar{
  display:none;align-items:center;justify-content:center;gap:4px;margin-bottom:2px;
  font-family:'Manrope',sans-serif;font-weight:700;font-size:.8rem;color:var(--green-dark);
  animation:popIn .3s ease;
}
.streak-bar.show{display:flex;}

/* LIVES (God Mode) */
.lives-bar{
  display:none;align-items:center;justify-content:center;gap:4px;margin-bottom:2px;
  font-family:'Manrope',sans-serif;font-weight:700;font-size:.8rem;color:var(--red-dark);
}
.lives-bar.show{display:flex;}
[data-theme="dark"] .lives-bar{color:#FF9F9F;}

/* PROGRESS */
.prog-wrap{margin-bottom:0;}
.prog-labels{display:flex;justify-content:space-between;font-family:'Manrope',sans-serif;font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:2px;}
.prog-track{height:5px;background:var(--border);border-radius:50px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:50px;transition:width .5s cubic-bezier(.34,1.2,.64,1);width:0%;}

/* SCROLLABLE BODY */
.scroll-body{
  width:100%;max-width:760px;
  flex:1;overflow-y:auto;
  padding:5px 14px 16px;
  -webkit-overflow-scrolling:touch;
}
@media(max-width:480px){
  .scroll-body{flex:none;overflow-y:visible;padding:8px 10px 40px;}
}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px;align-items:start;}
@media(max-width:500px){.grid{grid-template-columns:repeat(2,1fr);gap:5px;}}
@media(max-width:360px){.grid{grid-template-columns:repeat(2,1fr);gap:4px;}}

/* BUTTONS */
.btn-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px;margin-bottom:6px;}

/* HEART CARD */
.hcard{
  display:grid;
  align-items:center;justify-items:center;
  gap:1px;animation:popIn .4s ease both;
}
.hcard:nth-child(1){animation-delay:.03s}.hcard:nth-child(2){animation-delay:.06s}
.hcard:nth-child(3){animation-delay:.09s}.hcard:nth-child(4){animation-delay:.12s}
.hcard:nth-child(5){animation-delay:.15s}.hcard:nth-child(6){animation-delay:.18s}
.hcard:nth-child(7){animation-delay:.21s}.hcard:nth-child(8){animation-delay:.24s}
.hcard:nth-child(9){animation-delay:.27s}.hcard:nth-child(10){animation-delay:.30s}
.hcard:nth-child(11){animation-delay:.33s}.hcard:nth-child(12){animation-delay:.36s}
.hcard:nth-child(13){animation-delay:.39s}.hcard:nth-child(14){animation-delay:.42s}
.hcard:nth-child(15){animation-delay:.45s}.hcard:nth-child(16){animation-delay:.48s}

/* THE HEART BUTTON */
.hbtn{
  position:relative;width:100%;padding-bottom:46%;
  background:none;border:none;cursor:pointer;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;outline:none;
}
.hbtn:hover:not(.done):not(.chal){transform:scale(1.08) rotate(-2deg);}
.hbtn:active{transform:scale(.95);}
.hbtn.chal{cursor:text;}
.hbtn.chal:hover{transform:scale(1.04);}
.hbtn.done{cursor:default;}
.hsvg{position:absolute;inset:0;width:100%;height:100%;}
.hpath{transition:fill .35s,stroke .35s;}
.hinner{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;padding:13% 9% 15%;pointer-events:none;
}
.verb{
  font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:clamp(.65rem,2.5vw,.88rem);color:var(--text);line-height:1;white-space:nowrap;
}
[data-theme="dark"] .verb{color:#fff;}
.ans{
  font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:clamp(.58rem,2vw,.76rem);
  opacity:0;transition:opacity .35s;white-space:nowrap;margin-top:0px;
}
.hbtn.done .ans{opacity:1;}
.hbtn.done.rule-red   .ans{color:var(--red-dark);}
.hbtn.done.rule-blue  .ans{color:var(--blue-dark);}
.hbtn.done.rule-green .ans{color:var(--green-dark);}
[data-theme="dark"] .hbtn.done.rule-red   .ans{color:#FF9F9F;}
[data-theme="dark"] .hbtn.done.rule-blue  .ans{color:#7AC7FF;}
[data-theme="dark"] .hbtn.done.rule-green .ans{color:#6FE8A8;}

/* EXPLANATION TOOLTIP */
.explanation{
  font-size:.6rem;font-weight:700;color:var(--muted);text-align:center;
  width:100%;line-height:1.2;
  display:none;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.heart-wrap:has(.hbtn.done)~.explanation{
  display:-webkit-box;
  animation:fadeIn .3s ease;
}

/* AUDIO BUTTON — floats inside heart-wrap */
.heart-wrap{position:relative;width:100%;}
.audio-btn{
  position:absolute;top:8%;right:8%;
  background:none;border:none;cursor:pointer;font-size:.72rem;
  opacity:.45;transition:opacity .2s,transform .2s;padding:0;line-height:1;
  pointer-events:auto;
}
.audio-btn:hover{opacity:1;transform:scale(1.2);}

/* CHALLENGE INPUT */
.cinput-wrap{display:none;flex-direction:column;align-items:center;gap:1px;width:100%;justify-self:stretch;}
.cinput-wrap.show{display:flex;}
.cinput{
  width:100%;font-family:'JetBrains Mono',monospace;font-size:clamp(.72rem,2.6vw,.88rem);
  font-weight:600;text-align:center;
  border:2px solid var(--border);border-radius:12px;
  padding:2px 5px;background:var(--surface);color:var(--text);
  outline:none;transition:border-color .2s,background .2s,box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
  -webkit-appearance:none;appearance:none;
}
@media(max-width:480px){.cinput{font-size:.75rem;padding:4px 4px;border-radius:10px;}}
.cinput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(74,144,217,.2);}
.cinput.ok   {border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
.cinput.wrong{border-color:var(--red);  background:var(--red-light);  color:var(--red-dark);animation:shake .32s;}
.cinput:disabled{opacity:1;cursor:default;}
.cinput::placeholder{color:var(--muted);}
[data-theme="dark"] .cinput.ok{color:#6FE8A8;}
[data-theme="dark"] .cinput.wrong{color:#FF9F9F;}
.cfeedback{font-size:1rem;line-height:1;text-align:center;}
.chint{font-size:.68rem;font-weight:800;color:var(--red-dark);text-align:center;line-height:1.2;}

/* COLOR PICKER */
.cpicker{
  display:none;flex-direction:row;align-items:center;justify-content:center;gap:6px;width:100%;
  background:var(--surface);border:2px solid var(--border);border-radius:50px;padding:2px 8px;
  justify-self:stretch;
}
.cpicker.show{display:flex;}
.cpicker-row{display:flex;gap:6px;}
.cb{
  width:22px;height:22px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:transform .18s,box-shadow .18s;
  -webkit-tap-highlight-color:transparent;
}
@media(max-width:480px){
  .cpicker{padding:3px 6px;gap:4px;border-radius:30px;}
  .cpicker-row{gap:5px;}
  .cb{width:20px;height:20px;border-width:2.5px;}
}
.cb:hover{transform:scale(1.22);}
.cb.r{background:var(--red);}
.cb.b{background:var(--blue);}
.cb.g{background:var(--green);}
.cb.picked    {border-color:var(--text);transform:scale(1.18);box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--text);}
.cb.correct-c {border-color:var(--green-dark)!important;box-shadow:0 0 0 2px var(--green)!important;}
.cb.wrong-c   {border-color:var(--red-dark)  !important;box-shadow:0 0 0 2px var(--red)  !important;}
.cresult{font-size:.68rem;font-weight:800;color:var(--muted);text-align:center;line-height:1.2;}

/* BUTTONS */
.btn{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:.9rem;
  padding:7px 20px;border-radius:50px;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  display:flex;align-items:center;gap:5px;
}
@media(max-width:480px){.btn{font-size:.8rem;padding:6px 14px;}}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(.97);}
.btn-blue  {background:linear-gradient(135deg,#4A90D9,#7AC7FF);color:#fff;box-shadow:0 5px 18px rgba(74,144,217,.32);}
.btn-green {background:linear-gradient(135deg,var(--green),#6FE8A8);color:#fff;box-shadow:0 5px 18px rgba(61,190,122,.32);}
.btn-red   {background:linear-gradient(135deg,var(--red),#FF9F6B);  color:#fff;box-shadow:0 5px 18px rgba(255,107,107,.32);}
.btn-yellow{background:linear-gradient(135deg,#F7C948,#FFD56B);color:#fff;box-shadow:0 5px 18px rgba(247,201,72,.32);}
.btn-ghost {background:var(--surface);border:2.5px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--blue);}

/* SCORE */
.score{
  display:none;text-align:center;border-radius:16px;padding:10px 18px;margin-top:8px;
  font-family:'Manrope',sans-serif;font-weight:700;font-size:.9rem;
  animation:popIn .4s ease;
}
.score.great{background:var(--green-light);border:2px solid var(--green);color:var(--green-dark);}
.score.ok   {background:#FFFBEA;border:2px solid #ECC94B;color:#7B621A;}
.score.try  {background:var(--red-light);  border:2px solid var(--red);  color:var(--red-dark);}

/* CONFETTI CANVAS */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;}

/* STARS OVERLAY */
.stars-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.45);animation:fadeIn .3s ease;
}
.stars-overlay.show{display:flex;}
.stars-box{
  background:var(--surface);border-radius:28px;padding:32px 40px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
  max-width:380px;width:90%;
}
@media(max-width:480px){
  .stars-box{padding:24px 20px;border-radius:20px;max-width:300px;}
  .stars-title{font-size:1.2rem;}
  .stars-sub{font-size:.8rem;}
  .star{font-size:2.2rem;}
}
.stars-row{display:flex;justify-content:center;gap:8px;margin:12px 0 6px;}
.star{font-size:2.8rem;opacity:.25;transition:opacity .3s,transform .3s;}
.star.lit{opacity:1;transform:scale(1.15);}
.stars-title{font-family:'Manrope',sans-serif;font-weight:800;font-size:1.5rem;margin-bottom:4px;color:var(--text);}
.stars-sub{font-size:.9rem;color:var(--muted);font-weight:700;margin-bottom:16px;}
.stars-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* HISTORY — in sidebar */
.history-list{padding:0 10px 2px;font-family:'Manrope',sans-serif;font-size:.63rem;}
.history-entry{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border);}
.history-entry:last-child{border:none;}
.history-entry .date{color:var(--muted);}
.history-entry .pct{font-weight:800;}
.history-entry .pct.great{color:var(--green-dark);}
.history-entry .pct.ok{color:#7B621A;}
.history-entry .pct.try{color:var(--red-dark);}
[data-theme="dark"] .history-entry .pct.great{color:#6FE8A8;}
[data-theme="dark"] .history-entry .pct.ok{color:#F7C948;}
[data-theme="dark"] .history-entry .pct.try{color:#FF9F9F;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}
@keyframes boing{0%,100%{transform:scale(1)}40%{transform:scale(1.15) rotate(-4deg)}70%{transform:scale(.97)}}
.boing{animation:boing .38s ease;}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- STARS OVERLAY -->
<div class="stars-overlay" id="starsOverlay" role="dialog" aria-label="Results">
  <div class="stars-box">
    <div class="stars-row">
      <span class="star" id="star1" aria-hidden="true">⭐</span>
      <span class="star" id="star2" aria-hidden="true">⭐</span>

<script>
/* ══════════════════════════════════════════════════════
   WORD SETS BY LEVEL
   Rules:
     red   = just add -ed
     blue  = drop silent -e (or -y → -ied) + add -ed
     green = double last consonant + add -ed
   ══════════════════════════════════════════════════════ */
const LEVELS={
  beginner:[
    {verb:"walk",  ans:"walked",   rule:"red",   why:"Ends in two consonants → just add -ed"},
    {verb:"play",  ans:"played",   rule:"red",   why:"Ends in vowel+y → just add -ed"},
    {verb:"cook",  ans:"cooked",   rule:"red",   why:"Two vowels before consonant → just add -ed"},
    {verb:"watch", ans:"watched",  rule:"red",   why:"Ends in two consonants → just add -ed"},
    {verb:"wait",  ans:"waited",   rule:"red",   why:"Ends in vowel+t → just add -ed"},
    {verb:"talk",  ans:"talked",   rule:"red",   why:"Ends in two consonants → just add -ed"},
    {verb:"dance", ans:"danced",   rule:"blue",  why:"Silent 'e' at end → drop it, add -ed"},
    {verb:"smile", ans:"smiled",   rule:"blue",  why:"Silent 'e' at end → drop it, add -ed"},
    {verb:"love",  ans:"loved",    rule:"blue",  why:"Silent 'e' at end → drop it, add -ed"},
    {verb:"hope",  ans:"hoped",    rule:"blue",  why:"Silent 'e' at end → drop it, add -ed"},
    {verb:"stop",  ans:"stopped",  rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"plan",  ans:"planned",  rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"drop",  ans:"dropped",  rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"hug",   ans:"hugged",   rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"skip",  ans:"skipped",  rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"clap",  ans:"clapped",  rule:"green", why:"Short vowel + single consonant → double it"},
  ],
  intermediate:[
    {verb:"prefer",  ans:"preferred",  rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"admit",   ans:"admitted",   rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"commit",  ans:"committed",  rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"regret",  ans:"regretted",  rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"permit",  ans:"permitted",  rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"occur",   ans:"occurred",   rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"listen",  ans:"listened",   rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"happen",  ans:"happened",   rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"visit",   ans:"visited",    rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"open",    ans:"opened",     rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"offer",   ans:"offered",    rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"enter",   ans:"entered",    rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"arrive",  ans:"arrived",    rule:"blue",  why:"Silent 'e' at end → drop it, add -ed"},
    {verb:"escape",  ans:"escaped",    rule:"blue",  why:"Silent 'e' at end → drop it, add -ed"},
    {verb:"invite",  ans:"invited",    rule:"blue",  why:"Silent 'e' at end → drop it, add -ed"},
    {verb:"create",  ans:"created",    rule:"blue",  why:"Silent 'e' at end → drop it, add -ed"},
  ],
  exceptions:[
    // -x: looks like CVC but x = /ks/ (two sounds) → don't double
    {verb:"fix",    ans:"fixed",     rule:"red",   why:"Exception: 'x' = two sounds /ks/ → don't double, just add -ed"},
    {verb:"relax",  ans:"relaxed",   rule:"red",   why:"Exception: 'x' = /ks/ → just add -ed (no doubling)"},
    {verb:"mix",    ans:"mixed",     rule:"red",   why:"Exception: 'x' = two sounds → don't double"},
    // consonant+y → y→i, add -ed
    {verb:"carry",  ans:"carried",   rule:"blue",  why:"Exception: consonant+y → change y to i, add -ed"},
    {verb:"study",  ans:"studied",   rule:"blue",  why:"Exception: consonant+y → change y to i, add -ed"},
    {verb:"try",    ans:"tried",     rule:"blue",  why:"Exception: consonant+y → change y to i, add -ed"},
    {verb:"worry",  ans:"worried",   rule:"blue",  why:"Exception: consonant+y → change y to i, add -ed"},
    {verb:"hurry",  ans:"hurried",   rule:"blue",  why:"Exception: consonant+y → change y to i, add -ed"},
    // vowel+y stays unchanged (trap next to the above!)
    {verb:"enjoy",  ans:"enjoyed",   rule:"red",   why:"Vowel+y → just add -ed (the y does NOT change!)"},
    {verb:"delay",  ans:"delayed",   rule:"red",   why:"Vowel+y → just add -ed (y stays when after a vowel)"},
    // -c → add k before -ed to keep hard /k/ sound
    {verb:"panic",  ans:"panicked",  rule:"green", why:"Exception: add 'k' before -ed to keep the hard /k/ sound"},
    {verb:"mimic",  ans:"mimicked",  rule:"green", why:"Exception: add 'k' before -ed to keep the hard /k/ sound"},
    {verb:"picnic", ans:"picnicked", rule:"green", why:"Exception: add 'k' before -ed to keep the hard /k/ sound"},
    // British -l doubling
    {verb:"travel", ans:"travelled", rule:"green", why:"British English: double -l even when stress is on first syllable"},
    // -w endings: look like CVC but w is part of a diphthong
    {verb:"show",   ans:"showed",    rule:"red",   why:"Ends in -w → just add -ed (w is never doubled)"},
    {verb:"allow",  ans:"allowed",   rule:"red",   why:"Ends in -ow → just add -ed (-w ends a diphthong, not a consonant)"},
  ],
  god:[
    // consonant+y → -ied (must change y)
    {verb:"deny",     ans:"denied",     rule:"blue",  why:"consonant+y → y→i + -ed"},
    {verb:"apply",    ans:"applied",    rule:"blue",  why:"consonant+y → y→i + -ed"},
    {verb:"bury",     ans:"buried",     rule:"blue",  why:"consonant+y → y→i + -ed"},
    {verb:"envy",     ans:"envied",     rule:"blue",  why:"consonant+y → y→i + -ed"},
    // vowel+y stays → trap right next to above!
    {verb:"convey",   ans:"conveyed",   rule:"red",   why:"vowel+y (ey) → just add -ed"},
    {verb:"destroy",  ans:"destroyed",  rule:"red",   why:"vowel+y (oy) → just add -ed"},
    {verb:"survey",   ans:"surveyed",   rule:"red",   why:"vowel+y (ey) → just add -ed"},
    // -c → add k before -ed
    {verb:"frolic",   ans:"frolicked",  rule:"green", why:"Add -k before -ed to keep hard /k/ sound"},
    {verb:"traffic",  ans:"trafficked", rule:"green", why:"Add -k before -ed to keep hard /k/ sound"},
    {verb:"picnic",   ans:"picnicked",  rule:"green", why:"Add -k before -ed to keep hard /k/ sound"},
    // -x / -w: look like CVC but DON'T double
    {verb:"tax",      ans:"taxed",      rule:"red",   why:"-x = /ks/ two sounds → don't double"},
    {verb:"box",      ans:"boxed",      rule:"red",   why:"-x = /ks/ → no doubling"},
    {verb:"follow",   ans:"followed",   rule:"red",   why:"-w ends diphthong → don't double"},
    // CVC doubling with stress on LAST syllable
    {verb:"refer",    ans:"referred",   rule:"green", why:"Stress on last syllable + CVC → double"},
    {verb:"regret",   ans:"regretted",  rule:"green", why:"Stress on last syllable + CVC → double"},
    {verb:"permit",   ans:"permitted",  rule:"green", why:"Stress on last syllable + CVC → double"},
    {verb:"equip",    ans:"equipped",   rule:"green", why:"'qu' = one sound — CVC stands → double the p"},
    // Stress on FIRST syllable = DON'T double (trap!)
    {verb:"benefit",  ans:"benefited",  rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"limit",    ans:"limited",    rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"target",   ans:"targeted",   rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"gossip",   ans:"gossiped",   rule:"red",   why:"Stress on FIRST syllable → don't double"},
    // Stress on FIRST but DOUBLES anyway (real exceptions!)
    {verb:"kidnap",   ans:"kidnapped",  rule:"green", why:"Exception: doubles despite first-syllable stress"},
    {verb:"format",   ans:"formatted",  rule:"green", why:"Exception: doubles despite first-syllable stress"},
    {verb:"worship",  ans:"worshipped", rule:"green", why:"Exception (UK): doubles despite first-syllable stress"},
    // British -l doubling (unstressed)
    {verb:"cancel",   ans:"cancelled",  rule:"green", why:"British: double -l even without main stress"},
    {verb:"model",    ans:"modelled",   rule:"green", why:"British: double -l even without main stress"},
    {verb:"label",    ans:"labelled",   rule:"green", why:"British: double -l even without main stress"},
    // -ie just add -d (contrast with -ing forms!)
    {verb:"die",      ans:"died",       rule:"blue",  why:"Ends in -e → just add -d (contrast: dying!)"},
    {verb:"tie",      ans:"tied",       rule:"blue",  why:"Ends in -e → just add -d (contrast: tying!)"},
    // Drop silent -e anchor
    {verb:"squeeze",  ans:"squeezed",   rule:"blue",  why:"Final -e merges → just add -d"},
  ],
};

const RC_LIGHT={
  red:  {idle:"#FFECEC",stroke:"#FF6B6B",active:"#FFCECE"},
  blue: {idle:"#E4F0FF",stroke:"#4A90D9",active:"#C2DCFF"},
  green:{idle:"#E2FAF0",stroke:"#3DBE7A",active:"#B8F0D6"},
};
const RC_DARK={
  red:  {idle:"#5c2a2a",stroke:"#FF6B6B",active:"#803030"},
  blue: {idle:"#1e3a5f",stroke:"#4A90D9",active:"#2a4f7a"},
  green:{idle:"#1e4a35",stroke:"#3DBE7A",active:"#2a5f45"},
};
const NEU_LIGHT={fill:"#F5F2EE",stroke:"#D5CCBF"};
const NEU_DARK={fill:"#2a2a4e",stroke:"#444470"};

function getRC(){ return document.documentElement.getAttribute("data-theme")==="dark"?RC_DARK:RC_LIGHT; }
function getNEU(){ return document.documentElement.getAttribute("data-theme")==="dark"?NEU_DARK:NEU_LIGHT; }
let RC=getRC(), NEU=getNEU();

let mode="study", level="beginner", st={}, words=[];
let streak=0, timerInterval=null, timeLeft=60;
let lives=3, livesEnabled=false, gameOver=false, bonusPts=0;

/* ══ STORAGE ══ */
const STORE_KEY="learnhub_ed_v1";
function loadStore(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY))||{}; }catch(e){ return {}; }
}
function saveStore(data){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

function getStats(){
  const s=loadStore();
  return {
    best: s.best||null,
    bestByLevel: s.bestByLevel||{},
    played: s.played||0,
    history: s.history||[],
    failedWords: s.failedWords||{},
    theme: s.theme||"light",
  };
}
function recordScore(pct){
  const s=loadStore();
  s.played=(s.played||0)+1;
  if(!s.best||pct>s.best) s.best=pct;
  if(!s.bestByLevel) s.bestByLevel={};
  if(!s.bestByLevel[level]||pct>s.bestByLevel[level]) s.bestByLevel[level]=pct;
  if(!s.history) s.history=[];
  s.history.unshift({date:new Date().toLocaleDateString(),pct,level,mode});
  if(s.history.length>10) s.history=s.history.slice(0,10);
  saveStore(s);
  renderStats();
  updateMenuChips();
}
function recordFail(verb){
  const s=loadStore();
  if(!s.failedWords) s.failedWords={};
  s.failedWords[verb]=(s.failedWords[verb]||0)+1;
  saveStore(s);
}
function renderStats(){
  const s=getStats();
  const lvlBest=s.bestByLevel[level];
  document.getElementById("bestScore").textContent=lvlBest?lvlBest+"%":"—";
  document.getElementById("timesPlayed").textContent=s.played;
  const badge=document.getElementById("headerBadge");
  if(s.best!==null){
    badge.style.display="flex";
    document.getElementById("headerLastScore").textContent=s.best+"%";
  }
  const list=document.getElementById("historyList");
  if(s.history&&s.history.length>0){
    list.innerHTML=s.history.slice(0,5).map(h=>{
      const cls=h.pct>=95?"great":h.pct>=75?"ok":"try";
      return `<div class="history-entry"><span class="date">${h.date} (${h.level||"—"})</span><span class="pct ${cls}">${h.pct}%</span></div>`;
    }).join("");
  } else {
    list.innerHTML='<div style="color:var(--muted);padding:4px 0;font-size:.7rem;">No games yet</div>';
  }
}

/* ══ THEME ══ */
function toggleTheme(){
  const s=loadStore();
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";
  if(isDark){
    document.documentElement.removeAttribute("data-theme");
    document.getElementById("themeToggle").innerHTML='<span class="menu-item-icon">🌙</span> Dark mode';
    s.theme="light";
  } else {
    document.documentElement.setAttribute("data-theme","dark");
    document.getElementById("themeToggle").innerHTML='<span class="menu-item-icon">☀️</span> Light mode';
    s.theme="dark";
  }
  saveStore(s);
  RC=getRC(); NEU=getNEU();
  build();
}
function applyTheme(){
  const s=getStats();
  if(s.theme==="light"){
    document.documentElement.removeAttribute("data-theme");
    document.getElementById("themeToggle").innerHTML='<span class="menu-item-icon">🌙</span> Dark mode';
  } else {
    document.documentElement.setAttribute("data-theme","dark");
    document.getElementById("themeToggle").innerHTML='<span class="menu-item-icon">☀️</span> Light mode';
  }
  RC=getRC(); NEU=getNEU();
}

/* ══ MENU ══ */
function toggleMenu(){
  document.getElementById("menuPanel").classList.add("show");
  document.getElementById("menuOverlay").classList.add("show");
}
function closeMenu(){
  document.getElementById("menuPanel").classList.remove("show");
  document.getElementById("menuOverlay").classList.remove("show");
}
function isUnlocked(l){
  const b=(loadStore().bestByLevel)||{};
  if(l==="exceptions") return (b.intermediate||0)>=75;
  if(l==="god") return (b.exceptions||0)>=75;
  return true;
}
function updateMenuChips(){
  ["beginner","intermediate","exceptions","god"].forEach(l=>{
    const el=document.getElementById("ml-"+l);
    if(!el) return;
    el.classList.toggle("active",l===level);
    el.classList.toggle("locked",!isUnlocked(l));
  });
}

/* ══ AUDIO ══ */
function speak(text){
  if(!("speechSynthesis" in window)) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=0.85;
  speechSynthesis.speak(u);
}

/* ══ HAPTIC ══ */
function vibrate(ms){
  if(navigator.vibrate) navigator.vibrate(ms);
}

/* ══ SHUFFLE (spaced repetition aware) ══ */
function shuffle(arr){
  const s=loadStore();
  const fails=s.failedWords||{};
  const weighted=[...arr].sort((a,b)=>(fails[b.verb]||0)-(fails[a.verb]||0));
  for(let i=weighted.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    if((fails[weighted[i].verb]||0)===(fails[weighted[j].verb]||0)){
      [weighted[i],weighted[j]]=[weighted[j],weighted[i]];
    }
  }
  return weighted;
}

/* ══ LEVEL ══ */
function setLevel(l){
  if(!isUnlocked(l)){ vibrate([50,30,50]); return; }
  level=l;
  updateMenuChips();
  renderStats();
  closeMenu();
  build();
}

/* ══ BUILD ══ */
function build(){
  stopTimer();
  words=shuffle(LEVELS[level]);
  const g=document.getElementById("grid");
  g.innerHTML=""; st={}; streak=0;
  gameOver=false; bonusPts=0;
  livesEnabled=(level==="god"&&mode!=="study");
  lives=3; renderLives();
  updateStreak();

  words.forEach((w,i)=>{
    st[i]={done:false,spelledOk:false,colorPicked:null,locked:false,attempts:0};
    const c=document.createElement("div");
    c.className="hcard";
    const isC=(mode==="challenge"||mode==="timed"||mode==="reverse");
    const shown=mode==="reverse"?w.ans:w.verb;
    const hidden=mode==="reverse"?w.verb:w.ans;
    const fill=isC?NEU.fill:RC[w.rule].idle;
    const stroke=isC?NEU.stroke:RC[w.rule].stroke;
    c.innerHTML=`
      <div class="heart-wrap">
        <button class="hbtn rule-${w.rule}${isC?" chal":""}" id="hb${i}" onclick="heartClick(${i})" aria-label="${w.verb}">
          <svg class="hsvg" viewBox="0 0 100 90">
            <path class="hpath" id="hp${i}"
              d="M50 85C50 85 5 52 5 27C5 13 16 4 28 4C37 4 46 10 50 18C54 10 63 4 72 4C84 4 95 13 95 27C95 52 50 85 50 85Z"
              fill="${fill}" stroke="${stroke}" stroke-width="3.5"/>
          </svg>
          <div class="hinner">
            <span class="verb">${shown}</span>
            <span class="ans" id="at${i}">${hidden}</span>
          </div>
        </button>
        <button class="audio-btn" onclick="speak('${w.verb}, ${w.ans}')" aria-label="Listen to ${w.verb}">🔊</button>
      </div>
      <span class="explanation" id="ex${i}">${w.why}</span>
      <div class="cinput-wrap${isC?" show":""}" id="cw${i}">
        <input class="cinput" id="ci${i}" type="text" placeholder="${mode==="reverse"?"base verb":"…ed"}"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          aria-label="${mode==="reverse"?"Type the base verb of "+w.ans:"Type the past tense of "+w.verb}"
          oninput="onType(${i})" onkeydown="if(event.key==='Enter'){event.preventDefault();trySpell(${i})}">
        <span class="cfeedback" id="cf${i}" role="alert" aria-live="polite"></span>
        <span class="chint" id="ch${i}"></span>
      </div>
      <div class="cpicker" id="cp${i}" role="group" aria-label="Pick the rule colour for ${w.verb}">
        <div class="cpicker-row">
          <button class="cb r" onclick="pickColor(${i},'red')"   aria-label="Red: just add -ed"></button>
          <button class="cb b" onclick="pickColor(${i},'blue')"  aria-label="Blue: drop e or change y + -ed"></button>
          <button class="cb g" onclick="pickColor(${i},'green')" aria-label="Green: double last consonant + -ed"></button>
        </div>
        <span class="cresult" id="cr${i}"></span>
      </div>`;
    g.appendChild(c);
  });

  renderButtons();
  updateProgress();
  document.getElementById("score").style.display="none";

  if(mode==="timed") startTimer();
}

/* ══ MODE ══ */
function setMode(m){
  mode=m;
  document.querySelector(".mode-btn.study").classList.toggle("active",m==="study");
  document.querySelector(".mode-btn.challenge").classList.toggle("active",m==="challenge");
  document.querySelector(".mode-btn.timed").classList.toggle("active",m==="timed");
  document.querySelector(".mode-btn.reverse").classList.toggle("active",m==="reverse");
  document.getElementById("timerBar").classList.toggle("show",m==="timed");
  build();
}

/* ══ TIMER ══ */
function startTimer(){
  timeLeft=words.length*(level==="god"?4:5);
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=10) document.getElementById("timerDisplay").classList.add("warn");
    if(timeLeft<=0){ stopTimer(); checkAll(); }
  },1000);
}
function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById("timerDisplay").classList.remove("warn");
}
function updateTimerDisplay(){
  const m=Math.floor(timeLeft/60);
  const s=timeLeft%60;
  document.getElementById("timerDisplay").textContent=`${m}:${s.toString().padStart(2,"0")}`;
}

/* ══ STREAK ══ */
function updateStreak(){
  const bar=document.getElementById("streakBar");
  if(streak>=2){
    bar.classList.add("show");
    document.getElementById("streakText").textContent=`${streak} in a row!`;
  } else {
    bar.classList.remove("show");
  }
}

/* ══ STUDY: tap heart ══ */
function heartClick(i){
  if(mode==="challenge"||mode==="timed"){ focusInput(i); return; }
  const hb=document.getElementById(`hb${i}`);
  const hp=document.getElementById(`hp${i}`);
  if(hb.classList.contains("done")) return;
  hb.classList.add("done","boing");
  hp.setAttribute("fill",RC[words[i].rule].active);
  hp.setAttribute("stroke",RC[words[i].rule].stroke);
  setTimeout(()=>hb.classList.remove("boing"),400);
  st[i].done=true;
  speak(words[i].ans);
  vibrate(30);
  updateProgress();
}
function revealAll(){ words.forEach((_,i)=>{ if(!st[i].done) heartClick(i); }); }

/* ══ CHALLENGE: focus ══ */
function focusInput(i){
  const ci=document.getElementById(`ci${i}`);
  if(ci&&!ci.disabled) ci.focus();
}

/* ══ AUTO-ADVANCE ══ */
function advanceToNext(i){
  for(let n=i+1;n<words.length;n++){
    if(!st[n].spelledOk){
      setTimeout(()=>{
        const next=document.getElementById(`ci${n}`);
        if(next&&!next.disabled){
          next.focus();
          next.scrollIntoView({behavior:"smooth",block:"center"});
        }
      },300);
      return;
    }
  }
}

/* ══ CHALLENGE: typing ══ */
function onType(i){
  const ci=document.getElementById(`ci${i}`);
  ci.classList.remove("wrong");
  document.getElementById(`cf${i}`).textContent="";
  document.getElementById(`ch${i}`).textContent="";
}

function getHint(word, attempts){
  const v=word.verb;
  const ans=word.ans;
  const rule=word.rule;
  const why=word.why;

  // Reverse mode: hints about the base verb (no letter reveals in god)
  if(mode==="reverse"){
    if(level==="god"||attempts===1) return "💡 Undo the spelling change to recover the base verb";
    if(attempts===2) return `💡 Starts with '${v[0]}' (${v.length} letters)`;
    return `💡 ${v.slice(0,Math.ceil(v.length/2))}… (${v.length} letters)`;
  }
  // God mode: rule hints only — never reveal letters
  if(level==="god"&&attempts>=3) attempts=2;

  if(attempts===1){
    if(rule==="red")   return "💡 No big changes needed here";
    if(rule==="blue")  return "💡 Something changes at the end before -ed";
    if(rule==="green") return "💡 Something gets doubled before -ed";
  }
  if(attempts===2){
    if(ans.includes("icked"))            return "💡 Think about keeping the hard /k/ sound";
    if(v.endsWith("y")&&ans.endsWith("ied")) return "💡 What happens to -y when there's a consonant before it?";
    if(v.endsWith("y")&&ans.endsWith("yed")) return "💡 Is the letter before -y a vowel or consonant?";
    if(v.endsWith("x"))                  return "💡 Does 'x' count as one sound or two?";
    if(v.endsWith("w"))                  return "💡 Is -w ever doubled in English?";
    if(v.endsWith("e"))                  return "💡 What do you do with a silent -e before adding a suffix?";
    if(rule==="green"&&why.includes("FIRST")) return "💡 Where is the main stress in this word?";
    if(rule==="green")                   return "💡 The last consonant gets doubled";
    return `💡 Think: ${why.split("→")[0]}`;
  }
  if(attempts>=3){
    const len=ans.length;
    const shown=ans.slice(0,Math.floor(len/2))+"…"+ans.slice(-3);
    return `💡 ${shown} (${len} letters)`;
  }
  return "";
}

function trySpell(i){
  if(st[i].spelledOk||st[i].locked) return;
  const ci=document.getElementById(`ci${i}`);
  const val=ci.value.trim().toLowerCase();
  const target=(mode==="reverse"?words[i].verb:words[i].ans);
  ci.classList.remove("ok","wrong");
  void ci.offsetWidth;
  if(val===target){
    ci.classList.add("ok"); ci.disabled=true;
    document.getElementById(`cf${i}`).textContent="✅";
    document.getElementById(`ch${i}`).textContent="";
    st[i].spelledOk=true;
    if(st[i].attempts===0){
      streak++;
      if(streak>=3) bonusPts=Math.min(10,bonusPts+1);
      decayFail(words[i].verb);
    } else {
      streak=0;
    }
    updateStreak();
    vibrate(30);
    if(mode!=="timed"&&mode!=="reverse"){
      const cp=document.getElementById(`cp${i}`);
      cp.classList.add("show","boing");
    }
    const hb=document.getElementById(`hb${i}`);
    hb.classList.add("boing");
    setTimeout(()=>hb.classList.remove("boing"),400);
    speak(words[i].ans);
    updateProgress();
    advanceToNext(i);
  } else {
    ci.classList.add("wrong");
    st[i].attempts++;
    streak=0;
    updateStreak();
    vibrate([50,30,50]);
    recordFail(words[i].verb);
    if(st[i].attempts>=1){
      document.getElementById(`ch${i}`).textContent=getHint(words[i],st[i].attempts);
    }
    const hb=document.getElementById(`hb${i}`);
    hb.style.animation="none"; void hb.offsetWidth; hb.style.animation="";
    ci.select();
    loseLife();
  }
}

/* ══ FAIL DECAY ══ */
function decayFail(key){
  const s=loadStore();
  if(s.failedWords&&s.failedWords[key]){
    s.failedWords[key]--;
    if(s.failedWords[key]<=0) delete s.failedWords[key];
    saveStore(s);
  }
}

/* ══ LIVES (God Mode) ══ */
function loseLife(){
  if(!livesEnabled||gameOver) return;
  lives--;
  renderLives();
  if(lives<=0){
    gameOver=true;
    setTimeout(()=>checkAll(),500);
  }
}
function renderLives(){
  const bar=document.getElementById("livesBar");
  bar.classList.toggle("show",livesEnabled);
  if(livesEnabled){
    const n=Math.max(0,lives);
    document.getElementById("livesText").textContent="❤️".repeat(n)+"🖤".repeat(3-n);
  }
}

/* ══ COLOR PICK ══ */
const RULE_WHY={
  red:  "🔴 Solo +ed — no hay cambios en la raíz",
  blue: "🔵 Cambio +ed — se elimina la -e muda o -y → -ied",
  green:"🟢 ×2 +ed — vocal corta + consonante final → se dobla",
};
const RULE_WHY_WRONG={
  red:{
    blue: "elegiste solo +ed (🔴), pero hay cambio de raíz (−e o −y→i) → (🔵)",
    green:"elegiste solo +ed (🔴), pero hay vocal corta + consonante → dobla (🟢)",
  },
  blue:{
    red:  "elegiste cambio+ed (🔵), pero la raíz no cambia → solo añade -ed (🔴)",
    green:"elegiste cambio+ed (🔵), pero hay vocal corta + consonante → dobla (🟢)",
  },
  green:{
    red:  "elegiste ×2+ed (🟢), pero no hay CVC → solo añade -ed (🔴)",
    blue: "elegiste ×2+ed (🟢), pero hay cambio de raíz → −e o −y→i (🔵)",
  },
};

function pickColor(i,color){
  if(!st[i].spelledOk||st[i].locked) return;
  st[i].colorPicked=color;
  const map={r:"red",b:"blue",g:"green"};
  const w=words[i];
  const isOk=(color===w.rule);
  document.querySelectorAll(`#cp${i} .cb`).forEach(btn=>{
    btn.classList.remove("picked");
    if(map[btn.classList[1]]===color) btn.classList.add("picked");
  });
  const hp=document.getElementById(`hp${i}`);
  hp.setAttribute("fill",RC[color].active);
  hp.setAttribute("stroke",RC[color].stroke);
  const cr=document.getElementById(`cr${i}`);
  if(isOk){
    cr.textContent=RULE_WHY[w.rule];
    cr.style.color="var(--green-dark)";
  } else {
    const msg=RULE_WHY_WRONG[color]?.[w.rule];
    cr.textContent=msg?"✗ "+msg:"✗ → "+w.rule.toUpperCase();
    cr.style.color="var(--red-dark)";
  }
  const hb=document.getElementById(`hb${i}`);
  hb.classList.remove("boing"); void hb.offsetWidth;
  hb.classList.add("boing");
  setTimeout(()=>hb.classList.remove("boing"),400);
  vibrate(isOk?20:[50,30,50]);
  updateProgress();
}

/* ══ CHECK ALL ══ */
function spellCredit(i){
  if(!st[i].spelledOk) return 0;
  const a=st[i].attempts;
  return a===0?1:a===1?0.6:0.3;
}
function checkAll(){
  stopTimer();
  let spell=0,clr=0,spellPts=0;
  words.forEach((w,i)=>{
    const target=(mode==="reverse"?w.verb:w.ans);
    if(st[i].locked){
      if(st[i].spelledOk){spell++;spellPts+=spellCredit(i);}
      if(mode!=="timed"&&mode!=="reverse"&&st[i].colorPicked===w.rule) clr++;
      return;
    }
    const ci=document.getElementById(`ci${i}`);
    const cf=document.getElementById(`cf${i}`);
    const ch=document.getElementById(`ch${i}`);
    const hp=document.getElementById(`hp${i}`);
    const cp=document.getElementById(`cp${i}`);
    const cr=document.getElementById(`cr${i}`);
    if(!st[i].spelledOk){
      const val=ci.value.trim().toLowerCase();
      if(val===target){
        ci.classList.add("ok"); ci.disabled=true;
        cf.textContent="✅"; ch.textContent="";
        st[i].spelledOk=true;
        if(mode!=="timed"&&mode!=="reverse") cp.classList.add("show");
      } else {
        ci.classList.add("wrong"); ci.disabled=true;
        cf.textContent="❌"; ch.textContent=`→ ${target}`;
        recordFail(w.verb);
      }
    }
    if(st[i].spelledOk){spell++;spellPts+=spellCredit(i);}
    if(mode!=="timed"&&mode!=="reverse"){
      const picked=st[i].colorPicked;
      const colorOk=picked===w.rule;
      const map={r:"red",b:"blue",g:"green"};
      cp.querySelectorAll(".cb").forEach(btn=>{
        const bc=map[btn.classList[1]];
        btn.disabled=true;
        btn.classList.remove("picked","correct-c","wrong-c");
        if(bc===w.rule) btn.classList.add("correct-c");
        if(bc===picked&&!colorOk) btn.classList.add("wrong-c");
      });
      if(picked) cr.textContent=colorOk?"✅ Correct!":`❌ → ${w.rule.toUpperCase()}`;
      else if(st[i].spelledOk) cr.textContent=`→ ${w.rule.toUpperCase()}`;
      if(colorOk) clr++;
    }
    hp.setAttribute("fill",RC[w.rule].active);
    hp.setAttribute("stroke",RC[w.rule].stroke);
    st[i].locked=st[i].done=true;
  });
  updateProgress();
  renderButtons(true);

  const total=words.length;
  const pct=(mode==="timed"||mode==="reverse")
    ?Math.min(100,Math.round((spellPts/total)*100)+bonusPts)
    :Math.min(100,Math.round(((spellPts+clr)/(total*2))*100)+bonusPts);
  const stars=pct>=95?3:pct>=75?2:pct>=50?1:0;

  recordScore(pct);
  setTimeout(()=>showStars(stars,spell,clr,total,pct),400);
}

/* ══ STARS + CONFETTI ══ */
function showStars(stars,spell,clr,total,pct){
  const overlay=document.getElementById("starsOverlay");
  const title=document.getElementById("starsTitle");
  const sub=document.getElementById("starsSub");
  overlay.classList.add("show");
  [1,2,3].forEach(n=>{
    setTimeout(()=>{
      if(n<=stars) document.getElementById(`star${n}`).classList.add("lit");
    },n*350);
  });
  const spellLine=`${spell}/${total} spellings`;
  const clrLine=`${clr}/${total} colours`;
  const details=(mode==="timed"||mode==="reverse")?`${spellLine} ⚡ (${pct}%)`:stars===3?`${spellLine} + ${clrLine} (${pct}%)`:`${spellLine} · ${clrLine} (${pct}%)`;
  if(stars===3){
    title.textContent="🏆 Excellent!";
    sub.textContent=details;
    setTimeout(launchConfetti,400);
    vibrate([100,50,100,50,200]);
  } else if(stars===2){
    title.textContent="⭐ Great job!";
    sub.textContent=details;
    vibrate([50,30,50]);
  } else if(stars===1){
    title.textContent="💪 Keep practising!";
    sub.textContent=details;
  } else {
    title.textContent=gameOver?"💀 Game over!":"😅 Tough one!";
    sub.textContent=(gameOver?"No lives left — ":"")+details;
  }
}
function closeStars(){
  document.getElementById("starsOverlay").classList.remove("show");
  [1,2,3].forEach(n=>document.getElementById(`star${n}`).classList.remove("lit"));
  stopConfetti();
}

/* ══ CONFETTI ══ */
const canvas=document.getElementById("confetti-canvas");
const ctx=canvas.getContext("2d");
let particles=[],animId=null;
const COLORS=["#FF6B6B","#4A90D9","#3DBE7A","#FF9F6B","#F7C948","#C97FE8"];

function launchConfetti(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  particles=Array.from({length:140},()=>({
    x:Math.random()*canvas.width,
    y:-10-Math.random()*canvas.height*.3,
    r:Math.random()*7+3,
    d:Math.random()*2+1,
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    tilt:Math.random()*10-5,
    tiltV:Math.random()*.2-.1,
    shape:Math.random()>.5?"circle":"rect",
  }));
  if(animId) cancelAnimationFrame(animId);
  drawConfetti();
}
function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.tilt*Math.PI/180);
    ctx.fillStyle=p.color;
    if(p.shape==="circle"){
      ctx.beginPath();ctx.arc(0,0,p.r,0,2*Math.PI);ctx.fill();
    } else {
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.4);
    }
    ctx.restore();
    p.y+=p.d+1.5;
    p.tilt+=p.tiltV;
    p.x+=Math.sin(p.y*.02)*1.2;
  });
  particles=particles.filter(p=>p.y<canvas.height+20);
  if(particles.length>0) animId=requestAnimationFrame(drawConfetti);
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}
function stopConfetti(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=[];
}

/* ══ PROGRESS ══ */
function updateProgress(){
  const done=mode==="study"
    ?Object.values(st).filter(x=>x.done).length
    :( mode==="timed"||mode==="reverse")
      ?Object.values(st).filter(x=>x.spelledOk).length
      :Object.values(st).filter(x=>x.spelledOk&&x.colorPicked!==null).length;
  const pct=Math.round(done/words.length*100);
  document.getElementById("progTxt").textContent=`${done} / ${words.length}`;
  document.getElementById("progPct").textContent=`${pct}%`;
  document.getElementById("progFill").style.width=pct+"%";
}

/* ══ BUTTONS ══ */
function renderButtons(checked=false){
  const row=document.getElementById("btnRow");
  row.innerHTML="";
  if(mode==="study"){
    row.innerHTML=`
      <button class="btn btn-blue"  onclick="revealAll()">✨ Show All</button>
      <button class="btn btn-ghost" onclick="build()">🔄 Reset</button>`;
  } else if(!checked){
    row.innerHTML=`
      <button class="btn btn-green" onclick="checkAll()">✅ Check Answers</button>
      <button class="btn btn-ghost" onclick="build()">🔄 Reset</button>`;
  } else {
    row.innerHTML=`
      <button class="btn btn-red"   onclick="setMode(mode)">🔄 Try Again</button>
      <button class="btn btn-ghost" onclick="setMode('study')">📖 Study</button>`;
  }
}

applyTheme();
renderStats();
updateMenuChips();
build();
