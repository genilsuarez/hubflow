<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e14; --card:#16161f; --border:#2a2a38;
  --text:#f0eff8; --text-soft:#b0afc8; --muted:#6b6a80; --accent:#7c5af6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
input,textarea{color-scheme:dark;font-family:inherit;}
input::placeholder,textarea::placeholder{color:var(--muted);}
.serif{font-family:'Playfair Display',serif;}
.wrap{max-width:640px;margin:0 auto;padding:0 24px;}

/* HEADER */
.header{padding:28px 0 0;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:12px;}
.logo{width:38px;height:38px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand h1{font-size:21px;font-family:'Playfair Display',serif;font-weight:700;}
.brand .sub{font-size:11px;color:var(--muted);}
.head-actions{display:flex;align-items:center;gap:10px;position:relative;}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;}
.wod-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(124,90,246,.12);border:1px solid rgba(124,90,246,.3);border-radius:20px;cursor:pointer;color:#a78bfa;font-size:12px;font-family:inherit;}
.wod-pop{position:absolute;right:0;top:calc(100% + 8px);z-index:100;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:18px;width:260px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:fadeIn .2s ease;}
.wod-pop.hide{display:none;}
.wod-label{font-size:11px;color:#a78bfa;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.wod-word{font-size:22px;font-family:'Playfair Display',serif;font-weight:700;margin-bottom:6px;}
.wod-def{font-size:13px;color:var(--text-soft);margin-bottom:6px;}
.wod-ex{font-size:12px;font-style:italic;color:var(--muted);margin-bottom:6px;}
.wod-tip{font-size:11px;color:var(--muted);background:var(--bg);border-radius:8px;padding:6px 10px;}

/* TABS */
.tabs-bar{padding:18px 0 0;}
.tabs{display:flex;gap:4px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:4px;}
.tab{flex:1;padding:7px 4px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;}
.tab .ti{font-size:15px;}
.tab span{white-space:nowrap;}
.prog-wrap{margin-top:8px;}
.prog-track{height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.prog-txt{font-size:10px;color:var(--muted);text-align:right;margin-top:3px;}

/* CONTENT */
.content{padding:20px 0 40px;}

/* BUTTONS / INPUTS */
.btn{padding:10px 20px;border-radius:10px;border:none;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s;color:#fff;background:var(--accent);}
.btn.outline{border:1.5px solid var(--border);background:transparent;color:var(--text-soft);}
.btn:hover:not(:disabled){opacity:.82;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:inherit;}

/* FLASHCARD */
.fc{display:flex;flex-direction:column;align-items:center;gap:20px;}
.fc-top{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:500px;}
.fc-count{color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase;}
.fc-learn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
.fc-learn.on{border-color:#22c55e;background:rgba(34,197,94,.1);color:#22c55e;}
.fc-card{width:100%;max-width:500px;height:260px;cursor:pointer;perspective:1000px;position:relative;}
.fc-inner{position:absolute;inset:0;border-radius:20px;transition:transform .6s cubic-bezier(.4,2,.6,1);transform-style:preserve-3d;}
.fc-card.flip .fc-inner{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:12px;text-align:center;}
.fc-front{background:var(--card);border:1.5px solid var(--border);}
.fc-back{background:var(--accent);transform:rotateY(180deg);gap:14px;}
.fc-tag{font-size:13px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;}
.fc-word{font-size:42px;font-family:'Playfair Display',serif;font-weight:700;}
.fc-hint{font-size:13px;color:var(--muted);margin-top:8px;}
.fc-def{font-size:20px;color:#fff;font-weight:600;}
.fc-exb{font-size:14px;color:rgba(255,255,255,.85);font-style:italic;}
.fc-tipb{font-size:12px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.15);border-radius:10px;padding:8px 16px;}
.fc-badge{position:absolute;top:14px;left:14px;font-size:11px;color:#22c55e;background:rgba(34,197,94,.1);border-radius:20px;padding:2px 10px;border:1px solid rgba(34,197,94,.2);}
.fc-nav{display:flex;gap:10px;width:100%;max-width:500px;justify-content:center;}

/* CARDS */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:16px;}
.col{display:flex;flex-direction:column;gap:20px;}
.gc-head{display:flex;align-items:center;gap:12px;}
.gc-head .ic{font-size:28px;}
.gc-head h3{font-size:18px;font-family:'Playfair Display',serif;}
.gc-exp{color:var(--text-soft);font-size:14px;line-height:1.7;}
.gc-exp strong{color:#7c5af6;}
.gc-rules{background:var(--bg);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px;}
.gc-rule{font-size:13px;font-family:monospace;line-height:1.6;color:var(--muted);}
.gc-rule.ok{color:#22c55e;}.gc-rule.no{color:#ef4444;}
.gc-ex{background:var(--bg);border-radius:12px;padding:16px;border-left:3px solid #3b82f6;}
.gc-ex .lbl{font-size:12px;color:#3b82f6;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.gc-ex .q{font-size:14px;color:var(--text-soft);margin-bottom:12px;}
.row{display:flex;gap:8px;}
.fb{font-size:14px;margin-bottom:6px;}.fb.ok{color:#22c55e;}.fb.no{color:#ef4444;}
.fb-hint{font-size:12px;color:var(--muted);margin-bottom:10px;}

/* EXERCISES */
.ex-head{display:flex;justify-content:space-between;align-items:center;}
.ex-type{font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 12px;letter-spacing:1px;}
.ex-num{font-size:12px;color:var(--muted);}
.ex-sent{background:var(--bg);border-radius:10px;padding:12px 16px;font-family:monospace;font-size:15px;color:var(--text);}
.ex-ans{background:var(--bg);border-radius:10px;padding:14px;border-left:3px solid #22c55e;}
.ex-ans .a{font-size:13px;font-weight:700;color:#22c55e;margin-bottom:4px;}
.ex-ans .e{font-size:12px;color:var(--muted);}

/* QUIZ */
.quiz{display:flex;flex-direction:column;gap:20px;align-items:center;}
.stats{display:flex;gap:12px;width:100%;}
.stat{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;}
.stat .v{font-size:22px;font-weight:700;font-family:'Playfair Display',serif;}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.streak-msg{width:100%;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:10px 16px;text-align:center;font-size:13px;color:#f59e0b;}
.quiz-card{width:100%;max-width:480px;background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:36px;text-align:center;display:flex;flex-direction:column;gap:16px;}
.quiz-tag{font-size:11px;color:#ef4444;letter-spacing:3px;text-transform:uppercase;}
.quiz-word{font-size:44px;font-family:'Playfair Display',serif;font-weight:700;}
.quiz-ex{font-size:12px;color:var(--muted);font-style:italic;}
.quiz-res{font-size:18px;font-weight:600;}
.quiz-answer{font-size:15px;color:var(--text-soft);background:var(--bg);border-radius:12px;padding:12px 16px;}
.quiz-tip{font-size:12px;color:var(--muted);background:var(--bg);border-radius:10px;padding:8px 14px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .35s ease forwards;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="brand">
      <div class="logo">🇬🇧</div>
      <div>
        <h1>English Tutor</h1>
        <div class="sub">Nivel intermedio</div>
      </div>
    </div>
    <div class="head-actions">
      <button class="wod-btn" id="wodBtn">⭐ Word of the Day</button>
      <button class="pill" id="resetBtn" title="Reiniciar progreso">↺ Reset</button>
      <div class="wod-pop hide" id="wodPop"></div>
    </div>
  </div>

  <div class="tabs-bar">
    <div class="tabs" id="tabs"></div>
    <div class="prog-wrap" id="progWrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-txt" id="progTxt"></div>
    </div>
  </div>

  <div class="content fade-in" id="content"></div>
</div>
<script>
// ─── Data ───────────────────────────────────────────────
const VOCAB=[
  {word:"Nevertheless",def:"A pesar de eso / Sin embargo",example:"The weather was bad. Nevertheless, we went hiking.",tip:"Úsala para contrastar ideas en un mismo párrafo."},
  {word:"Acknowledge",def:"Reconocer / Admitir",example:"She acknowledged her mistake gracefully.",tip:"Más formal que 'admit'. Ideal en emails de trabajo."},
  {word:"Conceive",def:"Concebir / Imaginar",example:"He couldn't conceive of a world without music.",tip:"Forma parte de 'inconceivable' (inconcebible)."},
  {word:"Subtle",def:"Sutil / Delicado",example:"There's a subtle difference between these two words.",tip:"La 'b' es muda: se pronuncia /ˈsʌtl/."},
  {word:"Endeavor",def:"Esfuerzo / Empeño",example:"Learning a language is a worthy endeavor.",tip:"Muy usada en contextos formales y escritura académica."},
  {word:"Daunting",def:"Intimidante / Abrumador",example:"The task seemed daunting at first.",tip:"Perfecta para describir retos difíciles."},
  {word:"Persistent",def:"Persistente / Constante",example:"Her persistent effort paid off eventually.",tip:"Positivo: habla de no rendirse."},
  {word:"Eloquent",def:"Elocuente / Expresivo",example:"The speaker gave an eloquent speech.",tip:"Se usa para describir habilidad verbal sofisticada."},
  {word:"Ambiguous",def:"Ambiguo / Poco claro",example:"His answer was deliberately ambiguous.",tip:"Opuesto: 'unambiguous' (claro, sin duda)."},
  {word:"Pragmatic",def:"Pragmático / Práctico",example:"We need a pragmatic solution to this problem.",tip:"No idealista; enfocado en lo que funciona."},
  {word:"Resilient",def:"Resistente / Que se recupera",example:"Children are remarkably resilient.",tip:"Muy usada en psicología y contextos de negocios."},
  {word:"Scrutinize",def:"Escudriñar / Examinar de cerca",example:"The committee scrutinized every detail of the proposal.",tip:"Implica revisión muy detallada y crítica."},
  {word:"Alleviate",def:"Aliviar / Reducir",example:"Exercise can alleviate stress significantly.",tip:"Alleviate pain, tension, suffering — siempre algo negativo."},
  {word:"Compelling",def:"Convincente / Irresistible",example:"She made a compelling argument for the new policy.",tip:"También: 'compelling story' = historia que engancha."},
  {word:"Forthcoming",def:"Próximo / Comunicativo",example:"He wasn't very forthcoming about his plans.",tip:"Dos significados: evento próximo o persona abierta."},
  {word:"Mitigate",def:"Mitigar / Reducir el impacto",example:"Measures were taken to mitigate the risks.",tip:"Muy usada en reportes y documentos formales."},
  {word:"Profound",def:"Profundo / Intenso",example:"Reading that book had a profound effect on me.",tip:"'A profound thinker' = alguien que piensa con mucha profundidad."},
  {word:"Tangible",def:"Tangible / Concreto",example:"We need tangible results by next month.",tip:"Antónimo: 'intangible'. Muy común en negocios."},
  {word:"Leverage",def:"Aprovechar / Apalancar",example:"You can leverage your existing skills in this role.",tip:"Como sustantivo: 'tener ventaja'. Como verbo: usar algo a tu favor."},
  {word:"Discrepancy",def:"Discrepancia / Diferencia",example:"There's a discrepancy between the two reports.",tip:"Úsala cuando dos versiones o datos no coinciden."},
];

const GRAMMAR=[
  {title:"Present Perfect vs. Simple Past",icon:"⏱",explanation:"Usa el **Present Perfect** (have + participio) cuando la acción tiene conexión con el presente. Usa el **Simple Past** cuando la acción ocurrió en un momento específico ya terminado.",rules:["✅ I have visited Paris. (en algún momento de mi vida, aún relevante)","✅ I visited Paris in 2019. (momento específico, ya pasó)","❌ I have visited Paris last year. (no se puede combinar con tiempo específico pasado)"],exercise:{q:"She ___ (already/finish) the report.",a:"has already finished",hint:"Present perfect con 'already'"}},
  {title:"Conditionals: 2nd & 3rd",icon:"🔀",explanation:"El **2nd conditional** habla de situaciones hipotéticas en el presente. El **3rd conditional** habla de situaciones irreales en el pasado.",rules:["2nd: If I were rich, I would travel the world. (no soy rico ahora)","3rd: If I had studied more, I would have passed. (no estudié, ya pasó)","Nota: 'were' se usa para todas las personas en el 2nd conditional formal."],exercise:{q:"If she ___ (know) the answer, she would have told us.",a:"had known",hint:"3rd conditional: had + participio"}},
  {title:"Modal Verbs: Must vs. Have to",icon:"📌",explanation:"Ambos expresan obligación, pero **must** viene de una decisión interna (yo decido), mientras que **have to** viene de una regla o circunstancia externa.",rules:["I must call my mom. (yo siento que debo, decisión mía)","I have to wear a uniform at work. (regla externa)","Must no tiene forma de pasado: se reemplaza con 'had to'."],exercise:{q:"Students ___ submit their assignments by Friday. (regla del profesor)",a:"have to",hint:"Obligación externa → have to"}},
  {title:"Articles: A, An & The",icon:"📎",explanation:"**A/An** se usa la primera vez que mencionas algo (indefinido). **The** se usa cuando ya es conocido o hay solo uno. **Sin artículo** con sustantivos plurales o incontables en general.",rules:["✅ I saw a dog. The dog was barking. (primera vs. segunda mención)","✅ The sun is bright today. (solo hay uno en el contexto)","❌ The life is beautiful. (generalización → sin artículo: 'Life is beautiful.')"],exercise:{q:"She is ___ engineer who works at ___ NASA.",a:"an / — (no article)",hint:"An = profesión, no artículo con nombres propios de instituciones"}},
  {title:"Passive Voice",icon:"🔄",explanation:"La voz pasiva se forma con **be + past participle**. Se usa cuando el agente no es importante, no se sabe, o queremos enfocarnos en la acción o el objeto.",rules:["Active: The manager approved the proposal.","Passive: The proposal was approved (by the manager).","✅ 'by' + agente es opcional si no es relevante."],exercise:{q:"The report ___ (write) by the team last week.",a:"was written",hint:"Past simple passive: was/were + past participle"}},
  {title:"Reported Speech",icon:"💬",explanation:"Al reportar lo que alguien dijo, los tiempos verbales **retroceden un tiempo**. Present → Past, Past → Past Perfect. Los pronombres y expresiones de tiempo también cambian.",rules:['Direct: "I am tired," she said.','Reported: She said (that) she was tired.','Direct: "I will call you," he said → Reported: He said he would call me.'],exercise:{q:'He said: "I have finished the project." → He said that he ___ the project.',a:"had finished",hint:"Present perfect → past perfect en reported speech"}},
];

const EXERCISES=[
  {type:"fill",instruction:"Completa la oración con la forma correcta del verbo:",sentence:"By the time he arrived, she ___ (already/leave).",answer:"had already left",explanation:"Past perfect: la acción de irse ocurrió ANTES de que él llegara."},
  {type:"error",instruction:"Encuentra y corrige el error:",sentence:"She's been working here since three years.",answer:"She's been working here for three years.",explanation:"'Since' se usa con un punto en el tiempo (since 2020). 'For' se usa con duración (for three years)."},
  {type:"rewrite",instruction:"Reescribe usando una forma más formal:",sentence:"I want to know if you can come to the meeting.",answer:"I was wondering if you would be able to attend the meeting.",explanation:"'I was wondering if...' es mucho más formal y cortés que 'I want to know if'."},
  {type:"fill",instruction:"Completa con la preposición correcta:",sentence:"I'm not good ___ remembering names.",answer:"at",explanation:"La estructura es: good/bad AT + gerundio."},
  {type:"error",instruction:"Encuentra y corrige el error:",sentence:"If I would have more time, I would learn another language.",answer:"If I had more time, I would learn another language.",explanation:"2nd conditional: If + past simple (NOT would). 'would' solo va en la cláusula principal."},
  {type:"fill",instruction:"Completa con la palabra correcta (although / despite / however):",sentence:"___ being tired, she finished the presentation.",answer:"Despite",explanation:"'Despite' va seguido de un sustantivo o gerundio. 'Although' va seguido de una oración completa."},
  {type:"rewrite",instruction:"Convierte a voz pasiva:",sentence:"The company launched a new product last month.",answer:"A new product was launched by the company last month.",explanation:"Voz pasiva en past simple: was/were + past participle. El objeto se convierte en sujeto."},
  {type:"error",instruction:"Encuentra y corrige el error:",sentence:"She suggested to go to the new restaurant downtown.",answer:"She suggested going to the new restaurant downtown.",explanation:"'Suggest' no acepta infinitivo: suggest + gerundio (going). Igual: avoid, recommend, consider."},
];

const TABS=[
  {id:"vocab",label:"Vocabulario",icon:"📖",accent:"#7c5af6"},
  {id:"grammar",label:"Gramática",icon:"📐",accent:"#3b82f6"},
  {id:"exercises",label:"Ejercicios",icon:"✏️",accent:"#f59e0b"},
  {id:"quiz",label:"Quiz",icon:"🎯",accent:"#ef4444"},
];

// ─── State ───────────────────────────────────────────────
const store={
  get learned(){try{return JSON.parse(localStorage.getItem("et_learned")||"[]");}catch{return[];}},
  set learned(v){localStorage.setItem("et_learned",JSON.stringify(v));},
  get exercises(){try{return JSON.parse(localStorage.getItem("et_exercises")||"[]");}catch{return[];}},
  set exercises(v){localStorage.setItem("et_exercises",JSON.stringify(v));},
};
let tab="vocab", cardIdx=0;
let quiz={qIdx:Math.floor(Math.random()*VOCAB.length),result:null,streak:0,total:0};

const $=s=>document.querySelector(s);
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function fmtBold(s){return esc(s).split("**").map((p,i)=>i%2?`<strong>${p}</strong>`:p).join("");}

function toggleLearned(word,forceTrue){
  let l=store.learned;
  if(forceTrue){if(!l.includes(word))l=[...l,word];}
  else{l=l.includes(word)?l.filter(w=>w!==word):[...l,word];}
  store.learned=l;
}

function getWordOfDay(){
  const day=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);
  return VOCAB[day%VOCAB.length];
}

// ─── Progress ────────────────────────────────────────────
function progressFor(t){
  if(t==="vocab"||t==="quiz")return Math.round(store.learned.length/VOCAB.length*100);
  if(t==="exercises")return Math.round(store.exercises.length/EXERCISES.length*100);
  return 0;
}
function renderProgress(){
  const show=tab==="vocab"||tab==="exercises"||tab==="quiz";
  $("#progWrap").style.display=show?"block":"none";
  if(!show)return;
  const accent=TABS.find(t=>t.id===tab).accent;
  const pct=progressFor(tab);
  $("#progFill").style.width=pct+"%";
  $("#progFill").style.background=accent;
  $("#progTxt").textContent=pct+"% completado";
}

// ─── Tabs ────────────────────────────────────────────────
function renderTabs(){
  $("#tabs").innerHTML=TABS.map(t=>`
    <button class="tab" data-tab="${t.id}" style="${tab===t.id?`background:${t.accent};color:#fff`:""}">
      <span class="ti">${t.icon}</span><span>${t.label}</span>
    </button>`).join("");
  $("#tabs").querySelectorAll(".tab").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
}

// ─── Render dispatch ─────────────────────────────────────
function render(){
  renderTabs();
  renderProgress();
  const c=$("#content");
  c.classList.remove("fade-in");void c.offsetWidth;c.classList.add("fade-in");
  if(tab==="vocab")renderVocab();
  else if(tab==="grammar")renderGrammar();
  else if(tab==="exercises")renderExercises();
  else if(tab==="quiz")renderQuiz();
}

// ─── Vocab / Flashcard ───────────────────────────────────
function renderVocab(){
  const w=VOCAB[cardIdx];
  const learned=store.learned.includes(w.word);
  $("#content").innerHTML=`
    <div class="fc">
      <div class="fc-top">
        <div class="fc-count">${cardIdx+1} / ${VOCAB.length}</div>
        <button class="fc-learn ${learned?"on":""}" id="learnBtn">${learned?"✓ Aprendida":"Marcar aprendida"}</button>
      </div>
      <div class="fc-card" id="fcCard">
        <div class="fc-inner">
          <div class="fc-face fc-front">
            ${learned?'<div class="fc-badge">✓ Aprendida</div>':""}
            <div class="fc-tag">palabra</div>
            <div class="fc-word">${esc(w.word)}</div>
            <div class="fc-hint">Toca para ver la definición →</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-def">${esc(w.def)}</div>
            <div class="fc-exb">"${esc(w.example)}"</div>
            <div class="fc-tipb">💡 ${esc(w.tip)}</div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="btn outline" id="prevBtn">← Anterior</button>
        <button class="btn" id="nextBtn">Siguiente →</button>
      </div>
    </div>`;
  $("#fcCard").onclick=()=>$("#fcCard").classList.toggle("flip");
  $("#learnBtn").onclick=()=>{toggleLearned(w.word);render();};
  $("#prevBtn").onclick=()=>{cardIdx=(cardIdx-1+VOCAB.length)%VOCAB.length;render();};
  $("#nextBtn").onclick=()=>{cardIdx=(cardIdx+1)%VOCAB.length;render();};
}

// ─── Grammar ─────────────────────────────────────────────
function renderGrammar(){
  $("#content").innerHTML=`<div class="col">${GRAMMAR.map((it,i)=>`
    <div class="card">
      <div class="gc-head"><span class="ic">${it.icon}</span><h3>${esc(it.title)}</h3></div>
      <p class="gc-exp">${fmtBold(it.explanation)}</p>
      <div class="gc-rules">${it.rules.map(r=>{
        const cls=r.startsWith("❌")?"no":r.startsWith("✅")?"ok":"";
        return `<div class="gc-rule ${cls}">${esc(r)}</div>`;}).join("")}</div>
      <div class="gc-ex">
        <div class="lbl">Mini ejercicio</div>
        <div class="q">${esc(it.exercise.q)}</div>
        <div id="gx${i}">
          <div class="row">
            <input class="input" id="gi${i}" placeholder="Tu respuesta..." autocomplete="off">
            <button class="btn" style="background:#3b82f6" data-check="${i}">✓</button>
          </div>
        </div>
      </div>
    </div>`).join("")}</div>`;
  GRAMMAR.forEach((it,i)=>{
    const check=()=>{
      const val=$("#gi"+i).value.trim().toLowerCase();
      const ok=val===it.exercise.a.toLowerCase();
      $("#gx"+i).innerHTML=`
        <div class="fb ${ok?"ok":"no"}">${ok?"✅ ¡Correcto!":`❌ La respuesta es: "${esc(it.exercise.a)}"`}</div>
        <div class="fb-hint">💡 ${esc(it.exercise.hint)}</div>
        <button class="btn outline" style="font-size:12px;padding:6px 14px" data-retry="${i}">↩ Intentar de nuevo</button>`;
      $("#gx"+i).querySelector("[data-retry]").onclick=()=>renderGrammar();
    };
    $("#content").querySelector(`[data-check="${i}"]`).onclick=check;
    $("#gi"+i).onkeydown=e=>{if(e.key==="Enter")check();};
  });
}

// ─── Exercises ───────────────────────────────────────────
function renderExercises(){
  const done=store.exercises;
  const labels={fill:"Completa",error:"Corrige el error",rewrite:"Reescribe"};
  const colors={fill:"#f59e0b",error:"#ef4444",rewrite:"#a78bfa"};
  $("#content").innerHTML=`<div class="col">${EXERCISES.map((ex,i)=>{
    const isDone=done.includes(i);
    return `<div class="card" style="border-color:${isDone?"rgba(34,197,94,.3)":"var(--border)"}">
      <div class="ex-head">
        <span class="ex-type" style="color:${colors[ex.type]}">${labels[ex.type]}</span>
        <span class="ex-num" style="color:${isDone?"#22c55e":"var(--muted)"}">${isDone?"✓ Completado":"#"+(i+1)}</span>
      </div>
      <p style="font-size:14px;color:var(--text-soft);line-height:1.6">${esc(ex.instruction)}</p>
      <div class="ex-sent">${esc(ex.sentence)}</div>
      <textarea class="input" id="ei${i}" rows="2" placeholder="Tu respuesta..." style="resize:vertical"></textarea>
      <div class="row"><button class="btn outline" data-reveal="${i}">Ver respuesta</button></div>
      <div id="er${i}"></div>
    </div>`;}).join("")}</div>`;
  EXERCISES.forEach((ex,i)=>{
    $("#content").querySelector(`[data-reveal="${i}"]`).onclick=()=>{
      $("#er"+i).innerHTML=`<div class="ex-ans fade-in">
        <div class="a">✅ ${esc(ex.answer)}</div>
        <div class="e">${esc(ex.explanation)}</div></div>`;
      const d=store.exercises;if(!d.includes(i)){store.exercises=[...d,i];renderProgress();}
    };
  });
}

// ─── Quiz ────────────────────────────────────────────────
function renderQuiz(){
  const w=VOCAB[quiz.qIdx];
  const learned=store.learned;
  const acc=quiz.streak;
  const streakColor=quiz.streak>=5?"#f59e0b":quiz.streak>=3?"#10b981":"#7c5af6";
  const stats=[
    {l:"Racha",v:quiz.streak,s:"🔥",c:streakColor},
    {l:"Respondidas",v:quiz.total,s:"",c:"var(--text-soft)"},
    {l:"Aprendidas",v:learned.length,s:"✓",c:"#22c55e"},
  ];
  let body;
  if(quiz.result===null){
    body=`
      <input class="input" id="qi" placeholder="Escribe la traducción en español..." style="text-align:center;font-size:15px" autocomplete="off">
      <div class="row" style="justify-content:center">
        <button class="btn" style="background:#ef4444;padding:10px 28px" id="qCheck">Comprobar</button>
      </div>`;
  }else{
    const ok=quiz.result==="correct";
    body=`<div class="fade-in" style="display:flex;flex-direction:column;gap:12px">
      <div class="quiz-res" style="color:${ok?"#22c55e":"#ef4444"}">${ok?"✅ ¡Correcto!":"❌ No del todo..."}</div>
      <div class="quiz-answer"><span style="color:var(--muted);font-size:12px">Respuesta: </span><strong>${esc(w.def)}</strong></div>
      <div class="quiz-tip">💡 ${esc(w.tip)}</div>
      <button class="btn" style="background:#ef4444;align-self:center;padding:10px 32px" id="qNext">Siguiente palabra →</button>
    </div>`;
  }
  $("#content").innerHTML=`
    <div class="quiz">
      <div class="stats">${stats.map(s=>`
        <div class="stat"><div class="v" style="color:${s.c}">${s.v}${s.s}</div><div class="l">${s.l}</div></div>`).join("")}</div>
      ${quiz.streak>=3?`<div class="streak-msg fade-in">${quiz.streak>=5?"🏆 ¡Racha increíble! Sigue así.":"🔥 ¡Buena racha! Estás en ritmo."}</div>`:""}
      <div class="quiz-card">
        <div class="quiz-tag">¿Qué significa?</div>
        <div class="quiz-word">${esc(w.word)}</div>
        <div class="quiz-ex">"${esc(w.example)}"</div>
        ${body}
      </div>
      <button class="btn outline" style="font-size:12px" id="qSkip">Saltar esta palabra</button>
    </div>`;

  const next=()=>{quiz.qIdx=Math.floor(Math.random()*VOCAB.length);quiz.result=null;render();};
  const check=()=>{
    const val=($("#qi").value||"").trim().toLowerCase();
    if(!val)return;
    const parts=w.def.toLowerCase().split(/[/,·]+/).map(s=>s.trim());
    const ok=parts.some(p=>val.includes(p)||p.includes(val));
    quiz.result=ok?"correct":"wrong";
    quiz.total++;
    if(ok){quiz.streak++;toggleLearned(w.word,true);}else{quiz.streak=0;}
    render();
  };
  if(quiz.result===null){
    $("#qi").focus();
    $("#qi").onkeydown=e=>{if(e.key==="Enter")check();};
    $("#qCheck").onclick=check;
  }else{
    $("#qNext").onclick=next;
  }
  $("#qSkip").onclick=next;
}

// ─── Word of the Day popup ───────────────────────────────
function buildWod(){
  const w=getWordOfDay();
  $("#wodPop").innerHTML=`
    <div class="wod-label">Hoy aprende</div>
    <div class="wod-word">${esc(w.word)}</div>
    <div class="wod-def">${esc(w.def)}</div>
    <div class="wod-ex">"${esc(w.example)}"</div>
    <div class="wod-tip">💡 ${esc(w.tip)}</div>`;
}
$("#wodBtn").onclick=()=>$("#wodPop").classList.toggle("hide");

// ─── Reset ───────────────────────────────────────────────
$("#resetBtn").onclick=()=>{
  store.learned=[];store.exercises=[];
  quiz={qIdx:Math.floor(Math.random()*VOCAB.length),result:null,streak:0,total:0};
  render();
};

// ─── Init ────────────────────────────────────────────────
buildWod();
render();
</script>
</body>
</html>
