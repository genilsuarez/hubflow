<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Relations — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8860B'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="../js/theme-init.js"></script>
<style>body{background:#FAF7F2;color:#2C2418}[data-theme="dark"] body{background:#1A1714;color:#EDE8E0}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<style>
  body { min-height: 100vh; padding: 0 14px 40px; }
  .header { padding: 6px 0; }
  h1 { font-family: 'Newsreader', serif; font-weight: 600; font-size: 1.4rem; margin-bottom: 6px; }
  .back-link { color: var(--c-opp); }
  .pill-btn.active { background: var(--c-opp); color: #fff; box-shadow: 0 2px 10px rgba(61,127,127,.25); }
  .progress__fill { background: var(--c-opp); }
  .cat-bar { margin-bottom: 6px; }

  [data-area] { display: none; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
  [data-area].show { display: flex; }

  .fc-card { max-width: 460px; height: 200px; }
  .opp-front .fc-emoji { font-size: 2.4rem; }
  .opp-front .fc-term { font-size: 1.8rem; }
  .opp-front .fc-term.blue { color: var(--blue); }
  .opp-front .fc-term.red { color: var(--red); }
  .fc-back { background: var(--c-opp-soft); border-color: var(--c-opp); }
  .fc-back .fc-term { font-size: 1.5rem; }

  .quiz-card { width: 100%; max-width: 440px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; text-align: center; box-shadow: var(--shadow-sm); }
  .quiz-card .q-emoji { font-size: 1.8rem; }
  .quiz-card .q-word { font-family: 'Newsreader', serif; font-size: 1.6rem; font-weight: 600; color: var(--blue); }
  .quiz-card .q-label { font-size: .62rem; color: var(--muted); font-weight: 700; margin-top: 2px; }
  .quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; max-width: 440px; }

  #pairScore { font-size: .7rem; font-weight: 700; color: var(--muted); text-align: center; }
  .scroll-body { padding: 8px 0 30px; }

  /* Battle */
  .battle-scores { display: flex; gap: 12px; justify-content: center; align-items: center; width: 100%; }
  .player-score { display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 6px 16px; border-radius: var(--radius); background: var(--surface); border: 1.5px solid var(--border); min-width: 80px; }
  .player-score.p1 { border-color: var(--blue, #4a9eff); }
  .player-score.p2 { border-color: var(--red, #e85d5d); }
  .player-score .p-label { font-size: .5rem; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .player-score .p-points { font-family: 'Newsreader', serif; font-size: 1.4rem; font-weight: 600; }
  .player-score.p1 .p-points { color: var(--blue, #4a9eff); }
  .player-score.p2 .p-points { color: var(--red, #e85d5d); }
  .vs-badge { font-family: 'Newsreader', serif; font-size: .8rem; font-style: italic; color: var(--muted); }
  .battle-card { max-width: 360px; height: 140px; perspective: 1200px; position: relative; }
  .battle-card .fc-inner { position: absolute; inset: 0; border-radius: var(--radius-lg, 12px); transition: transform .55s ease; transform-style: preserve-3d; }
  .battle-card.flipped .fc-inner { transform: rotateY(180deg); }
  .battle-card .fc-face { border-radius: var(--radius-lg, 12px); }
  .battle-card .fc-emoji { font-size: 2.2rem; }
  .battle-card .fc-term { font-size: 1.4rem; }
  .battle-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .battle-instruction { font-size: .7rem; font-weight: 700; color: var(--muted); text-align: center; }
  .battle-round { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--muted); text-align: center; }
  .btn--sm { font-size: .7rem; padding: 8px 14px; }
  .btn--blue { background: var(--blue, #4a9eff); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; }
  .btn--orange { background: var(--red, #e85d5d); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; }
  .btn--red { background: var(--red, #e85d5d); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; }
  .btn--green { background: var(--green, #4caf50); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
    <div class="tb-actions">
    <a class="lp-icon-btn" id="portalLink" href="https://genilsuarez.github.io/deskflow/" aria-label="Ir al portal DeskFlow" title="Portal">🏠</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
  </div>
  </div>

  <div class="header">
    <h1>⚖️ Word Relations</h1>

    <!-- Category: Opposites / Synonyms -->
    <div class="cat-bar" style="display:flex;gap:4px;">
      <button class="cat-btn active" data-cat="opposites">Opposites</button>
      <button class="cat-btn" data-cat="synonyms">Synonyms</button>
    </div>

    <!-- Modes -->
    <div class="pill-bar">
      <button class="pill-btn active" data-mode="study">📖 Study</button>
      <button class="pill-btn" data-mode="quiz">🎯 Quiz</button>
      <button class="pill-btn" data-mode="match">🔀 Match</button>
      <button class="pill-btn" data-mode="battle">⚔️ Battle</button>
      <button class="pill-btn" data-mode="timed">⏱️ Timed</button>
    </div>

    <div class="timer-bar" id="timerBar"><span class="timer-display" id="timerDisplay">1:00</span></div>

    <div class="progress">
      <div class="progress__labels"><span id="progTxt">0 / 50</span><span id="progPct">0%</span></div>
      <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
    </div>
  </div>

  <div class="scroll-body">
    <!-- STUDY -->
    <div data-area="study">
      <div class="fc-count" id="fcCounter">1 / 50</div>
      <button class="listen-btn" id="speakBtn" aria-label="Listen to pronunciation" style="width:48px;height:48px;border-radius:50%;border:2px solid var(--c-opp);background:rgba(61,127,127,.08);font-size:1.2rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;margin-bottom:6px;">🔊</button>
      <div class="fc-card" id="fcCard">
        <div class="fc-inner">
          <div class="fc-face opp-front">
            <div class="fc-emoji" id="fcEmoji"></div>
            <div class="fc-term" id="fcWord"></div>
            <div class="fc-hint">tap to flip</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-emoji" id="fcBackEmoji"></div>
            <div class="fc-term" id="fcBackWord"></div>
            <div class="fc-detail" id="fcBackExtra" style="font-size:.72rem;margin-top:4px;"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="btn btn--ghost" id="shuffleBtn">🔀</button>
        <button class="btn btn--ghost" id="prevBtn">←</button>
        <button class="btn btn--green" id="nextBtn">→</button>
      </div>
    </div>

    <!-- QUIZ -->
    <div data-area="quiz">
      <div class="quiz-card">
        <div class="q-emoji" id="quizEmoji"></div>
        <div class="q-word" id="quizWord"></div>
        <div class="q-label" id="quizLabel">What is the opposite?</div>
      </div>
      <div class="quiz-opts" id="quizOptions"></div>
    </div>

    <!-- MATCH -->
    <div data-area="match">
      <div class="pair-grid" id="pairGrid"></div>
      <div id="pairScore"></div>
    </div>

    <!-- BATTLE -->
    <div data-area="battle">
      <div class="battle-scores">
        <div class="player-score p1"><span class="p-label">Player 1</span><span class="p-points" id="bp1">0</span></div>
        <span class="vs-badge">vs</span>
        <div class="player-score p2"><span class="p-label">Player 2</span><span class="p-points" id="bp2">0</span></div>
      </div>
      <div class="battle-round" id="battleRound">Round 1 / 10</div>
      <div class="fc-card battle-card" id="battleCard">
        <div class="fc-inner">
          <div class="fc-face opp-front">
            <div class="fc-emoji" id="battleEmoji"></div>
            <div class="fc-term" id="battleTerm"></div>
            <div class="fc-hint">claim to answer</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-emoji" id="battleBackEmoji"></div>
            <div class="fc-term" id="battleBackTerm"></div>
          </div>
        </div>
      </div>
      <div class="battle-instruction" id="battleInstruction">Press 1 or 2 to claim · S to skip</div>
      <div class="battle-actions" id="battleActions">
        <button class="btn btn--blue btn--sm" id="bClaim1">1️⃣ P1</button>
        <button class="btn btn--ghost btn--sm" id="bSkip">⏭️ Skip</button>
        <button class="btn btn--orange btn--sm" id="bClaim2">2️⃣ P2</button>
      </div>
      <div class="battle-actions" id="battleJudge" style="display:none;">
        <button class="btn btn--green btn--sm" id="bCorrect">✓ Correct (Y)</button>
        <button class="btn btn--red btn--sm" id="bWrong">✗ Wrong (N)</button>
      </div>
      <div class="battle-actions" id="battleNext" style="display:none;">
        <button class="btn btn--green btn--sm" id="bNext">→ Next (Space)</button>
      </div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { PAIRS, SYNONYMS } from '../data/opposites.js';
import { shuffle, initTheme, toggleTheme, recordScore, getStars, Timer, formatTime, speak, isSpeechAvailable } from '../js/utils.js';

initTheme();
document.getElementById('themeToggle').addEventListener('click', () => toggleTheme());

// TTS: bind speak button
let currentTerm = '';
const speakBtn = document.getElementById('speakBtn');
if (speakBtn && isSpeechAvailable()) {
  speakBtn.addEventListener('click', () => { if (currentTerm) speak(currentTerm); });
} else if (speakBtn) { speakBtn.style.display = 'none'; }

let currentCat = 'opposites';
let mode = 'study';
let data = PAIRS;
let deck = [], cardIdx = 0;
let quizDeck = [], quizIdx = 0, quizScore = 0, quizTotal = 12;
let pairState = {};
let timer = null;
let timedSeconds = 0;

// ─── Category switching ───
document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentCat = btn.dataset.cat;
    data = currentCat === 'synonyms' ? SYNONYMS : PAIRS;
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
    startMode();
  });
});

// ─── Mode switching ───
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    startMode();
  });
});

function startMode() {
  stopTimer();
  document.querySelectorAll('[data-area]').forEach(a => a.classList.remove('show'));
  document.getElementById('timerBar').classList.remove('show');
  if (mode === 'study') initStudy();
  else if (mode === 'quiz') initQuiz(false);
  else if (mode === 'match') initMatch();
  else if (mode === 'battle') initBattle();
  else if (mode === 'timed') initQuiz(true);
}

function stopTimer() { if (timer) { timer.stop(); timer = null; } timedSeconds = 0; }

// ─── STUDY ───
function initStudy() {
  deck = shuffle(data.flatMap(p => [{ ...p, swap: false }, { ...p, swap: true }]));
  cardIdx = 0;
  document.querySelector('[data-area="study"]').classList.add('show');
  renderCard();
}

function renderCard() {
  const item = deck[cardIdx];
  const card = document.getElementById('fcCard');
  card.classList.remove('flip');

  const word = item.swap ? item.b : item.a;
  const opp = item.swap ? item.a : item.b;
  const emoji = item.swap ? item.eb : item.ea;
  const oppEmoji = item.swap ? item.ea : item.eb;

  document.getElementById('fcEmoji').textContent = emoji;
  document.getElementById('fcWord').textContent = word;
  document.getElementById('fcWord').className = 'fc-term ' + (item.swap ? 'red' : 'blue');
  currentTerm = word;

  document.getElementById('fcBackEmoji').textContent = oppEmoji;
  document.getElementById('fcBackWord').textContent = opp;
  document.getElementById('fcBackExtra').textContent = `${word} ↔ ${opp}\n🇪🇸 ${item.es}`;

  document.getElementById('fcCounter').textContent = `${cardIdx + 1} / ${deck.length}`;
  updProgress(cardIdx + 1, deck.length);
}

document.getElementById('fcCard').addEventListener('click', () => document.getElementById('fcCard').classList.toggle('flip'));
document.getElementById('nextBtn').addEventListener('click', (e) => { e.target.blur(); advanceCard(1); });
document.getElementById('prevBtn').addEventListener('click', (e) => { e.target.blur(); advanceCard(-1); });
document.getElementById('shuffleBtn').addEventListener('click', (e) => { e.target.blur(); deck = shuffle(deck); cardIdx = 0; renderCard(); });

function advanceCard(dir) {
  const card = document.getElementById('fcCard');
  const inner = card.querySelector('.fc-inner');
  // If flipped, skip the unflip animation so the answer isn't briefly visible
  if (card.classList.contains('flip')) {
    inner.style.transition = 'none';
    card.classList.remove('flip');
    // Force reflow so the instant unflip takes effect
    void inner.offsetHeight;
    inner.style.transition = '';
  }
  cardIdx = (cardIdx + dir + deck.length) % deck.length;
  renderCard();
}

document.addEventListener('keydown', e => {
  if (mode === 'battle') {
    if (battle.phase === 'claim') {
      if (e.key === '1') { e.preventDefault(); battleClaim(1); }
      else if (e.key === '2') { e.preventDefault(); battleClaim(2); }
      else if (e.key === 's' || e.key === 'S') { e.preventDefault(); battleSkip(); }
    } else if (battle.phase === 'judge') {
      if (e.key === 'y' || e.key === 'Y' || e.key === 'Enter') { e.preventDefault(); battleJudge(true); }
      else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); battleJudge(false); }
    } else if (battle.phase === 'next') {
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowRight') { e.preventDefault(); battleNext(); }
    }
    return;
  }
  if (mode !== 'study') return;
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
      document.activeElement.blur();
    }
    const card = document.getElementById('fcCard');
    if (card.classList.contains('flip')) { advanceCard(1); }
    else { card.classList.add('flip'); }
  } else if (e.key === 'ArrowRight') { e.preventDefault(); advanceCard(1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); advanceCard(-1); }
});

// ─── QUIZ / TIMED ───
function initQuiz(timed) {
  quizDeck = shuffle([...data]);
  quizIdx = 0; quizScore = 0;
  quizTotal = Math.min(timed ? 10 : 15, quizDeck.length);
  document.querySelector('[data-area="quiz"]').classList.add('show');

  if (timed) {
    document.getElementById('timerBar').classList.add('show');
    timedSeconds = quizTotal * 7;

    timer = new Timer(timedSeconds,
      r => { const el = document.getElementById('timerDisplay'); el.textContent = formatTime(r); el.classList.toggle('warn', r <= 10); },
      () => showResult()
    );
    timer.start();
  }
  renderQuiz();
}

function renderQuiz() {
  if (quizIdx >= quizTotal) { stopTimer(); showResult(); return; }
  const pair = quizDeck[quizIdx];
  const askA = Math.random() < 0.5;
  const word = askA ? pair.a : pair.b;
  const correct = askA ? pair.b : pair.a;
  const emoji = askA ? pair.ea : pair.eb;

  document.getElementById('quizEmoji').textContent = emoji;
  document.getElementById('quizWord').textContent = word;
  document.getElementById('quizLabel').textContent = currentCat === 'synonyms' ? 'Find the synonym' : 'Find the opposite';

  const others = data.filter(p => p !== pair);
  const distractors = shuffle(others).slice(0, 3).map(p => Math.random() < 0.5 ? p.a : p.b);
  const options = shuffle([correct, ...distractors]);

  const optsEl = document.getElementById('quizOptions');
  optsEl.innerHTML = options.map(o => `<button class="quiz-opt">${o}</button>`).join('');
  optsEl.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      optsEl.querySelectorAll('.quiz-opt').forEach(b => { b.classList.add('disabled'); b.style.pointerEvents = 'none'; });
      if (btn.textContent === correct) { btn.classList.add('correct'); quizScore++; }
      else { btn.classList.add('wrong'); optsEl.querySelectorAll('.quiz-opt').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); }); }
      quizIdx++;
      updProgress(quizIdx, quizTotal);
      setTimeout(renderQuiz, 750);
    });
  });
  updProgress(quizIdx, quizTotal);
}

// ─── MATCH ───
function initMatch() {
  const selected = shuffle([...data]).slice(0, 8);
  pairState = { left: null, right: null, matched: 0, total: selected.length, errors: 0, pairs: selected };
  document.querySelector('[data-area="match"]').classList.add('show');
  renderPairGrid();
}

function renderPairGrid() {
  const grid = document.getElementById('pairGrid');
  const leftItems = shuffle([...pairState.pairs]);
  const rightItems = shuffle([...pairState.pairs]);
  const leftLabel = '🇬🇧 Word';
  const rightLabel = currentCat === 'synonyms' ? '🔗 Synonym' : '↔ Opposite';

  grid.innerHTML = `<div class="pair-col-label">${leftLabel}</div><div class="pair-col-label">${rightLabel}</div>` +
    leftItems.map((item, i) => {
      const r = rightItems[i];
      return `<div class="pair-item pair-left" data-term="${item.a}">${item.ea} ${item.a}</div><div class="pair-item pair-right" data-term="${r.a}">${r.b}</div>`;
    }).join('');

  grid.querySelectorAll('.pair-left').forEach(el => el.addEventListener('click', () => selectPair(el, 'left')));
  grid.querySelectorAll('.pair-right').forEach(el => el.addEventListener('click', () => selectPair(el, 'right')));
  updatePairScore();
}

function selectPair(el, side) {
  if (el.classList.contains('matched')) return;
  if (side === 'left') { if (pairState.left) pairState.left.classList.remove('selected'); pairState.left = el; }
  else { if (pairState.right) pairState.right.classList.remove('selected'); pairState.right = el; }
  el.classList.add('selected');
  if (pairState.left && pairState.right) checkPair();
}

function checkPair() {
  const lTerm = pairState.left.dataset.term;
  const rTerm = pairState.right.dataset.term;
  if (lTerm === rTerm) {
    pairState.left.classList.remove('selected'); pairState.right.classList.remove('selected');
    pairState.left.classList.add('matched'); pairState.right.classList.add('matched');
    pairState.matched++;
    if (pairState.matched === pairState.total) setTimeout(() => showResult(), 500);
  } else {
    pairState.errors++;
    const l = pairState.left, r = pairState.right;
    l.classList.remove('selected'); r.classList.remove('selected');
    l.classList.add('wrong-flash'); r.classList.add('wrong-flash');
    setTimeout(() => { l.classList.remove('wrong-flash'); r.classList.remove('wrong-flash'); }, 350);
  }
  pairState.left = null; pairState.right = null;
  updatePairScore();
}

function updatePairScore() {
  const el = document.getElementById('pairScore');
  if (el) el.textContent = `✓ ${pairState.matched}/${pairState.total}${pairState.errors ? '  · ' + pairState.errors + ' errors' : ''}`;
}

// ─── UTILS ───
function updProgress(current, total) {
  const pct = Math.round((current / total) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = `${current} / ${total}`;
  document.getElementById('progPct').textContent = pct + '%';
}

function showResult() {
  stopTimer();
  const correct = mode === 'match' ? Math.max(0, pairState.total - pairState.errors) : quizScore;
  const total = mode === 'match' ? pairState.total : quizTotal;
  const pct = Math.round((correct / total) * 100);
  recordScore(`wr-${currentCat}-${mode}`, pct);
  const stars = getStars(pct);
  const titles = { 3: 'Perfect! 🎉', 2: 'Well done!', 1: 'Keep practicing!' };
  const overlay = document.getElementById('resultOverlay');
  overlay.innerHTML = `<div class="result-box">
    <div class="result-stars"><span class="result-star ${stars>=1?'lit':''}">⭐</span><span class="result-star ${stars>=2?'lit':''}">⭐</span><span class="result-star ${stars>=3?'lit':''}">⭐</span></div>
    <div class="result-title">${titles[stars]}</div>
    <div class="result-sub">${correct}/${total} — ${pct}%</div>
    <div class="result-btns"><button class="btn btn--green" id="rr">🔄 Again</button><button class="btn btn--ghost" id="rs">📖 Study</button></div>
  </div>`;
  overlay.classList.add('show');
  overlay.querySelector('#rr').addEventListener('click', () => { overlay.classList.remove('show'); startMode(); });
  overlay.querySelector('#rs').addEventListener('click', () => { overlay.classList.remove('show'); mode='study'; document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode==='study')); startMode(); });
}

// ─── BATTLE ───
let battle = { p1: 0, p2: 0, round: 0, total: 10, claimer: null, deck: [], phase: 'claim' };

function initBattle() {
  battle = { p1: 0, p2: 0, round: 0, total: Math.min(10, data.length), claimer: null, deck: shuffle([...data]), phase: 'claim' };
  document.querySelector('[data-area="battle"]').classList.add('show');
  updateBattleScores();
  showBattleCard();
}

function showBattleCard() {
  if (battle.round >= battle.total) { showBattleResult(); return; }
  const pair = battle.deck[battle.round];
  const askA = Math.random() < 0.5;
  battle.currentWord = askA ? pair.a : pair.b;
  battle.currentAnswer = askA ? pair.b : pair.a;
  battle.currentEmoji = askA ? pair.ea : pair.eb;
  battle.answerEmoji = askA ? pair.eb : pair.ea;

  const card = document.getElementById('battleCard');
  card.classList.remove('flipped');
  document.getElementById('battleEmoji').textContent = battle.currentEmoji;
  document.getElementById('battleTerm').textContent = battle.currentWord;
  document.getElementById('battleBackEmoji').textContent = battle.answerEmoji;
  document.getElementById('battleBackTerm').textContent = battle.currentAnswer;

  document.getElementById('battleRound').textContent = `Round ${battle.round + 1} / ${battle.total}`;
  updProgress(battle.round + 1, battle.total);
  setBattlePhase('claim');
}function setBattlePhase(phase) {
  battle.phase = phase;
  document.getElementById('battleActions').style.display = phase === 'claim' ? 'flex' : 'none';
  document.getElementById('battleJudge').style.display = phase === 'judge' ? 'flex' : 'none';
  document.getElementById('battleNext').style.display = phase === 'next' ? 'flex' : 'none';

  const instructions = { claim: 'Press 1 or 2 to claim · S to skip', judge: `Player ${battle.claimer} answers — was it correct?`, next: 'Press Space or → to continue' };
  document.getElementById('battleInstruction').textContent = instructions[phase] || '';
}

function battleClaim(player) {
  battle.claimer = player;
  document.getElementById('battleCard').classList.add('flipped');
  setBattlePhase('judge');
}

function battleSkip() {
  battle.round++;
  showBattleCard();
}

function battleJudge(correct) {
function battleJudge(correct) {
  if (correct) battle[`p${battle.claimer}`]++;
  else battle[`p${battle.claimer === 1 ? 2 : 1}`]++;
  updateBattleScores();
  setBattlePhase('next');
}

function battleNext() {
  battle.round++;
  showBattleCard();
}

function updateBattleScores() {
  document.getElementById('bp1').textContent = battle.p1;
  document.getElementById('bp2').textContent = battle.p2;
}

function showBattleResult() {
  const winner = battle.p1 > battle.p2 ? 'Player 1 wins! 🎉' : battle.p2 > battle.p1 ? 'Player 2 wins! 🎉' : "It's a tie! 🤝";
  const overlay = document.getElementById('resultOverlay');
  overlay.innerHTML = `<div class="result-box">
    <div class="result-title">${winner}</div>
    <div class="result-sub" style="font-size:1.2rem;margin:8px 0;">🔵 ${battle.p1} — ${battle.p2} 🔴</div>
    <div class="result-sub">${battle.total} rounds</div>
    <div class="result-btns"><button class="btn btn--green" id="rr">🔄 Rematch</button><button class="btn btn--ghost" id="rs">📖 Study</button></div>
  </div>`;
  overlay.classList.add('show');
  overlay.querySelector('#rr').addEventListener('click', () => { overlay.classList.remove('show'); initBattle(); });
  overlay.querySelector('#rs').addEventListener('click', () => { overlay.classList.remove('show'); mode='study'; document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode==='study')); startMode(); });
}

// Battle button handlers
document.getElementById('bClaim1').addEventListener('click', () => battleClaim(1));
document.getElementById('bClaim2').addEventListener('click', () => battleClaim(2));
document.getElementById('bSkip').addEventListener('click', () => battleSkip());
document.getElementById('bCorrect').addEventListener('click', () => battleJudge(true));
document.getElementById('bWrong').addEventListener('click', () => battleJudge(false));
document.getElementById('bNext').addEventListener('click', () => battleNext());

// Init
startMode();
</script>
