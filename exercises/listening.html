<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8860B'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="../js/theme-init.js"></script>
<script src="../js/lp-nav-icons.js"></script>
<script src="../lp-login.js"></script>
<style>body{background:#FAF7F2;color:#2C2418}[data-theme="dark"] body{background:#181B20;color:#E8EAED}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<link rel="stylesheet" href="../css/sidebar.css">
<style>
  body { min-height: 100vh; padding: 0 14px; }
  .pill-btn.active { background: var(--lp-cat-amber); color: #fff; box-shadow: 0 2px 10px rgba(184,134,11,.25); }
  .progress__fill { background: var(--lp-cat-amber); }

  .cat-bar { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
  .cat-bar::-webkit-scrollbar { display: none; }

  [data-area] { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
  [data-area].show { display: flex; }

  /* Listen button (inline with actions) */
  .listen-btn {
    width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--lp-cat-amber);
    background: rgba(184,134,11,.10); display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; cursor: pointer; transition: all .2s;
  }
  .listen-btn:hover { background: rgba(184,134,11,.2); transform: scale(1.06); }
  .listen-btn:active { transform: scale(.95); }
  .listen-btn:focus-visible { outline: 2px solid var(--lp-accent); outline-offset: 2px; }
  .listen-btn.playing { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  .practice-actions { display: flex; justify-content: center; gap: 8px; }

  .sc-counter { font-size: .62rem; font-weight: 700; color: var(--lp-muted); }

  /* Options */
  .word-options { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 720px; }
  .word-opt {
    font-family: var(--lp-font-body); font-weight: 700; font-size: .9rem;
    padding: 14px 20px; border-radius: var(--lp-radius-sm); border: 1.5px solid var(--lp-border);
    background: var(--lp-surface); color: var(--lp-ink); cursor: pointer;
    transition: all .2s var(--lp-ease); min-width: 90px; text-align: center;
  }
  .word-opt:hover:not(.disabled) { border-color: var(--lp-cat-amber); background: rgba(184,134,11,.08); transform: translateY(-2px); }
  .word-opt.correct { border-color: var(--lp-success); background: var(--lp-success-soft); color: var(--lp-success-dark); }
  .word-opt.wrong { border-color: var(--lp-error); background: var(--lp-error-soft); color: var(--lp-error-dark); }
  .word-opt.disabled { cursor: default; opacity: .7; }
  [data-theme="dark"] .word-opt.correct { color: #6FE8A8; }
  [data-theme="dark"] .word-opt.wrong { color: #FF9F9F; }

  /* Revealed sentence (after answering) */
  .reveal-box {
    width: 100%; max-width: 720px; font-family: var(--lp-font-display); font-size: 1.05rem; font-weight: 500;
    color: var(--lp-ink); background: var(--lp-bg-paper); border: 1px solid var(--lp-border);
    border-radius: var(--lp-radius-sm); padding: 12px 16px; text-align: center; min-height: 2.6em; line-height: 1.5;
  }
  .reveal-box .hl { color: var(--lp-cat-amber); font-weight: 700; }

  .no-tts {
    max-width: 720px; font-size: .8rem; color: var(--lp-error-dark); background: var(--lp-error-soft);
    border: 1px solid var(--lp-error); border-radius: var(--lp-radius-sm); padding: 12px 16px; text-align: center;
    display: none;
  }
  .no-tts.show { display: block; }

  .scroll-body { padding: 8px 0 30px; }

  @media (max-width: 480px) {
    .word-opt { min-width: 76px; padding: 12px 16px; font-size: .84rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
  </div>

  <div class="header">
    <h1>🎧 Listening</h1>

    <div class="cat-bar" id="catBar"></div>

    <div class="pill-bar">
      <button class="pill-btn active" data-mode="practice">🎯 Practice</button>
      <button class="pill-btn" data-mode="timed">⏱️ Timed</button>
    </div>

    <div class="timer-bar" id="timerBar"><span class="timer-display" id="timerDisplay">1:00</span></div>

    <div class="progress">
      <div class="progress__labels"><span id="progTxt">0 / 10</span><span id="progPct">0%</span></div>
      <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
    </div>
  </div>

  <div class="scroll-body">
    <div class="no-tts" id="noTts">
      🔇 Tu navegador no soporta síntesis de voz (Web Speech API). Prueba en Chrome o Safari de escritorio.
    </div>

    <!-- PRACTICE / TIMED -->
    <div data-area="practice">
      <div class="sc-counter" id="scCounter"></div>
      <div class="word-options" id="wordOptions"></div>
      <div class="practice-actions">
        <button class="listen-btn" id="listenBtn" aria-label="Play audio">🔊</button>
      </div>
      <div class="reveal-box" id="revealBox">Listen and choose the word you hear.</div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/listening.js';
import { shuffle, initTheme, toggleTheme, recordScore, Timer, formatTime, showResult, speak, isSpeechAvailable } from '../js/utils.js';

initTheme();
document.getElementById('themeToggle')?.addEventListener('click', () => toggleTheme());

if (!isSpeechAvailable()) document.getElementById('noTts').classList.add('show');

const catKeys = Object.keys(CATEGORIES);
let currentCat = catKeys[0];
let mode = 'practice';
let deck = [], idx = 0, score = 0, total = 0;
let timer = null;
let timedSeconds = 0;
let answered = false;

const listenBtn = document.getElementById('listenBtn');

function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = catKeys.map(k =>
    `<button class="cat-btn ${k === currentCat ? 'active' : ''}" data-cat="${k}">${CATEGORIES[k].icon} ${CATEGORIES[k].label}</button>`
  ).join('');
  bar.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      bar.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
      startMode();
    });
  });
}
renderCatBar();

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    startMode();
  });
});

function startMode() {
  stopTimer();
  document.querySelectorAll('[data-area]').forEach(a => a.classList.remove('show'));
  document.getElementById('timerBar').classList.remove('show');
  initPractice(mode === 'timed');
}

function stopTimer() { if (timer) { timer.stop(); timer = null; } timedSeconds = 0; }
function getData() { return CATEGORIES[currentCat].items; }

function updProgress(current, t) {
  const pct = Math.round((current / t) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = `${current} / ${t}`;
  document.getElementById('progPct').textContent = pct + '%';
}

function playCurrent(rate = 0.85) {
  const item = deck[idx];
  if (!item) return;
  listenBtn.classList.add('playing');
  speak(item.text, { rate });
  setTimeout(() => listenBtn.classList.remove('playing'), Math.min(item.text.length * 90, 4000));
}

listenBtn.addEventListener('click', () => playCurrent());

function initPractice(timed) {
  deck = shuffle(getData());
  idx = 0; score = 0;
  total = Math.min(timed ? 8 : deck.length, deck.length);
  document.querySelector('[data-area="practice"]').classList.add('show');

  if (timed) {
    document.getElementById('timerBar').classList.add('show');
    timedSeconds = total * 9;

    timer = new Timer(timedSeconds,
      r => { const el = document.getElementById('timerDisplay'); el.textContent = formatTime(r); el.classList.toggle('warn', r <= 10); },
      () => finishPractice()
    );
    timer.start();
  }
  renderQuestion();
}

function renderQuestion() {
  if (idx >= total) { finishPractice(); return; }
  const item = deck[idx];
  answered = false;

  document.getElementById('scCounter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('revealBox').innerHTML = 'Listen and choose the word you hear.';

  const opts = shuffle([...item.options]);
  const optsEl = document.getElementById('wordOptions');
  optsEl.innerHTML = opts.map(o => `<button class="word-opt" data-val="${o}">${o}</button>`).join('');
  optsEl.querySelectorAll('.word-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      if (answered) return;
      answered = true;
      optsEl.querySelectorAll('.word-opt').forEach(b => { b.classList.add('disabled'); b.style.pointerEvents = 'none'; });
      const chosen = btn.dataset.val;
      if (chosen === item.blank) { btn.classList.add('correct'); score++; }
      else {
        btn.classList.add('wrong');
        optsEl.querySelectorAll('.word-opt').forEach(b => { if (b.dataset.val === item.blank) b.classList.add('correct'); });
      }
      // Reveal the full sentence with the target highlighted
      const highlighted = item.text.replace(item.blank, `<span class="hl">${item.blank}</span>`);
      document.getElementById('revealBox').innerHTML = highlighted;
      idx++;
      updProgress(idx, total);
      setTimeout(renderQuestion, 1800);
    });
  });
  updProgress(idx, total);

  // Auto-play the audio when the question appears
  setTimeout(() => playCurrent(), 250);
}

function finishPractice() {
  const elapsed = timedSeconds ? timedSeconds - (timer && timer.remaining != null ? timer.remaining : 0) : null;
  stopTimer();
  const pct = showResult({
    correct: score, total,
    containerEl: document.getElementById('resultOverlay'),
    onRestart: () => startMode(),
    onStudy: null,
    elapsedSeconds: elapsed
  });
  recordScore(`listen-${currentCat}`, pct);
}

startMode();
</script>

<script type="module" src="../js/exercise-shell.js"></script>
</body>
</html>
