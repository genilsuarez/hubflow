<html lang="en">
<head>

  <link rel="stylesheet" href="../css/buttons.css">

<style>
  body { min-height: 100vh; padding: 0 14px; }
  .progress__fill { background: var(--lp-cat-teal); }

  .cat-bar { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
  .cat-bar::-webkit-scrollbar { display: none; }

  [data-area] { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
  [data-area].show { display: flex; }

  /* Question card */
  .ooo-card {
    width: 100%; max-width: 720px; background: var(--lp-surface); border: 1.5px solid var(--lp-border);
    border-radius: var(--lp-radius-lg); padding: 24px; box-shadow: var(--lp-shadow-md); text-align: center;
  }
  .ooo-card__counter {
    font-size: .65rem; font-weight: 700; color: var(--lp-muted); text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 8px;
  }
  .ooo-card__prompt {
    font-family: var(--lp-font-display); font-size: 1.1rem; font-weight: 600; color: var(--lp-ink);
    margin-bottom: 16px;
  }

  /* Options */
  .ooo-options {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    width: 100%; max-width: 720px;
  }
  .ooo-opt {
    font-family: var(--lp-font-body); font-weight: 700; font-size: .88rem;
    padding: 14px 16px; border-radius: var(--lp-radius-md); border: 1.5px solid var(--lp-border);
    background: var(--lp-surface); color: var(--lp-ink); cursor: pointer;
    transition: all .2s var(--lp-ease); text-align: center;
    box-shadow: var(--lp-shadow-sm);
  }
  .ooo-opt:hover:not(.disabled) { border-color: var(--lp-cat-teal); background: rgba(61,127,127,.06); transform: translateY(-2px); box-shadow: var(--lp-shadow-md); }
  .ooo-opt.correct { border-color: var(--lp-success); background: var(--lp-success-soft); color: var(--lp-success-dark); }
  .ooo-opt.wrong { border-color: var(--lp-error); background: var(--lp-error-soft); color: var(--lp-error-dark); }
  .ooo-opt.disabled { cursor: default; opacity: .8; }
  [data-theme="dark"] .ooo-opt.correct { color: #6FE8A8; }
  [data-theme="dark"] .ooo-opt.wrong { color: #FF9F9F; }

  /* Explanation */
  .ooo-explanation {
    width: 100%; max-width: 720px; background: var(--lp-surface); border: 1px solid var(--lp-border);
    border-radius: var(--lp-radius-sm); padding: 12px 16px; font-size: .78rem; line-height: 1.5;
    display: none; text-align: left; box-shadow: var(--lp-shadow-sm);
  }
  .ooo-explanation.show { display: block; }
  .ooo-explanation strong { color: var(--lp-cat-teal); }
  .ooo-explanation .ooo-group { color: var(--lp-muted); font-weight: 600; font-size: .7rem; margin-top: 4px; }

  .scroll-body { padding: 8px 0 30px; }

  @media (max-width: 400px) {
    .ooo-options { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
  </div>

  <header class="header">
    <h1>🧠 Odd One Out</h1>
    <div class="pill-bar pill-bar--scroll" role="tablist">
      <button class="pill-btn active" data-mode="quiz" role="tab">🎯 Quiz</button>
      <button class="pill-btn" data-mode="timed" role="tab">⏱️ Timed</button>
    </div>
  </header>

  <div class="cat-bar" id="catBar"></div>

  <div class="progress">
    <div class="progress__labels"><span id="progTxt">0 / 15</span><span id="progPct">0%</span></div>
    <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
  </div>

  <div class="timer-bar" id="timerBar">
    <span class="timer-display" id="timerDisplay">1:30</span>
  </div>

  <div class="scroll-body">
    <div data-area="quiz">
      <div class="ooo-card">
        <div class="ooo-card__counter" id="qCounter">1 / 15</div>
        <div class="ooo-card__prompt">Which word doesn't belong?</div>
      </div>

      <div class="ooo-options" id="qOptions"></div>

      <div class="ooo-explanation" id="qExplanation"></div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/odd-one-out.js';
import { shuffle, Timer, formatTime, showResult, recordScore } from '../js/utils.js';


const catKeys = Object.keys(CATEGORIES);
let currentCat = catKeys[0];
let mode = 'quiz';
let deck = [], idx = 0, score = 0;
let answered = false;
let timer = null;
let timedSeconds = 0;

// ─── Category bar ───
function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = catKeys.map(k =>
    `<button class="cat-btn ${k === currentCat ? 'active' : ''}" data-cat="${k}">${CATEGORIES[k].icon} ${CATEGORIES[k].label} <span style="font-size:.6rem;opacity:.7">${CATEGORIES[k].level}</span></button>`
  ).join('');
  bar.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      bar.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
      startMode();
    });
  });
}
renderCatBar();

// ─── Mode switching ───
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    startMode();
  });
});

function startMode() {
  stopTimer();
  deck = shuffle(CATEGORIES[currentCat].items);
  idx = 0; score = 0;
  document.getElementById('timerBar').classList.toggle('show', mode === 'timed');
  document.querySelector('[data-area="quiz"]').classList.add('show');

  if (mode === 'timed') {
    timedSeconds = 90;

    timer = new Timer(timedSeconds,
      r => { const el = document.getElementById('timerDisplay'); el.textContent = formatTime(r); el.classList.toggle('warn', r <= 10); },
      () => finish()
    );
    timer.start();
  }
  renderQuestion();
}

function stopTimer() { if (timer) { timer.stop(); timer = null; } timedSeconds = 0; }

function renderQuestion() {
  if (idx >= deck.length) { finish(); return; }
  answered = false;
  const item = deck[idx];

  document.getElementById('qCounter').textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById('qExplanation').classList.remove('show');

  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = item.words.map((w, i) =>
    `<button class="ooo-opt" data-idx="${i}">${w}</button>`
  ).join('');

  optsEl.querySelectorAll('.ooo-opt').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx), item));
  });

  updateProgress();
}

function handleAnswer(chosen, item) {
  if (answered) return;
  answered = true;

  const optsEl = document.getElementById('qOptions');
  optsEl.querySelectorAll('.ooo-opt').forEach(btn => {
    btn.classList.add('disabled');
    const i = parseInt(btn.dataset.idx);
    if (i === item.odd) btn.classList.add('correct');
    if (i === chosen && chosen !== item.odd) btn.classList.add('wrong');
  });

  if (chosen === item.odd) score++;

  // Show explanation
  const expEl = document.getElementById('qExplanation');
  expEl.innerHTML = `<strong>${item.words[item.odd]}</strong> — ${item.reason}<div class="ooo-group">The others: ${item.group}</div>`;
  expEl.classList.add('show');

  // Auto-advance
  setTimeout(() => { idx++; renderQuestion(); }, mode === 'timed' ? 1800 : 2200);
}

function updateProgress() {
  const pct = deck.length > 0 ? Math.round((idx / deck.length) * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = `${idx} / ${deck.length}`;
  document.getElementById('progPct').textContent = pct + '%';
}

function finish() {
  stopTimer();
  const pct = Math.round((score / deck.length) * 100);
  showResult({
    correct: score,
    total: deck.length,
    containerEl: document.getElementById('resultOverlay'),
    onRestart: () => startMode(),
    onStudy: null
  });
  recordScore(`odd-${currentCat}`, pct);
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progTxt').textContent = `${deck.length} / ${deck.length}`;
  document.getElementById('progPct').textContent = '100%';
}

// ─── Keyboard: 1-4 to select ───
document.addEventListener('keydown', e => {
  if (answered) return;
  const num = parseInt(e.key);
  if (num >= 1 && num <= 4) {
    e.preventDefault();
    const btn = document.querySelector(`.ooo-opt[data-idx="${num - 1}"]`);
    if (btn) btn.click();
  }
});

startMode();
</script>

<script type="module" src="../js/exercise-shell.js"></script>
</body>
</html>
