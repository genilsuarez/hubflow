<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Combining — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23357ABD'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="../js/theme-init.js"></script>
<style>body{background:#FAF7F2;color:#2C2418}[data-theme="dark"] body{background:#1A1714;color:#EDE8E0}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<style>
  body { min-height: 100vh; padding: 0 14px 40px; }
  .header { padding: 6px 0; }
  h1 { font-family: 'Newsreader', serif; font-weight: 600; font-size: 1.4rem; margin-bottom: 6px; }
  .back-link { color: var(--lp-cat-blue); }
  .pill-btn.active { background: var(--lp-cat-blue); color: #fff; box-shadow: 0 2px 10px rgba(53,122,189,.25); }
  .progress__fill { background: var(--lp-cat-blue); }

  .cat-bar { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
  .cat-bar::-webkit-scrollbar { display: none; }

  [data-area] { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
  [data-area].show { display: flex; }

  .sc-card {
    width: 100%; max-width: 520px; background: var(--lp-surface); border: 1.5px solid var(--lp-border);
    border-radius: var(--lp-radius-lg); padding: 20px; box-shadow: var(--lp-shadow-sm);
  }
  .sc-sentence {
    display: flex; align-items: baseline; gap: 8px; font-family: var(--lp-font-display);
    font-size: 1rem; color: var(--lp-ink); line-height: 1.6; padding: 6px 0;
  }
  .sc-sentence + .sc-sentence { border-top: 1px dashed var(--lp-border); }
  .sc-num { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: var(--lp-cat-blue);
    color: #fff; font-size: .68rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .sc-counter { font-size: .62rem; font-weight: 700; color: var(--lp-muted); text-align: center; margin-top: 4px; }

  .answer-input {
    width: 100%; max-width: 480px; padding: 12px 16px; font-size: .95rem; text-align: center;
    border-radius: var(--lp-radius-md); border: 2px solid var(--lp-border); background: var(--lp-surface);
    color: var(--lp-ink); outline: none; transition: border-color .2s; font-family: var(--lp-font-body);
  }
  .answer-input:focus { border-color: var(--lp-cat-blue); }
  .answer-input.correct { border-color: var(--lp-success); }
  .answer-input.wrong { border-color: var(--lp-error); }

  .hint-box, .explain-box {
    width: 100%; max-width: 480px; font-size: .75rem; font-weight: 600; color: var(--lp-ink-soft);
    background: var(--lp-bg-paper); border: 1px solid var(--lp-border); border-radius: var(--lp-radius-sm);
    padding: 10px 14px; text-align: center; min-height: 2.4em; line-height: 1.5;
  }
  .hint-box { display: none; }
  .hint-box.show { display: block; }

  .sc-answers { width: 100%; max-width: 480px; display: none; flex-direction: column; gap: 6px; }
  .sc-answers.show { display: flex; }
  .sc-answer-item {
    background: var(--lp-success-soft); border: 1px solid var(--lp-success); border-radius: var(--lp-radius-sm);
    padding: 8px 12px; font-size: .8rem; color: var(--lp-success-dark); text-align: center;
  }

  .scroll-body { padding: 8px 0 30px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
    <div class="tb-actions">
      <a class="lp-icon-btn" id="portalLink" href="https://genilsuarez.github.io/deskflow/" aria-label="Ir al portal DeskFlow" title="Portal">🏠</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
    </div>
  </div>

  <header class="header">
    <h1>🧵 Sentence Combining</h1>
    <div class="pill-bar pill-bar--scroll" role="tablist">
      <button class="pill-btn active" data-mode="practice" role="tab">📝 Practice</button>
      <button class="pill-btn" data-mode="timed" role="tab">⏱️ Timed</button>
    </div>
  </header>

  <div class="cat-bar" id="catBar"></div>

  <div class="progress">
    <div class="progress__labels"><span id="progTxt">0 / 10</span><span id="progPct">0%</span></div>
    <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
  </div>

  <div class="timer-bar" id="timerBar"><span class="timer-display" id="timerDisplay">3:00</span></div>

  <div class="scroll-body">
    <div data-area="practice" class="show">
      <div class="sc-card">
        <div class="sc-sentence"><span class="sc-num">1</span><span id="scSent1"></span></div>
        <div class="sc-sentence"><span class="sc-num">2</span><span id="scSent2"></span></div>
      </div>
      <div class="sc-counter" id="scCounter"></div>

      <button class="btn btn--ghost btn--sm" id="hintBtn">💡 Hint</button>
      <div class="hint-box" id="hintBox"></div>

      <input class="answer-input" id="answerInput" placeholder="Combine into one sentence..." autocomplete="off" autocapitalize="sentences" spellcheck="false">

      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn--primary" id="checkBtn">Check ✓</button>
        <button class="btn btn--ghost" id="nextBtn" style="display:none">Next →</button>
      </div>

      <div class="explain-box" id="explainBox"></div>
      <div class="sc-answers" id="scAnswers"></div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/sentence-combining.js';
import { shuffle, initTheme, toggleTheme, recordScore, Timer, formatTime, showResult } from '../js/utils.js';

initTheme();
document.getElementById('themeToggle').addEventListener('click', () => toggleTheme());

function normalize(s) {
  return (s || '').toLowerCase().trim().replace(/[.,!?;:]+$/, '').replace(/\s+/g, ' ');
}
function isMatch(userAnswer, correctArray) {
  const n = normalize(userAnswer);
  return n.length > 0 && correctArray.some(c => normalize(c) === n);
}

const catKeys = Object.keys(CATEGORIES);
let currentCat = catKeys[0];
let mode = 'practice';
let deck = [], idx = 0, score = 0, total = 0;
let answered = false;
let timer = null;
let timedSeconds = 0;

function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = catKeys.map(k =>
    `<button class="cat-btn ${k === currentCat ? 'active' : ''}" data-cat="${k}">${CATEGORIES[k].icon} ${CATEGORIES[k].label}</button>`
  ).join('');
  bar.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      bar.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
      startMode();
    });
  });
}
renderCatBar();

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    startMode();
  });
});

function stopTimer() { if (timer) { timer.stop(); timer = null; } timedSeconds = 0; }

function startMode() {
  stopTimer();
  deck = shuffle(CATEGORIES[currentCat].items);
  idx = 0; score = 0;
  total = mode === 'timed' ? Math.min(10, deck.length) : deck.length;
  document.getElementById('timerBar').classList.toggle('show', mode === 'timed');

  if (mode === 'timed') {
    timedSeconds = total * 25;

    timer = new Timer(timedSeconds,
      r => { const el = document.getElementById('timerDisplay'); el.textContent = formatTime(r); el.classList.toggle('warn', r <= 20); },
      () => finish()
    );
    timer.start();
  }
  renderItem();
}

function updProgress() {
  const pct = total > 0 ? Math.round((idx / total) * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = `${idx} / ${total}`;
  document.getElementById('progPct').textContent = pct + '%';
}

function renderItem() {
  if (idx >= total) { stopTimer(); finish(); return; }
  answered = false;
  const item = deck[idx];

  document.getElementById('scSent1').textContent = item.sentences[0];
  document.getElementById('scSent2').textContent = item.sentences[1];
  document.getElementById('scCounter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('hintBox').classList.remove('show');
  document.getElementById('hintBox').textContent = item.hint || '';
  document.getElementById('explainBox').textContent = '';
  document.getElementById('scAnswers').classList.remove('show');
  document.getElementById('scAnswers').innerHTML = '';

  const input = document.getElementById('answerInput');
  input.value = '';
  input.className = 'answer-input';
  input.disabled = false;
  input.focus();

  document.getElementById('checkBtn').style.display = '';
  document.getElementById('nextBtn').style.display = 'none';

  updProgress();
}

document.getElementById('hintBtn').addEventListener('click', () => {
  document.getElementById('hintBox').classList.toggle('show');
});

function checkAnswer() {
  if (answered) return;
  const input = document.getElementById('answerInput');
  const val = input.value.trim();
  if (!val) return;
  answered = true;
  input.disabled = true;

  const item = deck[idx];
  const correct = isMatch(val, item.correct);
  input.classList.add(correct ? 'correct' : 'wrong');
  if (correct) score++;

  document.getElementById('explainBox').textContent = item.explain;
  const answersEl = document.getElementById('scAnswers');
  answersEl.innerHTML = item.correct.map(a => `<div class="sc-answer-item">${a}</div>`).join('');
  answersEl.classList.add('show');

  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = '';
}

document.getElementById('checkBtn').addEventListener('click', checkAnswer);
document.getElementById('answerInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
document.getElementById('nextBtn').addEventListener('click', () => { idx++; renderItem(); });

function finish() {
  stopTimer();
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  showResult({
    correct: score, total,
    containerEl: document.getElementById('resultOverlay'),
    onRestart: () => startMode(),
    onStudy: null,
  });
  recordScore(`sentcomb-${currentCat}`, pct);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && answered) { e.preventDefault(); document.getElementById('nextBtn').click(); }
});

startMode();
</script>

<script>
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  const pl = document.getElementById('portalLink');
  if (pl) pl.href = 'http://localhost:3000/';
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a[href*="localhost:"]');
    if (a) {
      const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      const url = new URL(a.href);
      url.searchParams.set('theme', theme);
      a.href = url.toString();
    }
  });
}
</script>
</body>
</html>
