<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confusing Words — HubFlow</title>

<script src="../js/lp-theme.js"></script>
<script src="../js/lp-input-zoom.js"></script>
<script src="../js/lp-nav-icons.js"></script>
<script src="../js/lp-platform-urls.js"></script>
<script src="../js/lp-guest-reset.js"></script>
<script src="../js/lp-login.js"></script>
<script src="../js/lp-nav-helpers.js"></script>
<script src="../js/lp-about-content.js"></script>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/lp-nav-active.css">
<link rel="stylesheet" href="../css/lp-about.css">
<link rel="stylesheet" href="../css/sentence-quiz.css">
<style>
  body { min-height: 100vh; padding: 0 14px; }

  .cw-front .fc-term { font-size: 1.5rem; color: var(--lp-cat-purple); }
  .cw-front .fc-detail { font-size: .72rem; margin-top: 4px; }
  .fc-back { background: var(--lp-accent-soft); border-color: var(--lp-cat-purple); }

  [data-theme="dark"] .word-opt.correct { color: #6FE8A8; }
  [data-theme="dark"] .word-opt.wrong { color: #FF9F9F; }
</style>
</head>
<body>
<div class="wrap" data-color="purple">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
  </div>

  <div class="header">
    <h1>🔀 Confusing Words</h1>

    <!-- Category -->
    <div class="cat-bar" id="catBar"></div>

    <!-- Modes -->
    <div class="pill-bar">
      <button class="pill-btn active" data-mode="study">📖 Study</button>
      <button class="pill-btn" data-mode="practice">🎯 Practice</button>
      <button class="pill-btn" data-mode="timed">⏱️ Timed</button>
    </div>

    <div class="timer-bar" id="timerBar"><span class="timer-display" id="timerDisplay">1:00</span></div>

    <div class="progress">
      <div class="progress__labels"><span id="progTxt">0 / 20</span><span id="progPct">0%</span></div>
      <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
    </div>
  </div>

  <div class="scroll-body">
    <!-- PRACTICE / TIMED -->
    <div data-area="practice">
      <div class="sentence-card">
        <div class="sc-icon" id="scIcon"></div>
        <div class="sc-text" id="scText"></div>
        <div class="sc-counter" id="scCounter"></div>
      </div>
      <div class="word-options" id="wordOptions">
        <div class="word-options__choices" id="wordChoices"></div>
        <div class="explain-box" id="explainBox"></div>
      </div>
    </div>

    <!-- STUDY -->
    <div data-area="study">
      <div class="fc-count" id="fcCounter">1 / 20</div>
      <div class="fc-card" id="fcCard">
        <div class="fc-inner">
          <div class="fc-face cw-front">
            <div class="fc-emoji" id="fcEmoji">🔀</div>
            <div class="fc-term" id="fcSentence"></div>
            <div class="fc-detail" id="fcHint"></div>
            <div class="fc-hint">tap to see answer</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-term" id="fcAnswer" style="font-size:1.3rem;color:var(--lp-success)"></div>
            <div class="fc-detail" id="fcExplain"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="lp-btn lp-btn--ghost" id="shuffleBtn">🔀</button>
        <button class="lp-btn lp-btn--ghost" id="prevBtn">←</button>
        <button class="lp-btn lp-btn--primary" id="nextBtn">→</button>
      </div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/confusing-words.js';
import { shuffle, recordScore, Timer, formatTime, showResult } from '../js/utils.js';
import { initSwipe } from '../js/swipe.js';


const catKeys = Object.keys(CATEGORIES);
let currentCat = catKeys[0];
let mode = 'study';
let deck = [], idx = 0, score = 0, total = 0;
let timer = null;
let timedSeconds = 0;

// ─── Category bar ───
function renderCatBar() {
  const bar = document.getElementById('catBar');
  if (!bar) return;
  const expandBtn = bar.querySelector('.cat-expand-btn');
  const pills = catKeys.map(k =>
    `<button class="cat-btn ${k === currentCat ? 'active' : ''}" data-cat="${k}">${CATEGORIES[k].icon} ${CATEGORIES[k].label}</button>`
  ).join('');
  bar.querySelectorAll('.cat-btn').forEach(el => el.remove());
  if (expandBtn) expandBtn.insertAdjacentHTML('beforebegin', pills);
  else bar.innerHTML = pills;
  bar.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      bar.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
      startMode();
    });
  });
}
renderCatBar();

// ─── Mode switching ───
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    startMode();
    setTimeout(() => {
      if (mode === 'practice' || mode === 'timed') syncPracticeNav({ showNext: !!practiceAdvance });
      else if (mode === 'study') restoreStudyNav();
    }, 10);
  });
});

function startMode() {
  stopTimer();
  document.querySelectorAll('[data-area]').forEach(a => a.classList.remove('show'));
  document.getElementById('timerBar').classList.remove('show');
  if (mode === 'practice') initPractice(false);
  else if (mode === 'timed') initPractice(true);
  else if (mode === 'study') initStudy();
}

function stopTimer() { if (timer) { timer.stop(); timer = null; } timedSeconds = 0; }

function getData() { return CATEGORIES[currentCat].items; }

let practiceAdvance = null;

function syncPracticeNav({ showNext = false } = {}) {
  const shuffleBtn = document.getElementById('shuffleBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  [shuffleBtn, prevBtn].forEach((btn) => {
    if (!btn) return;
    btn.hidden = true;
    btn.style.display = 'none';
  });
  if (nextBtn) {
    nextBtn.hidden = !showNext;
    if (showNext) nextBtn.style.removeProperty('display');
    else nextBtn.style.display = 'none';
  }
}

function restoreStudyNav() {
  ['shuffleBtn', 'prevBtn', 'nextBtn'].forEach((id) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.hidden = false;
    btn.style.removeProperty('display');
  });
  practiceAdvance = null;
}

function installBottomNavHook(attempt = 0) {
  const orig = window.__syncBottomNavMode;
  if (!orig) {
    if (attempt < 40) setTimeout(() => installBottomNavHook(attempt + 1), 50);
    return;
  }
  window.__syncBottomNavMode = () => {
    orig();
    if (mode === 'practice' || mode === 'timed') {
      syncPracticeNav({ showNext: !!practiceAdvance });
    } else if (mode === 'study') {
      restoreStudyNav();
    }
  };
  window.__syncBottomNavMode();
}

function updProgress(current, t) {
  const pct = Math.round((current / t) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = `${current} / ${t}`;
  document.getElementById('progPct').textContent = pct + '%';
}

// ═══ PRACTICE / TIMED ═══
function initPractice(timed) {
  deck = shuffle(getData());
  idx = 0; score = 0;
  total = Math.min(timed ? 10 : deck.length, deck.length);
  document.querySelector('[data-area="practice"]').classList.add('show');

  if (timed) {
    document.getElementById('timerBar').classList.add('show');
    timedSeconds = total * 8;

    timer = new Timer(timedSeconds,
      r => { const el = document.getElementById('timerDisplay'); el.textContent = formatTime(r); el.classList.toggle('warn', r <= 10); },
      () => finishPractice()
    );
    timer.start();
  }
  renderPractice();
}

function renderPractice() {
  if (idx >= total) { finishPractice(); return; }
  const item = deck[idx];
  const cat = CATEGORIES[currentCat];

  document.getElementById('scIcon').textContent = cat.icon;
  document.getElementById('scText').innerHTML = item.sentence.replace('___', '<span class="blank">?</span>');
  document.getElementById('scCounter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('explainBox').textContent = '';
  syncPracticeNav({ showNext: false });

  // Build options from the category pairs
  const opts = shuffle([...cat.pairs]);
  const optsEl = document.getElementById('wordChoices');
  optsEl.innerHTML = opts.map(o => `<button class="word-opt" data-val="${o}">${o}</button>`).join('');
  optsEl.querySelectorAll('.word-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      optsEl.querySelectorAll('.word-opt').forEach(b => { b.classList.add('disabled'); b.style.pointerEvents = 'none'; });

      const chosen = btn.dataset.val;
      const correct = item.correct.toLowerCase();
      // Match base form to conjugated: do→did/does/done/doing, make→made/makes/making
      const baseMap = { 'do': /^(do|did|does|done|doing)$/i, 'make': /^(make|made|makes|making)$/i, 'say': /^(say|said|says|saying)$/i, 'tell': /^(tell|told|tells|telling)$/i, 'bring': /^(bring|brought|brings|bringing)$/i, 'take': /^(take|took|takes|taken|taking)$/i, 'borrow': /^(borrow|borrowed|borrows|borrowing)$/i, 'lend': /^(lend|lent|lends|lending)$/i, 'watch': /^(watch|watched|watches|watching)$/i, 'look': /^(look|looked|looks|looking)$/i, 'see': /^(see|saw|sees|seen|seeing)$/i };
      const isCorrect = chosen === correct || chosen === item.correct || (baseMap[chosen] && baseMap[chosen].test(correct));

      if (isCorrect) { btn.classList.add('correct'); score++; }
      else {
        btn.classList.add('wrong');
        // Highlight the correct base-form option
        optsEl.querySelectorAll('.word-opt').forEach(b => {
          const bv = b.dataset.val;
          if (bv === correct || bv === item.correct || (baseMap[bv] && baseMap[bv].test(correct))) b.classList.add('correct');
        });
      }

      // Show sentence with answer filled
      document.getElementById('scText').innerHTML = item.sentence.replace('___', `<span class="blank">${item.correct}</span>`);
      document.getElementById('explainBox').textContent = item.explain;

      idx++;
      updProgress(idx, total);

      if (idx >= total) {
        practiceAdvance = null;
        syncPracticeNav({ showNext: false });
        requestAnimationFrame(() => finishPractice());
        return;
      }

      practiceAdvance = () => {
        practiceAdvance = null;
        syncPracticeNav({ showNext: false });
        renderPractice();
      };
      syncPracticeNav({ showNext: true });
      setTimeout(() => syncPracticeNav({ showNext: true }), 10);
      document.getElementById('nextBtn')?.focus();
    });
  });
  updProgress(idx, total);
}

function finishPractice() {
  const elapsed = timedSeconds ? timedSeconds - (timer && timer.remaining != null ? timer.remaining : 0) : null;
  stopTimer();
  const pct = showResult({
    correct: score, total,
    containerEl: document.getElementById('resultOverlay'),
    onRestart: () => startMode(),
    onStudy: () => { mode = 'study'; document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === 'study')); startMode(); },
    elapsedSeconds: elapsed
  });
  requestAnimationFrame(() => recordScore(`conf-${currentCat}`, pct));
}

// ═══ STUDY ═══
function initStudy() {
  deck = shuffle(getData());
  idx = 0;
  restoreStudyNav();
  document.querySelector('[data-area="study"]').classList.add('show');
  renderStudyCard();
}

function renderStudyCard() {
  const item = deck[idx];
  const card = document.getElementById('fcCard');
  card.classList.remove('flip');
  document.getElementById('fcEmoji').textContent = CATEGORIES[currentCat].icon;
  document.getElementById('fcSentence').innerHTML = item.sentence.replace('___', '___');
  document.getElementById('fcHint').textContent = `${CATEGORIES[currentCat].label}`;
  document.getElementById('fcAnswer').textContent = item.correct;
  document.getElementById('fcExplain').textContent = item.explain;
  document.getElementById('fcCounter').textContent = `${idx + 1} / ${deck.length}`;
  updProgress(idx + 1, deck.length);
}

document.getElementById('fcCard').addEventListener('click', () => document.getElementById('fcCard').classList.toggle('flip'));
document.getElementById('nextBtn').addEventListener('click', () => {
  if (practiceAdvance) { practiceAdvance(); return; }
  if (mode === 'study') advanceCard(1);
});
document.getElementById('prevBtn').addEventListener('click', () => advanceCard(-1));
document.getElementById('shuffleBtn').addEventListener('click', () => { deck = shuffle(deck); idx = 0; renderStudyCard(); });
initSwipe(document.querySelector('[data-area="study"]'), { onNext: () => advanceCard(1), onPrev: () => advanceCard(-1) });

function advanceCard(dir) {
  const card = document.getElementById('fcCard');
  const inner = card.querySelector('.fc-inner');
  if (card.classList.contains('flip') && inner) {
    inner.style.transition = 'opacity .15s ease, transform .2s ease';
    inner.style.opacity = '0';
    card.classList.remove('flip');
    let done = false;
    const onDone = () => {
      if (done) return; done = true;
      inner.removeEventListener('transitionend', onDone);
      inner.style.transition = 'none';
      idx = (idx + dir + deck.length) % deck.length;
      renderStudyCard();
      void inner.offsetHeight;
      inner.style.transition = 'opacity .15s ease';
      inner.style.opacity = '1';
      setTimeout(() => { inner.style.transition = ''; }, 170);
    };
    inner.addEventListener('transitionend', onDone, { once: true });
    setTimeout(onDone, 250);
    return;
  }
  idx = (idx + dir + deck.length) % deck.length;
  renderStudyCard();
}

document.addEventListener('keydown', e => {
  if (mode === 'practice' || mode === 'timed') {
    if (practiceAdvance && (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight')) {
      e.preventDefault();
      practiceAdvance();
    }
    return;
  }
  if (mode !== 'study') return;
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    const card = document.getElementById('fcCard');
    if (card.classList.contains('flip')) advanceCard(1);
    else card.classList.add('flip');
  } else if (e.key === 'ArrowRight') { e.preventDefault(); advanceCard(1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); advanceCard(-1); }
});

// ─── Init ───
installBottomNavHook();
startMode();
</script>

<script type="module" src="../js/exercise-shell.js"></script>
</body>
</html>
