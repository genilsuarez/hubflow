<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerunds & Infinitives — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8860B'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="../js/theme-init.js"></script>
<style>body{background:#FAF7F2;color:#2C2418}[data-theme="dark"] body{background:#1A1714;color:#EDE8E0}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<style>
  body { min-height: 100vh; padding: 0 14px 40px; }
  .header { padding: 6px 0; }
  h1 { font-family: 'Newsreader', serif; font-weight: 600; font-size: 1.4rem; margin-bottom: 6px; }
  .back-link { color: var(--lp-cat-amber); }
  .pill-btn.active { background: var(--lp-cat-amber); color: #fff; box-shadow: 0 2px 10px rgba(184,134,11,.25); }
  .progress__fill { background: var(--lp-cat-amber); }

  .cat-bar { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
  .cat-bar::-webkit-scrollbar { display: none; }

  [data-area] { display: none; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
  [data-area].show { display: flex; }

  .sentence-card {
    width: 100%; max-width: 480px; background: var(--lp-surface); border: 1.5px solid var(--lp-border);
    border-radius: var(--lp-radius-lg); padding: 22px 20px; text-align: center;
    box-shadow: var(--lp-shadow-sm);
  }
  .sentence-card .sc-icon { font-size: 1.6rem; margin-bottom: 6px; }
  .sentence-card .sc-text {
    font-family: var(--lp-font-display); font-size: 1.15rem; font-weight: 500;
    color: var(--lp-ink); line-height: 1.5;
  }
  .sentence-card .sc-text .blank {
    display: inline-block; min-width: 50px; border-bottom: 2.5px dashed var(--lp-cat-amber);
    color: var(--lp-cat-amber); font-weight: 700; padding: 0 4px;
  }
  .sentence-card .sc-counter {
    font-size: .62rem; font-weight: 700; color: var(--lp-muted); margin-top: 8px;
  }


  .explain-box {
    width: 100%; max-width: 480px; font-size: .75rem; font-weight: 600; color: var(--lp-ink-soft);
    background: var(--lp-bg-paper); border: 1px solid var(--lp-border); border-radius: var(--lp-radius-sm);
    padding: 10px 14px; text-align: center; min-height: 2.4em; line-height: 1.5;
  }

  .fc-card { max-width: 460px; height: 200px; }
  .art-front .fc-term { font-size: 1.3rem; color: var(--lp-cat-amber); line-height: 1.4; }
  .fc-back { background: color-mix(in srgb, var(--lp-cat-amber) 10%, var(--lp-surface)); border-color: var(--lp-cat-amber); }

  .scroll-body { padding: 8px 0 30px; }

  @media (max-width: 480px) {
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
    <div class="tb-actions">
    <a class="lp-icon-btn" id="portalLink" href="https://genilsuarez.github.io/deskflow/" aria-label="Ir al portal DeskFlow" title="Portal">🏠</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
  </div>
  </div>

  <div class="header">
    <h1>🔁 Gerunds & Infinitives</h1>

    <div class="cat-bar" id="catBar"></div>

    <div class="pill-bar">
      <button class="pill-btn active" data-mode="study">📖 Study</button>
      <button class="pill-btn" data-mode="practice">🎯 Practice</button>
      <button class="pill-btn" data-mode="timed">⏱️ Timed</button>
    </div>

    <div class="timer-bar" id="timerBar"><span class="timer-display" id="timerDisplay">1:00</span></div>

    <div class="progress">
      <div class="progress__labels"><span id="progTxt">0 / 10</span><span id="progPct">0%</span></div>
      <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
    </div>
  </div>

  <div class="scroll-body">
    <div data-area="practice">
      <div class="sentence-card">
        <div class="sc-icon" id="scIcon"></div>
        <div class="sc-text" id="scText"></div>
        <div class="sc-counter" id="scCounter"></div>
      </div>
      <div class="word-options" id="wordOptions"></div>
      <div class="explain-box" id="explainBox"></div>
    </div>

    <div data-area="study">
      <div class="fc-count" id="fcCounter">1 / 10</div>
      <div class="fc-card" id="fcCard">
        <div class="fc-inner">
          <div class="fc-face art-front">
            <div class="fc-emoji" id="fcEmoji">🔁</div>
            <div class="fc-term" id="fcSentence"></div>
            <div class="fc-hint">tap to see answer</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-term" id="fcAnswer" style="font-size:1.4rem;color:var(--lp-success)"></div>
            <div class="fc-detail" id="fcExplain"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="btn btn--ghost" id="shuffleBtn">🔀</button>
        <button class="btn btn--ghost" id="prevBtn">←</button>
        <button class="btn btn--green" id="nextBtn">→</button>
      </div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/gerunds-infinitives.js';
import { initSentenceQuiz } from '../js/sentence-quiz-engine.js';

initSentenceQuiz({ categories: CATEGORIES, scoreKeyPrefix: 'ger' });
</script>

<script src="../js/portal-link.js"></script>
</body>
</html>
