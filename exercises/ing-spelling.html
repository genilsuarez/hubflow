<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>-ing Spelling Rules — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8860B'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="../js/lp-theme.js"></script>
<script src="../js/lp-input-zoom.js"></script>
<script src="../js/lp-nav-icons.js"></script>
<script src="../js/lp-platform-urls.js"></script>
<script src="../lp-guest-reset.js"></script>
<script src="../lp-login.js"></script>
<script src="../js/lp-nav-helpers.js"></script>
<script src="../js/lp-about.js"></script>
<style>body{background:#FFFFFF;color:#2C2418}[data-theme="dark"] body{background:#181B20;color:#E8EAED}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/lp-nav-active.css">
<link rel="stylesheet" href="../css/lp-about.css">
<link rel="stylesheet" href="../css/spelling-shell.css">
<style>
</style>
</head>
<body>
<div class="wrap" data-color="blue">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
    <div class="timer-bar" id="timerBar">
      <span class="timer-display" id="timerDisplay">1:00</span>
    </div>
  </div>

  <div class="header">
    <h1><span class="h1-suffix">-ing</span> Spelling <span class="h1-label">Rules</span></h1>

    <!-- Mode bar -->
    <div class="pill-bar">
      <button class="pill-btn active" data-mode="study">📖 Study</button>
      <button class="pill-btn" data-mode="challenge">⚡ Challenge</button>
      <button class="pill-btn" data-mode="timed">⏱️ Timed</button>
    </div>

    <!-- Level bar -->
    <div class="level-bar">
      <button class="level-pill active" data-level="beginner">🌱 Beginner</button>
      <button class="level-pill" data-level="intermediate">📗 Intermediate</button>
      <button class="level-pill" data-level="exceptions">⚡ Exceptions</button>
      <button class="level-pill" data-level="god">💀 God Mode</button>
    </div>

    <!-- Lives & Streak -->
    <div id="livesBar"></div>
    <div id="streakBar"></div>

    <!-- Progress -->
    <div class="progress">
      <div class="progress__labels"><span id="progTxt">0 / 16</span><span id="progPct">0%</span></div>
      <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
    </div>

    <!-- Legend -->
    <div class="legend">
      <span><span class="dot red"></span> Just add -ing</span>
      <span><span class="dot blue"></span> Drop -e / Change</span>
      <span><span class="dot green"></span> Double consonant</span>
    </div>
  </div>

  <!-- Card Grid -->
  <div class="scroll-body">
    <div class="card-grid" id="cardGrid"></div>
    <div class="check-area">
      <button class="lp-btn lp-btn--primary" id="checkBtn">✓ Check All</button>
    </div>
  </div>

  <!-- Result Overlay -->
  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { LEVELS } from '../data/ing-words.js';
import { SpellingEngine } from '../js/spelling-engine.js';

new SpellingEngine({
  title: '-ing Spelling Rules',
  suffix: '-ing',
  levels: LEVELS,
  storagePrefix: 'ing',
  contentId: 'ing-spelling',
  accentColor: '--c-ing',
  rules: ['red', 'blue', 'green'],
  hasColorPicker: true,
  inputPlaceholder: 'type -ing form...',
  getPrompt: (item) => item.verb,
  getAnswer: (item) => item.ans,
  checkAnswer: (userInput, item) => userInput === item.ans.toLowerCase(),
});
</script>

<script type="module" src="../js/exercise-shell.js"></script>
</body>
</html>
