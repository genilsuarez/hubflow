<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnHub</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #0f3460;
      --highlight: #e94560;
      --text: #eaeaea;
      --muted: #a0a0a0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }
    .topics {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 800px;
    }
    .topic-card {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s, border-color 0.2s;
    }
    .topic-card:hover {
      transform: translateY(-3px);
      border-color: var(--highlight);
    }
    .topic-card h2 {
      font-size: 1.1rem;
      margin-bottom: 0.4rem;
    }
    .topic-card p {
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer {
      margin-top: auto;
      padding-top: 3rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <h1>📚 LearnHub</h1>
  <p class="subtitle">Espacio de estudio y temas varios</p>

  <div class="topics">
    <a class="topic-card" href="ing-spelling-rules.html">
      <h2>🇬🇧 -ing Spelling Rules</h2>
      <p>Reglas de ortografía para el sufijo -ing en inglés</p>
    </a>
  </div>

  <footer>LearnHub — Genil Suarez</footer>
</body>
</html>
