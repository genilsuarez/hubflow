<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Match — LearnHub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF;--text:#16202E;--muted:#6E7A8A;
  --surface:#FFFFFF;--border:#E3E9F2;
  --blue:#2F6FD8;--blue-light:#EAF2FC;--blue-dark:#1A4FA8;
  --green:#3DBE7A;--green-light:#E2FAF0;--green-dark:#1E7A48;
  --red:#FF6B6B;--red-light:#FFECEC;--red-dark:#CC3333;
  --orange:#F59E0B;--orange-light:#FFF8E1;--orange-dark:#92600A;
  --purple:#7C5AF6;--purple-light:#F0EBFF;--purple-dark:#4A2FB0;
  --accent:var(--purple);--accent-light:var(--purple-light);--accent-dark:var(--purple-dark);
  --shadow-sm:0 1px 2px rgba(30,50,80,.06),0 3px 8px rgba(30,50,80,.06);
  --shadow-lg:0 24px 48px -16px rgba(30,50,80,.22),0 4px 12px rgba(30,50,80,.10);
  --ease:cubic-bezier(.2,.9,.25,1);
}
[data-theme="dark"]{
  --bg:#12141F;--text:#E8E4F0;--muted:#7B7B9D;
  --surface:#1C1F30;--border:#2E3250;
  --blue-light:#162040;--green-light:#122E1E;--red-light:#3D1A1A;
  --orange-light:#2E2510;--purple-light:#1E1540;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:
    radial-gradient(900px 480px at 50% -12%,rgba(124,90,246,.14) 0%,rgba(124,90,246,.04) 40%,transparent 66%),
    radial-gradient(620px 460px at 100% 6%,rgba(124,90,246,.08) 0%,transparent 58%),
    linear-gradient(180deg,#FFFFFF 0%,#F8F4FF 52%,#EDE6FB 100%);
  background-attachment:fixed;
  font-family:'Manrope',sans-serif;color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  transition:background .3s,color .3s;
}
[data-theme="dark"] body{background:var(--bg);}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;
  background-image:radial-gradient(rgba(124,90,246,.06) 1px,transparent 1.5px);
  background-size:22px 22px;
  -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 28%,#000 0%,transparent 82%);
  mask-image:radial-gradient(ellipse 80% 70% at 50% 28%,#000 0%,transparent 82%);
}
[data-theme="dark"] body::before{display:none;}
@media(max-width:480px){
  html,body{overflow:auto;height:auto;min-height:100%;}
  body{min-height:100dvh;}
}

/* TOP BAR */
.top-bar{
  width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px 0;flex-shrink:0;
}
.back-link{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:.85rem;
  color:var(--purple);text-decoration:none;display:flex;align-items:center;gap:4px;
  transition:opacity .2s;
}
.back-link:hover{opacity:.7;}
.theme-toggle{
  background:var(--surface);border:2px solid var(--border);border-radius:50px;
  padding:4px 10px;font-size:.75rem;cursor:pointer;color:var(--text);
  font-family:'Manrope',sans-serif;font-weight:700;transition:all .2s;
}
.theme-toggle:hover{border-color:var(--purple);}

/* HEADER */
.header{
  width:100%;max-width:760px;
  padding:8px 14px;flex-shrink:0;z-index:10;
}
@media(max-width:480px){.header{position:sticky;top:0;background:var(--bg);border-bottom:2px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.06);}}
h1{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:clamp(.9rem,2.8vw,1.2rem);
  line-height:1.2;display:flex;align-items:center;gap:6px;margin-bottom:6px;
}
.h1-icon{font-size:1.1em;}
.h1-label{font-family:'DM Serif Display',serif;font-style:italic;font-weight:400;color:var(--muted);font-size:1em;}

/* CATEGORY TABS */
.cat-bar{
  display:flex;background:var(--surface);border-radius:50px;padding:2px;gap:2px;
  box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:6px;
  border:2px solid var(--border);
}
.cat-btn{
  flex:1;font-family:'Manrope',sans-serif;font-size:.78rem;font-weight:700;
  padding:5px;border-radius:50px;border:none;cursor:pointer;
  transition:all .22s;color:var(--muted);background:transparent;text-align:center;
}
.cat-btn.active{background:var(--purple);color:#fff;box-shadow:0 3px 12px rgba(124,90,246,.4);}

/* MODE BAR */
.mode-bar{
  display:flex;background:var(--surface);border-radius:50px;padding:2px;gap:2px;
  box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:6px;
  border:2px solid var(--border);
}
.mode-btn{
  flex:1;font-family:'Manrope',sans-serif;font-size:.75rem;font-weight:700;
  padding:4px;border-radius:50px;border:none;cursor:pointer;
  transition:all .22s;color:var(--muted);background:transparent;text-align:center;
}
.mode-btn.active.study{background:var(--blue);color:#fff;box-shadow:0 3px 12px rgba(47,111,216,.42);}
.mode-btn.active.quiz{background:linear-gradient(135deg,var(--red),#FF9F6B);color:#fff;box-shadow:0 3px 10px rgba(255,107,107,.4);}
.mode-btn.active.match{background:linear-gradient(135deg,var(--green),#6FE8A8);color:#fff;box-shadow:0 3px 10px rgba(61,190,122,.4);}
.mode-btn.active.timed{background:linear-gradient(135deg,#F7C948,#FF9F6B);color:#fff;box-shadow:0 3px 10px rgba(247,201,72,.4);}

/* TIMER */
.timer-bar{display:none;align-items:center;justify-content:center;gap:8px;margin-bottom:4px;}
.timer-bar.show{display:flex;}
.timer-display{font-family:'Manrope',sans-serif;font-weight:800;font-size:1.1rem;color:var(--red);}
.timer-display.warn{animation:pulse .5s infinite alternate;}

/* PROGRESS */
.prog-wrap{margin-bottom:4px;}
.prog-labels{display:flex;justify-content:space-between;font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:2px;}
.prog-track{height:5px;background:var(--border);border-radius:50px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple-dark),var(--purple) 55%,#B794F6);border-radius:50px;transition:width .5s var(--ease);width:0%;}

/* SCROLL BODY */
.scroll-body{
  width:100%;max-width:760px;flex:1;overflow-y:auto;
  padding:16px 14px 40px;-webkit-overflow-scrolling:touch;
}
@media(max-width:480px){.scroll-body{flex:none;overflow-y:visible;padding:16px 10px 60px;}}

/* ═══ FLASHCARD MODE (Opposites-style) ═══ */
.flashcard-area{display:none;flex-direction:column;align-items:center;gap:20px;}
.flashcard-area.show{display:flex;}
.fc-top{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:440px;}
.fc-count{color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:2px;}
.fc-card{width:100%;max-width:440px;height:280px;cursor:pointer;perspective:1200px;position:relative;}
.fc-inner{position:absolute;inset:0;border-radius:22px;transition:transform .52s cubic-bezier(.45,.05,.2,1),opacity .18s ease;transform-style:preserve-3d;will-change:transform;}
.fc-card.flip .fc-inner{transform:rotateY(180deg);}
.fc-card.swapping .fc-inner{opacity:.35;transition:transform .52s cubic-bezier(.45,.05,.2,1),opacity .14s ease;}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:10px;text-align:center;background:var(--surface);border:1.5px solid var(--border);box-shadow:var(--shadow-sm);}
.fc-back{transform:rotateY(180deg);box-shadow:var(--shadow-lg);}
.fc-emoji{font-size:3.2rem;line-height:1;}
.fc-term{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--text);letter-spacing:-.01em;}
.fc-detail{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--muted);text-align:center;line-height:1.5;white-space:pre-line;max-width:340px;}
.fc-hint{font-size:.7rem;color:var(--muted);font-weight:600;margin-top:6px;}
.fc-nav{display:flex;gap:10px;align-items:center;}
.fc-btn{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:.85rem;
  padding:8px 20px;border-radius:50px;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;display:flex;align-items:center;gap:5px;
}
.fc-btn:hover{transform:translateY(-2px);}
.fc-btn:active{transform:scale(.97);}
.fc-btn-prev{background:var(--surface);border:2.5px solid var(--border);color:var(--muted);}
.fc-btn-next{background:linear-gradient(135deg,var(--purple),#B794F6);color:#fff;box-shadow:0 5px 18px rgba(124,90,246,.32);}
.fc-btn-shuffle{background:var(--surface);border:2.5px solid var(--border);color:var(--muted);font-size:.75rem;}

/* ═══ QUIZ MODE ═══ */
.quiz-area{display:none;flex-direction:column;align-items:center;gap:16px;}
.quiz-area.show{display:flex;}
.quiz-prompt{
  width:100%;max-width:440px;text-align:center;
  background:var(--surface);border:2px solid var(--border);border-radius:16px;
  padding:20px;box-shadow:var(--shadow-sm);
}
.quiz-prompt-label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.quiz-prompt-text{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text);line-height:1.3;}
.quiz-prompt-emoji{font-size:2rem;margin-bottom:4px;}
.quiz-options{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:440px;
}
@media(max-width:400px){.quiz-options{grid-template-columns:1fr;}}
.quiz-opt{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:.85rem;
  padding:12px 16px;border-radius:12px;border:2.5px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer;
  transition:all .2s;text-align:center;
}
.quiz-opt:hover:not(.disabled){border-color:var(--purple);background:var(--purple-light);transform:scale(1.02);}
.quiz-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-light);color:var(--red-dark);}
.quiz-opt.disabled{cursor:default;opacity:.7;}
[data-theme="dark"] .quiz-opt.correct{color:#6FE8A8;}
[data-theme="dark"] .quiz-opt.wrong{color:#FF9F9F;}

/* ═══ MATCH/ORDER MODE ═══ */
.match-area{display:none;flex-direction:column;align-items:center;gap:12px;}
.match-area.show{display:flex;}
.match-instruction{font-size:.78rem;font-weight:700;color:var(--muted);text-align:center;}
.match-slots{
  display:flex;flex-direction:column;gap:6px;width:100%;max-width:500px;
}
.match-slot{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:12px;
  background:var(--surface);border:2px solid var(--border);
  box-shadow:var(--shadow-sm);
  cursor:grab;user-select:none;
  transition:transform .2s,box-shadow .2s,border-color .2s;
}
.match-slot:active{cursor:grabbing;transform:scale(1.02);box-shadow:var(--shadow-lg);}
.match-slot.dragging{opacity:.5;border-color:var(--purple);}
.match-slot.over{border-color:var(--purple);background:var(--purple-light);}
.match-slot.correct{border-color:var(--green);background:var(--green-light);}
.match-slot.wrong{border-color:var(--red);background:var(--red-light);animation:shake .32s;}
.match-slot-num{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.7rem;
  color:var(--muted);width:20px;text-align:center;flex-shrink:0;
}
.match-slot-emoji{font-size:1.2rem;flex-shrink:0;}
.match-slot-text{font-family:'Manrope',sans-serif;font-weight:700;font-size:.85rem;flex:1;}
.match-slot-time{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);flex-shrink:0;}

/* ═══ SCORE / RESULTS ═══ */
.result-area{display:none;flex-direction:column;align-items:center;gap:12px;}
.result-area.show{display:flex;}
.result-box{
  background:var(--surface);border:2px solid var(--border);border-radius:20px;
  padding:24px 30px;text-align:center;box-shadow:var(--shadow-sm);
  max-width:380px;width:100%;animation:popIn .4s var(--ease);
}
.result-stars{display:flex;justify-content:center;gap:6px;margin-bottom:8px;}
.result-star{font-size:2.2rem;opacity:.2;transition:opacity .3s,transform .3s;}
.result-star.lit{opacity:1;transform:scale(1.1);}
.result-title{font-family:'Manrope',sans-serif;font-weight:800;font-size:1.3rem;color:var(--purple-dark);margin-bottom:4px;}
[data-theme="dark"] .result-title{color:#B794F6;}
.result-sub{font-size:.85rem;color:var(--muted);font-weight:700;margin-bottom:14px;}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:.85rem;
  padding:8px 18px;border-radius:50px;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;display:flex;align-items:center;gap:5px;
}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(.97);}
.btn-purple{background:linear-gradient(135deg,var(--purple),#B794F6);color:#fff;box-shadow:0 5px 18px rgba(124,90,246,.32);}
.btn-ghost{background:var(--surface);border:2.5px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--purple);}

@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}
@keyframes pulse{from{opacity:1}to{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;}
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="../index.html" class="back-link" aria-label="Back to home">← Home</a>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="header">
  <h1><span class="h1-icon">🧠</span> Vocabulary <span class="h1-label">Match</span></h1>

  <!-- Category -->
  <div class="cat-bar" id="catBar">
    <button class="cat-btn active" data-cat="timeOfDay" onclick="setCat('timeOfDay')">🌅 Time of Day</button>
    <button class="cat-btn" data-cat="weather" onclick="setCat('weather')">🌤️ Weather</button>
    <button class="cat-btn" data-cat="seasons" onclick="setCat('seasons')">🍂 Seasons</button>
  </div>

  <!-- Mode -->
  <div class="mode-bar">
    <button class="mode-btn study active" onclick="setMode('study')">📖 Study</button>
    <button class="mode-btn quiz" onclick="setMode('quiz')">⚡ Quiz</button>
    <button class="mode-btn match" onclick="setMode('match')">🔀 Order</button>
    <button class="mode-btn timed" onclick="setMode('timed')">⏱️ Timed</button>
  </div>

  <!-- Timer -->
  <div class="timer-bar" id="timerBar">
    <span class="timer-display" id="timerDisplay">1:00</span>
  </div>

  <!-- Progress -->
  <div class="prog-wrap" id="progWrap">
    <div class="prog-labels"><span id="progTxt">0 / 10</span><span id="progPct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </div>
</div>

<!-- Scrollable content -->
<div class="scroll-body">
  <!-- Flashcard Study (Opposites-style flip) -->
  <div class="flashcard-area" id="flashcardArea">
    <div class="fc-top">
      <div class="fc-count" id="fcCount">1 / 10</div>
    </div>
    <div class="fc-card" id="fcCard">
      <div class="fc-inner">
        <div class="fc-face fc-front">
          <div class="fc-emoji" id="fcFrontEmoji"></div>
          <div class="fc-term" id="fcFrontTerm"></div>
          <div class="fc-hint">tap to flip</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-emoji" id="fcBackEmoji"></div>
          <div class="fc-term" id="fcBackTerm"></div>
          <div class="fc-detail" id="fcBackDetail"></div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-btn fc-btn-shuffle" onclick="shuffleDeck()">🔀 Shuffle</button>
      <button class="fc-btn fc-btn-prev" id="prevBtn" onclick="gotoCard(-1)">← Prev</button>
      <button class="fc-btn fc-btn-next" id="nextBtn" onclick="gotoCard(1)">Next →</button>
    </div>
  </div>

  <!-- Quiz -->
  <div class="quiz-area" id="quizArea">
    <div class="quiz-prompt" id="quizPrompt">
      <div class="quiz-prompt-emoji" id="quizEmoji"></div>
      <div class="quiz-prompt-label" id="quizLabel">What time of day is this?</div>
      <div class="quiz-prompt-text" id="quizText"></div>
    </div>
    <div class="quiz-options" id="quizOptions"></div>
  </div>

  <!-- Match/Order -->
  <div class="match-area" id="matchArea">
    <div class="match-instruction" id="matchInstruction">Drag to sort in chronological order (earliest → latest)</div>
    <div class="match-slots" id="matchSlots"></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-purple" id="matchCheck" onclick="checkOrder()">✓ Check Order</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-area" id="resultArea">
    <div class="result-box">
      <div class="result-stars">
        <span class="result-star" id="rs1">⭐</span>
        <span class="result-star" id="rs2">⭐</span>
        <span class="result-star" id="rs3">⭐</span>
      </div>
      <div class="result-title" id="resultTitle">Great job!</div>
      <div class="result-sub" id="resultSub">8/10 correct</div>
      <div class="result-btns">
        <button class="btn btn-purple" onclick="restartMode()">🔄 Try Again</button>
        <button class="btn btn-ghost" onclick="setMode('study')">📖 Study</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   DATA
   ══════════════════════════════════════════════════════ */
const DATA = {
  timeOfDay: [
    { term:"Dawn",      time:"4:00 AM – 6:00 AM",  description:"First light before sunrise, sky turns pale",          emoji:"🌅", gradient:"#1a1a2e,#e94560", order:1 },
    { term:"Sunrise",   time:"6:00 AM – 8:00 AM",  description:"The sun appears above the horizon",                   emoji:"🌄", gradient:"#e94560,#f7a440", order:2 },
    { term:"Morning",   time:"8:00 AM – 10:00 AM", description:"Early part of the day, after sunrise",                emoji:"☀️", gradient:"#f7a440,#ffe082", order:3 },
    { term:"Forenoon",  time:"10:00 AM – 12:00 PM",description:"Late morning, between mid-morning and noon",          emoji:"🌤️", gradient:"#ffe082,#fff9c4", order:4 },
    { term:"Noon",      time:"12:00 PM – 1:00 PM", description:"Midday, the sun is at its highest point",             emoji:"☀️", gradient:"#fff9c4,#ffeb3b", order:5 },
    { term:"Afternoon", time:"1:00 PM – 4:00 PM",  description:"Between noon and evening",                            emoji:"🌇", gradient:"#ffeb3b,#ff9800", order:6 },
    { term:"Dusk",      time:"4:00 PM – 6:00 PM",  description:"The sky darkens as the sun sets",                     emoji:"🌆", gradient:"#ff9800,#e91e63", order:7 },
    { term:"Twilight",  time:"6:00 PM – 8:00 PM",  description:"Faint light after sunset, sky turns purple",          emoji:"🌇", gradient:"#e91e63,#9c27b0", order:8 },
    { term:"Evening",   time:"8:00 PM – 10:00 PM", description:"Late part of the day, before night",                  emoji:"🌃", gradient:"#9c27b0,#3f51b5", order:9 },
    { term:"Night",     time:"10:00 PM – 12:00 AM",description:"Dark hours, most people sleep",                       emoji:"🌙", gradient:"#3f51b5,#1a237e", order:10 },
    { term:"Midnight",  time:"12:00 AM – 4:00 AM", description:"The middle of the night, deepest darkness",           emoji:"🌑", gradient:"#1a237e,#0d0d1a", order:11 },
  ],
  weather: [
    { term:"Sunny",     description:"Clear sky, bright sunshine",                              emoji:"☀️",  example:"It's sunny today, wear sunscreen!" },
    { term:"Cloudy",    description:"Sky covered with clouds, no rain",                        emoji:"☁️",  example:"A cloudy afternoon with no sun." },
    { term:"Overcast",  description:"Completely covered by thick grey clouds",                 emoji:"🌥️", example:"The sky is overcast — looks like rain." },
    { term:"Foggy",     description:"Low visibility due to thick mist near the ground",        emoji:"🌫️", example:"Be careful driving, it's very foggy." },
    { term:"Misty",     description:"Light fog, slightly reduced visibility",                  emoji:"🌫️", example:"A misty morning in the mountains." },
    { term:"Rainy",     description:"Water falling from clouds",                               emoji:"🌧️", example:"It's been rainy all week." },
    { term:"Drizzle",   description:"Very light, fine rain",                                   emoji:"🌦️", example:"Just a drizzle, you don't need an umbrella." },
    { term:"Stormy",    description:"Heavy rain with thunder and lightning",                    emoji:"⛈️", example:"A stormy night with loud thunder." },
    { term:"Windy",     description:"Strong air movement",                                     emoji:"💨",  example:"Hold your hat — it's really windy!" },
    { term:"Breezy",    description:"Light, pleasant wind",                                    emoji:"🍃",  example:"A breezy afternoon by the coast." },

    { term:"Dry season",description:"Period with little to no rainfall (tropical climates)",   emoji:"🏜️", months:"Varies by region" },
    { term:"Wet season",description:"Period of heavy rainfall (also: monsoon/rainy season)",   emoji:"🌊", months:"Varies by region" },
    { term:"Solstice",  description:"Longest or shortest day of the year",                     emoji:"🌞", months:"~June 21 / ~Dec 21" },
    { term:"Equinox",   description:"Day and night are equal length",                          emoji:"⚖️", months:"~March 20 / ~Sep 22" },

};

/* ══════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════ */
let currentCat = 'timeOfDay';
let currentMode = 'study';
let deck = [];
let cardIdx = 0;
let quizIdx = 0;
let quizScore = 0;
let quizTotal = 0;
let timerInterval = null;
let timerSeconds = 0;

/* ══════════════════════════════════════════════════════
   THEME
   ══════════════════════════════════════════════════════ */
function toggleTheme(){
  const d = document.documentElement;
  const dark = d.getAttribute('data-theme') === 'dark';
  d.setAttribute('data-theme', dark ? '' : 'dark');
  document.getElementById('themeToggle').textContent = dark ? '🌙' : '☀️';
  localStorage.setItem('vm-theme', dark ? '' : 'dark');
}
(function initTheme(){
  const t = localStorage.getItem('vm-theme');
  if(t === 'dark') { document.documentElement.setAttribute('data-theme','dark'); document.getElementById('themeToggle').textContent='☀️'; }
})();

/* ══════════════════════════════════════════════════════
   CATEGORY
   ══════════════════════════════════════════════════════ */
function setCat(cat){
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  setMode(currentMode);
}

/* ══════════════════════════════════════════════════════
   MODE
   ══════════════════════════════════════════════════════ */
function setMode(mode){
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    const m = b.textContent.includes('Study') ? 'study' : b.textContent.includes('Quiz') ? 'quiz' : b.textContent.includes('Order') ? 'match' : 'timed';
    b.classList.toggle('active', m === mode);
  });
  hideAll();
  stopTimer();

  if(mode === 'study') initStudy();
  else if(mode === 'quiz') initQuiz();
  else if(mode === 'match') initMatch();
  else if(mode === 'timed') initTimed();
}

function hideAll(){
  ['flashcardArea','quizArea','matchArea','resultArea'].forEach(id => document.getElementById(id).classList.remove('show'));
  document.getElementById('timerBar').classList.remove('show');
  document.getElementById('progWrap').style.display = '';
}

/* ══════════════════════════════════════════════════════
   STUDY (FLASHCARDS — Opposites-style flip navigation)
   ══════════════════════════════════════════════════════ */
function initStudy(){
  deck = [...DATA[currentCat]];
  cardIdx = 0;
  document.getElementById('flashcardArea').classList.add('show');
  document.getElementById('progWrap').style.display = 'none';
  setCardFaces(deck[cardIdx]);
  updateStudyMeta();
}

function setCardFaces(item){
  // Front: emoji + term
  document.getElementById('fcFrontEmoji').textContent = item.emoji;
  document.getElementById('fcFrontTerm').textContent = item.term;
  // Back: emoji + term + detail
  document.getElementById('fcBackEmoji').textContent = item.emoji;
  document.getElementById('fcBackTerm').textContent = item.term;
  let detail = item.description;
  if(item.time) detail += '\n🕐 ' + item.time;
  if(item.example) detail += '\n💬 ' + item.example;
  if(item.months) detail += '\n📅 ' + item.months;
  document.getElementById('fcBackDetail').textContent = detail;
}

function updateStudyMeta(){
  document.getElementById('fcCount').textContent = `${cardIdx + 1} / ${deck.length}`;
}

function gotoCard(delta){
  const card = document.getElementById('fcCard');
  const inner = card.querySelector('.fc-inner');
  cardIdx = (cardIdx + delta + deck.length) % deck.length;
  // Reset flip, brief opacity dip
  card.classList.remove('flip');
  card.classList.add('swapping');
  inner.style.transition = 'none';
  void inner.offsetWidth;
  inner.style.transition = '';
  setCardFaces(deck[cardIdx]);
  requestAnimationFrame(() => {
    card.classList.remove('swapping');
  });
  updateStudyMeta();
}

function shuffleDeck(){
  for(let i = deck.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  cardIdx = 0;
  const card = document.getElementById('fcCard');
  card.classList.remove('flip');
  setCardFaces(deck[cardIdx]);
  updateStudyMeta();
}

// Click to flip
document.getElementById('fcCard').addEventListener('click', () => {
  document.getElementById('fcCard').classList.toggle('flip');
});

// Keyboard: Enter = flip, then next
document.addEventListener('keydown', e => {
  if(currentMode !== 'study') return;
  if(e.key === 'Enter'){
    e.preventDefault();
    const card = document.getElementById('fcCard');
    if(card.classList.contains('flip')){
      gotoCard(1);
    } else {
      card.classList.add('flip');
    }
  } else if(e.key === 'ArrowRight'){
    e.preventDefault(); gotoCard(1);
  } else if(e.key === 'ArrowLeft'){
    e.preventDefault(); gotoCard(-1);
  }
});

/* ══════════════════════════════════════════════════════
   QUIZ (MULTIPLE CHOICE)
   ══════════════════════════════════════════════════════ */
function initQuiz(){
  deck = shuffle([...DATA[currentCat]]);
  quizIdx = 0;
  quizScore = 0;
  quizTotal = Math.min(deck.length, 10);
  document.getElementById('quizArea').classList.add('show');
  updateProgress(0, quizTotal);
  renderQuiz();
}

function renderQuiz(){
  if(quizIdx >= quizTotal){
    showResult(quizScore, quizTotal);
    return;
  }
  const item = deck[quizIdx];
  const isTimeOfDay = currentCat === 'timeOfDay';

  // Randomly pick question type
  const qType = Math.random() < 0.5 ? 'termFromDesc' : 'descFromTerm';

  const quizEmoji = document.getElementById('quizEmoji');
  const quizLabel = document.getElementById('quizLabel');
  const quizText = document.getElementById('quizText');
  const quizOpts = document.getElementById('quizOptions');

  if(qType === 'termFromDesc'){
    quizEmoji.textContent = item.emoji;
    quizLabel.textContent = isTimeOfDay ? 'What time of day is this?' : 'What weather term matches?';
    quizText.textContent = item.description + (item.time ? ' (' + item.time + ')' : '');
  } else {
    quizEmoji.textContent = '❓';
    quizLabel.textContent = `What does "${item.term}" mean?`;
    quizText.textContent = item.emoji + ' ' + item.term;
  }

  // Generate options
  const others = DATA[currentCat].filter(x => x.term !== item.term);
  const distractors = shuffle(others).slice(0, 3);
  let options;
  if(qType === 'termFromDesc'){
    options = shuffle([item, ...distractors]).map(o => ({ text: o.term, correct: o.term === item.term }));
  } else {
    options = shuffle([item, ...distractors]).map(o => ({ text: o.description.slice(0, 60), correct: o.term === item.term }));
  }

  quizOpts.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt.text;
    btn.onclick = () => handleQuizAnswer(btn, opt.correct, quizOpts);
    quizOpts.appendChild(btn);
  });
}

function handleQuizAnswer(btn, correct, container){
  const allBtns = container.querySelectorAll('.quiz-opt');
  allBtns.forEach(b => { b.classList.add('disabled'); b.onclick = null; });

  if(correct){
    btn.classList.add('correct');
    quizScore++;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => { if(!b.classList.contains('wrong')) { /* find correct */ } });
    // highlight correct
    const correctTerm = deck[quizIdx].term;
    const correctDesc = deck[quizIdx].description.slice(0, 60);
    allBtns.forEach(b => {
      if(b.textContent === correctTerm || b.textContent === correctDesc) b.classList.add('correct');
    });
  }

  quizIdx++;
  updateProgress(quizIdx, quizTotal);

  setTimeout(() => renderQuiz(), 1000);
}

/* ══════════════════════════════════════════════════════
   MATCH/ORDER (DRAG & DROP SORT)
   ══════════════════════════════════════════════════════ */
function initMatch(){
  const items = [...DATA[currentCat]];
  const hasOrder = items[0] && items[0].order !== undefined;

  if(!hasOrder){
    // For categories without order, do pair matching
    initPairMatch(items);
    return;
  }

  deck = shuffle([...items]);
  document.getElementById('matchArea').classList.add('show');
  document.getElementById('matchInstruction').textContent = 'Drag to sort in chronological order (earliest → latest)';
  document.getElementById('matchCheck').style.display = '';
  document.getElementById('progWrap').style.display = 'none';
  renderMatchSlots();
}

function initPairMatch(items){
  // For weather/seasons: match term to description
  deck = shuffle([...items]).slice(0, 8);
  document.getElementById('matchArea').classList.add('show');
  document.getElementById('matchInstruction').textContent = 'Drag to match terms with their descriptions';
  document.getElementById('matchCheck').style.display = '';
  document.getElementById('progWrap').style.display = 'none';
  renderMatchSlots();
}

function renderMatchSlots(){
  const container = document.getElementById('matchSlots');
  container.innerHTML = '';

  deck.forEach((item, i) => {
    const slot = document.createElement('div');
    slot.className = 'match-slot';
    slot.draggable = true;
    slot.dataset.idx = i;
    slot.innerHTML = `
      <span class="match-slot-num">${i + 1}</span>
      <span class="match-slot-emoji">${item.emoji}</span>
      <span class="match-slot-text">${item.term}</span>
      ${item.time ? `<span class="match-slot-time">${item.time}</span>` : ''}
    `;

    // Drag events
    slot.addEventListener('dragstart', dragStart);
    slot.addEventListener('dragover', dragOver);
    slot.addEventListener('dragenter', dragEnter);
    slot.addEventListener('dragleave', dragLeave);
    slot.addEventListener('drop', drop);
    slot.addEventListener('dragend', dragEnd);

    // Touch support
    slot.addEventListener('touchstart', touchStart, {passive:false});
    slot.addEventListener('touchmove', touchMove, {passive:false});
    slot.addEventListener('touchend', touchEnd);

    container.appendChild(slot);
  });
}

let dragSrcEl = null;
function dragStart(e){ dragSrcEl = this; this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dragEnter(e){ e.preventDefault(); this.classList.add('over'); }
function dragLeave(){ this.classList.remove('over'); }
function drop(e){
  e.preventDefault();
  this.classList.remove('over');
  if(dragSrcEl !== this) swapSlots(dragSrcEl, this);
}
function dragEnd(){ this.classList.remove('dragging'); document.querySelectorAll('.match-slot').forEach(s => s.classList.remove('over')); }

// Touch drag support
let touchStartY = 0;
let touchEl = null;
function touchStart(e){
  touchEl = this;
  touchStartY = e.touches[0].clientY;
  this.classList.add('dragging');
}
function touchMove(e){
  e.preventDefault();
  const touch = e.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  document.querySelectorAll('.match-slot').forEach(s => s.classList.remove('over'));
  if(el && el.closest('.match-slot') && el.closest('.match-slot') !== touchEl){
    el.closest('.match-slot').classList.add('over');
  }
}
function touchEnd(e){
  if(!touchEl) return;
  touchEl.classList.remove('dragging');
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if(el && el.closest('.match-slot') && el.closest('.match-slot') !== touchEl){
    swapSlots(touchEl, el.closest('.match-slot'));
  }
  document.querySelectorAll('.match-slot').forEach(s => s.classList.remove('over'));
  touchEl = null;
}

function swapSlots(a, b){
  const container = document.getElementById('matchSlots');
  const slots = [...container.children];
  const idxA = slots.indexOf(a);
  const idxB = slots.indexOf(b);
  [deck[idxA], deck[idxB]] = [deck[idxB], deck[idxA]];
  renderMatchSlots();
}

function checkOrder(){
  const hasOrder = deck[0] && deck[0].order !== undefined;
  const slots = document.querySelectorAll('.match-slot');
  let correct = 0;

  if(hasOrder){
    // Check chronological order
    let sorted = [...deck].sort((a,b) => a.order - b.order);
    deck.forEach((item, i) => {
      if(item.order === sorted[i].order){
        slots[i].classList.add('correct');
        correct++;
      } else {
        slots[i].classList.add('wrong');
      }
    });
  } else {
    // For non-ordered categories, all correct (placeholder)
    correct = deck.length;
    slots.forEach(s => s.classList.add('correct'));
  }

  setTimeout(() => showResult(correct, deck.length), 1200);
}

/* ══════════════════════════════════════════════════════
   TIMED MODE
   ══════════════════════════════════════════════════════ */
function initTimed(){
  deck = shuffle([...DATA[currentCat]]);
  quizIdx = 0;
  quizScore = 0;
  quizTotal = Math.min(deck.length, 10);
  document.getElementById('quizArea').classList.add('show');
  document.getElementById('timerBar').classList.add('show');
  updateProgress(0, quizTotal);

  // Scale timer: 8 seconds per question
  timerSeconds = quizTotal * 8;
  updateTimerDisplay();
  startTimer();
  renderQuiz();
}

function startTimer(){
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if(timerSeconds <= 0){
      stopTimer();
      showResult(quizScore, quizTotal);
    }
  }, 1000);
}

function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timerBar').classList.remove('show');
}

function updateTimerDisplay(){
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const el = document.getElementById('timerDisplay');
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  el.classList.toggle('warn', timerSeconds <= 10);
}

/* ══════════════════════════════════════════════════════
   RESULTS
   ══════════════════════════════════════════════════════ */
function showResult(correct, total){
  hideAll();
  document.getElementById('resultArea').classList.add('show');
  const pct = Math.round((correct / total) * 100);
  const stars = pct === 100 ? 3 : pct >= 60 ? 2 : 1;

  document.getElementById('rs1').classList.toggle('lit', stars >= 1);
  document.getElementById('rs2').classList.toggle('lit', stars >= 2);
  document.getElementById('rs3').classList.toggle('lit', stars >= 3);

  const titles = { 3: 'Perfect! 🎉', 2: 'Well done!', 1: 'Keep practicing!' };
  document.getElementById('resultTitle').textContent = titles[stars];
  document.getElementById('resultSub').textContent = `${correct}/${total} correct — ${pct}%`;

  // Save score
  recordScore(pct);
}

function recordScore(pct){
  const key = `vm-${currentCat}-${currentMode}`;
  const history = JSON.parse(localStorage.getItem(key) || '[]');
  history.unshift({ pct, date: new Date().toLocaleDateString() });
  if(history.length > 20) history.pop();
  localStorage.setItem(key, JSON.stringify(history));
}

function restartMode(){
  setMode(currentMode);
}

/* ══════════════════════════════════════════════════════
   UTILS
   ══════════════════════════════════════════════════════ */
function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateProgress(current, total){
  document.getElementById('progTxt').textContent = `${current} / ${total}`;
  const pct = Math.round((current / total) * 100);
  document.getElementById('progPct').textContent = `${pct}%`;
  document.getElementById('progFill').style.width = `${pct}%`;
}

/* ══════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════ */
setMode('study');
</script>
