name: CI Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate HTML & Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify structure
        run: |
          FAIL=0
          [ -f "index.html" ]       || { echo "❌ Missing index.html"; FAIL=1; }
          [ -d "css" ]              || { echo "❌ Missing css/"; FAIL=1; }
          [ -d "exercises" ]        || { echo "❌ Missing exercises/"; FAIL=1; }
          [ -d "js" ]              || { echo "❌ Missing js/"; FAIL=1; }
          [ $FAIL -eq 0 ] && echo "✅ Structure OK"
          exit $FAIL

      - name: Validate all HTML files
        run: |
          echo "🔍 Validating HTML files..."
          FILES=$(find . -name "*.html" -not -path "./.git/*")
          COUNT=$(echo "$FILES" | wc -l | tr -d ' ')
          echo "  Found $COUNT HTML files"
          npx --yes html-validate@8 $FILES --config '{"extends":["html-validate:recommended"],"rules":{"no-trailing-whitespace":"off","no-inline-style":"off","attr-quotes":"off","require-sri":"off","no-raw-characters":"off"}}' || true
          echo "✅ HTML validated (warnings only)"

      - name: Check external links
        run: |
          echo "🔗 Checking external links..."
          BROKEN=0
          for href in $(grep -rohP 'href="\Khttps?://[^"]+' *.html exercises/*.html guides/*.html 2>/dev/null | sort -u); do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 10 "$href" 2>/dev/null || echo "000")
            if [[ "$STATUS" -ge 400 || "$STATUS" == "000" ]]; then
              echo "  ⚠️  $href → $STATUS"
              BROKEN=$((BROKEN + 1))
            fi
          done
          [ $BROKEN -eq 0 ] && echo "✅ All links OK" || echo "⚠️  $BROKEN link(s) unreachable (non-blocking)"
