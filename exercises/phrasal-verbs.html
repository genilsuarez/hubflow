<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phrasal Verbs — HubFlow</title>

<script src="../lp-login.js"></script>
<style>body{background:#FAF7F2;color:#2C2418}[data-theme="dark"] body{background:#1A1714;color:#EDE8E0}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">

<style>
  body { min-height: 100vh; padding: 0 14px; }
  .pill-btn.active { background: var(--lp-cat-teal); color: #fff; box-shadow: 0 2px 10px rgba(61,127,127,.25); }
  .progress__fill { background: var(--lp-cat-teal); }

  /* Category pills */
  .cat-bar { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
  .cat-bar::-webkit-scrollbar { display: none; }

  [data-area] { display: none; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
  [data-area].show { display: flex; }

  /* Flashcard for study */
  .fc-card { max-width: 720px; height: 220px; }
  .pv-front .fc-term { font-size: 1.6rem; color: var(--lp-cat-teal); }
  .fc-ipa { font-family: 'JetBrains Mono', monospace; font-size: .78rem; color: var(--muted); letter-spacing: .02em; margin-top: 2px; min-height: 1.1em; }
  .pv-front .fc-detail { font-size: .72rem; margin-top: 2px; }
  .fc-back { background: rgba(61,127,127,.08); border-color: var(--lp-cat-teal); }
  .fc-back .pv-meaning { font-family: var(--lp-font-display); font-size: 1.2rem; font-weight: 600; color: var(--lp-ink); margin-bottom: 6px; }
  .fc-back .pv-example { font-size: .75rem; color: var(--lp-ink-soft); font-style: italic; }

  /* Quiz: match particle */
  .quiz-card { width: 100%; max-width: 720px; background: var(--lp-surface); border: 1.5px solid var(--lp-border); border-radius: var(--lp-radius-lg); padding: 20px; text-align: center; box-shadow: var(--lp-shadow-sm); }
  .quiz-card .q-verb { font-family: var(--lp-font-display); font-size: 1.5rem; font-weight: 600; color: var(--lp-cat-teal); }
  .quiz-card .q-blank { color: var(--lp-muted); }
  .quiz-card .q-meaning { font-size: .72rem; color: var(--lp-muted); font-weight: 600; margin-top: 4px; }
  .quiz-opts { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 720px; }
  .quiz-opt {
    font-family: var(--lp-font-body); font-weight: 700; font-size: .85rem;
    padding: 11px 18px; border-radius: var(--lp-radius-sm); border: 1.5px solid var(--lp-border);
    background: var(--lp-surface); color: var(--lp-ink); cursor: pointer;
    transition: all .2s var(--lp-ease); min-width: 65px; text-align: center;
  }
  .quiz-opt:hover:not(.disabled) { border-color: var(--lp-cat-teal); background: rgba(61,127,127,.08); transform: translateY(-2px); }
  .quiz-opt.correct { border-color: var(--lp-success); background: var(--lp-success-soft); color: var(--lp-success-dark); }
  .quiz-opt.wrong { border-color: var(--lp-error); background: var(--lp-error-soft); color: var(--lp-error-dark); }
  .quiz-opt.disabled { cursor: default; opacity: .7; }
  [data-theme="dark"] .quiz-opt.correct { color: #6FE8A8; }
  [data-theme="dark"] .quiz-opt.wrong { color: #FF9F9F; }

  /* Write mode */
  .write-card { width: 100%; max-width: 720px; background: var(--lp-surface); border: 1.5px solid var(--lp-border); border-radius: var(--lp-radius-lg); padding: 20px; text-align: center; box-shadow: var(--lp-shadow-sm); }
  .write-card .w-meaning { font-family: var(--lp-font-display); font-size: 1.1rem; font-weight: 600; color: var(--lp-cat-teal); margin-bottom: 4px; }
  .write-card .w-hint { font-size: .65rem; color: var(--lp-muted); font-weight: 600; margin-bottom: 10px; }
  .write-card .w-gap { font-size: 1rem; font-weight: 500; color: var(--lp-ink); line-height: 1.6; margin-bottom: 12px; }
  .write-card .w-gap .blank { border-bottom: 2px dashed var(--lp-cat-teal); min-width: 50px; display: inline-block; }
  .write-input-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .write-input-row input {
    width: 110px; font-family: var(--lp-font-mono); font-size: .82rem; font-weight: 600;
    text-align: center; padding: 8px 10px; border-radius: var(--lp-radius-sm);
    border: 1.5px solid var(--lp-border); background: var(--lp-bg-paper); color: var(--lp-ink);
    outline: none; transition: border-color .2s;
  }
  .write-input-row input:focus { border-color: var(--lp-cat-teal); }
  .write-input-row input.correct { border-color: var(--lp-success); background: var(--lp-success-soft); }
  .write-input-row input.wrong { border-color: var(--lp-error); background: var(--lp-error-soft); }
  .write-feedback { font-size: .72rem; font-weight: 600; margin-top: 8px; min-height: 1.2em; }
  .write-feedback.ok { color: var(--lp-success); }
  .write-feedback.err { color: var(--lp-error); }

  .scroll-body { padding: 8px 0 30px; }

  /* Battle */
  .battle-scores { display: flex; gap: 12px; justify-content: center; align-items: center; width: 100%; }
  .player-score { display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 6px 16px; border-radius: var(--lp-radius-sm); background: var(--lp-surface); border: 1.5px solid var(--lp-border); min-width: 80px; }
  .player-score.p1 { border-color: var(--lp-cat-blue, #4a9eff); }
  .player-score.p2 { border-color: var(--lp-warning, #e85d5d); }
  .player-score .p-label { font-size: .5rem; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--lp-muted); }
  .player-score .p-points { font-family: var(--lp-font-display); font-size: 1.4rem; font-weight: 600; }
  .player-score.p1 .p-points { color: var(--lp-cat-blue, #4a9eff); }
  .player-score.p2 .p-points { color: var(--lp-warning, #e85d5d); }
  .vs-badge { font-family: var(--lp-font-display); font-size: .8rem; font-style: italic; color: var(--lp-muted); }
  .battle-card { max-width: 360px; height: 160px; perspective: 1200px; position: relative; }
  .battle-card .fc-inner { position: absolute; inset: 0; border-radius: var(--lp-radius-lg, 12px); transition: transform .55s ease; transform-style: preserve-3d; }
  .battle-card.flipped .fc-inner { transform: rotateY(180deg); }
  .battle-card .fc-face { border-radius: var(--lp-radius-lg, 12px); }
  .battle-card .fc-term { font-size: 1.3rem; }
  .battle-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .battle-instruction { font-size: .7rem; font-weight: 700; color: var(--lp-muted); text-align: center; }
  .battle-round { font-family: var(--lp-font-mono); font-size: .62rem; color: var(--lp-muted); text-align: center; }
  .btn--sm { font-size: .7rem; padding: 8px 14px; }
  .btn--blue { background: var(--lp-cat-blue, #4a9eff); color: #fff; border: none; border-radius: var(--lp-radius-sm); cursor: pointer; }
  .btn--orange { background: var(--lp-warning, #e85d5d); color: #fff; border: none; border-radius: var(--lp-radius-sm); cursor: pointer; }
  .btn--red { background: var(--lp-error, #e85d5d); color: #fff; border: none; border-radius: var(--lp-radius-sm); cursor: pointer; }

  @media (max-width: 480px) {
    .quiz-opt { min-width: 55px; padding: 9px 14px; }
    .write-input-row input { width: 90px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
  </div>

  <div class="header">
    <h1>🚀 Phrasal Verbs</h1>

    <!-- Category -->
    <div class="cat-bar" id="catBar"></div>

    <!-- Modes -->
    <div class="pill-bar">
      <button class="pill-btn active" data-mode="study">📖 Study</button>
      <button class="pill-btn" data-mode="quiz">🎯 Quiz</button>
      <button class="pill-btn" data-mode="write">✍️ Write</button>
      <button class="pill-btn" data-mode="battle">⚔️ Battle</button>
      <button class="pill-btn" data-mode="timed">⏱️ Timed</button>
    </div>

    <div class="timer-bar" id="timerBar"><span class="timer-display" id="timerDisplay">1:00</span></div>

    <div class="progress">
      <div class="progress__labels"><span id="progTxt">0 / 18</span><span id="progPct">0%</span></div>
      <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
    </div>
  </div>

  <div class="scroll-body">
    <!-- STUDY -->
    <div data-area="study">
      <div class="fc-count" id="fcCounter">1 / 18</div>
      <div class="fc-card" id="fcCard">
        <div class="fc-inner">
          <div class="fc-face pv-front">
            <div class="fc-emoji" id="fcEmoji">🚀</div>
            <div class="fc-term" id="fcVerb"></div>
            <div class="fc-ipa" id="fcIpa"></div>
            <div class="fc-detail" id="fcEs"></div>
            <div class="fc-hint">tap to see example</div>
          </div>
          <div class="fc-face fc-back">
            <div class="pv-meaning" id="fcMeaning"></div>
            <div class="pv-example" id="fcExample"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="lp-btn lp-btn--ghost" id="shuffleBtn">🔀</button>
        <button class="lp-btn lp-btn--ghost" id="prevBtn">←</button>
        <button class="lp-btn lp-btn--success" id="nextBtn">→</button>
      </div>
    </div>

    <!-- QUIZ -->
    <div data-area="quiz">
      <div class="quiz-card">
        <div class="q-verb" id="quizVerb">look <span class="q-blank">___</span></div>
        <div class="q-meaning" id="quizMeaning"></div>
      </div>
      <div class="quiz-opts" id="quizOptions"></div>
    </div>

    <!-- WRITE -->
    <div data-area="write">
      <div class="write-card">
        <div class="w-meaning" id="writeMeaning"></div>
        <div class="w-hint" id="writeHint">Complete the phrasal verb</div>
        <div class="w-gap" id="writeGap"></div>
        <div class="write-input-row" id="writeInputs"></div>
        <div class="write-feedback" id="writeFeedback"></div>
      </div>
      <button class="lp-btn lp-btn--primary" id="writeCheck">Check ✓</button>
      <button class="lp-btn lp-btn--ghost" id="writeSkip" style="font-size:.72rem;">Skip →</button>
    </div>

    <!-- BATTLE -->
    <div data-area="battle">
      <div class="battle-scores">
        <div class="player-score p1"><span class="p-label">Player 1</span><span class="p-points" id="bp1">0</span></div>
        <span class="vs-badge">vs</span>
        <div class="player-score p2"><span class="p-label">Player 2</span><span class="p-points" id="bp2">0</span></div>
      </div>
      <div class="battle-round" id="battleRound">Round 1 / 10</div>
      <div class="fc-card battle-card" id="battleCard">
        <div class="fc-inner">
          <div class="fc-face pv-front">
            <div class="fc-emoji" id="battleEmoji">🚀</div>
            <div class="fc-term" id="battleTerm"></div>
            <div class="fc-hint">claim to answer</div>
          </div>
          <div class="fc-face fc-back">
            <div class="pv-meaning" id="battleMeaning"></div>
            <div class="pv-example" id="battleExample" style="font-size:.7rem;"></div>
          </div>
        </div>
      </div>
      <div class="battle-instruction" id="battleInstruction">Press 1 or 2 to claim · S to skip</div>
      <div class="battle-actions" id="battleActions">
        <button class="lp-btn lp-btn--primary" id="bClaim1">1️⃣ P1</button>
        <button class="lp-btn lp-btn--ghost" id="bSkip">⏭️ Skip</button>
        <button class="lp-btn lp-btn--primary" id="bClaim2">2️⃣ P2</button>
      </div>
      <div class="battle-actions" id="battleJudge" style="display:none;">
        <button class="lp-btn lp-btn--success" id="bCorrect">✓ Correct (Y)</button>
        <button class="lp-btn lp-btn--danger" id="bWrong">✗ Wrong (N)</button>
      </div>
      <div class="battle-actions" id="battleNext" style="display:none;">
        <button class="lp-btn lp-btn--success" id="bNext">→ Next (Space)</button>
      </div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/phrasal-verbs.js';
import { shuffle, initTheme, toggleTheme, recordScore, Timer, formatTime, showResult } from '../js/utils.js';
import { initSwipe } from '../js/swipe.js';

initTheme();
document.getElementById('themeToggle')?.addEventListener('click', () => toggleTheme());

const catKeys = Object.keys(CATEGORIES);
let currentCat = catKeys[0];
let mode = 'study';
let deck = [], idx = 0, score = 0, total = 0;
let timer = null;
let timedSeconds = 0;

// ─── Category bar ───
function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = catKeys.map(k =>
    `<button class="cat-btn ${k === currentCat ? 'active' : ''}" data-cat="${k}">${CATEGORIES[k].icon} ${CATEGORIES[k].label}</button>`
  ).join('');
  bar.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      bar.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
      startMode();
    });
  });
}
renderCatBar();

// ─── Mode switching ───
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    startMode();
  });
});

function startMode() {
  stopTimer();
  document.querySelectorAll('[data-area]').forEach(a => a.classList.remove('show'));
  document.getElementById('timerBar').classList.remove('show');
  if (mode === 'study') initStudy();
  else if (mode === 'quiz') initQuiz(false);
  else if (mode === 'write') initWrite();
  else if (mode === 'battle') initBattle();
  else if (mode === 'timed') initQuiz(true);
}

function stopTimer() { if (timer) { timer.stop(); timer = null; } timedSeconds = 0; }
function getData() { return CATEGORIES[currentCat].items; }

function updProgress(current, t) {
  const pct = Math.round((current / t) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = `${current} / ${t}`;
  document.getElementById('progPct').textContent = pct + '%';
}

// ═══ STUDY ═══
function initStudy() {
  deck = shuffle(getData());
  idx = 0;
  document.querySelector('[data-area="study"]').classList.add('show');
  renderStudyCard();
}

function renderStudyCard() {
  const item = deck[idx];
  const card = document.getElementById('fcCard');
  card.classList.remove('flip');
  document.getElementById('fcEmoji').textContent = CATEGORIES[currentCat].icon;
  document.getElementById('fcVerb').textContent = item.verb;
  document.getElementById('fcIpa').textContent = item.ipa || '';
  document.getElementById('fcEs').textContent = item.es;
  document.getElementById('fcMeaning').textContent = `${item.verb} = ${item.es}`;
  document.getElementById('fcExample').textContent = item.example;
  document.getElementById('fcCounter').textContent = `${idx + 1} / ${deck.length}`;
  updProgress(idx + 1, deck.length);
}

document.getElementById('fcCard').addEventListener('click', () => document.getElementById('fcCard').classList.toggle('flip'));
document.getElementById('nextBtn').addEventListener('click', () => advanceCard(1));
document.getElementById('prevBtn').addEventListener('click', () => advanceCard(-1));
document.getElementById('shuffleBtn').addEventListener('click', () => { deck = shuffle(deck); idx = 0; renderStudyCard(); });
initSwipe(document.querySelector('[data-area="study"]'), { onNext: () => advanceCard(1), onPrev: () => advanceCard(-1) });

function advanceCard(dir) {
  const card = document.getElementById('fcCard');
  const inner = card.querySelector('.fc-inner');
  if (card.classList.contains('flip')) {
    inner.style.transition = 'none';
    card.classList.remove('flip');
    void inner.offsetHeight;
    inner.style.transition = '';
  }
  idx = (idx + dir + deck.length) % deck.length;
  renderStudyCard();
}

document.addEventListener('keydown', e => {
  if (mode === 'battle') {
    if (battle.phase === 'claim') {
      if (e.key === '1') { e.preventDefault(); battleClaim(1); }
      else if (e.key === '2') { e.preventDefault(); battleClaim(2); }
      else if (e.key === 's' || e.key === 'S') { e.preventDefault(); battleSkip(); }
    } else if (battle.phase === 'judge') {
      if (e.key === 'y' || e.key === 'Y' || e.key === 'Enter') { e.preventDefault(); battleJudge(true); }
      else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); battleJudge(false); }
    } else if (battle.phase === 'next') {
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowRight') { e.preventDefault(); battleNext(); }
    }
    return;
  }
  if (mode !== 'study') return;
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    const card = document.getElementById('fcCard');
    if (card.classList.contains('flip')) advanceCard(1);
    else card.classList.add('flip');
  } else if (e.key === 'ArrowRight') { e.preventDefault(); advanceCard(1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); advanceCard(-1); }
});

// ═══ QUIZ (match particle) / TIMED ═══
function initQuiz(timed) {
  deck = shuffle(getData());
  idx = 0; score = 0;
  total = Math.min(timed ? 12 : 15, deck.length);
  document.querySelector('[data-area="quiz"]').classList.add('show');

  if (timed) {
    document.getElementById('timerBar').classList.add('show');
    timedSeconds = total * 6;
    timer = new Timer(timedSeconds,
      r => { const el = document.getElementById('timerDisplay'); el.textContent = formatTime(r); el.classList.toggle('warn', r <= 10); },
      () => finishQuiz()
    );
    timer.start();
  } else {
    timedSeconds = 0;
  }
  renderQuiz();
}

function renderQuiz() {
  if (idx >= total) { finishQuiz(); return; }
  const item = deck[idx];

  document.getElementById('quizVerb').innerHTML = `${item.base} <span class="q-blank">___</span>`;
  document.getElementById('quizMeaning').textContent = item.es;

  // Get unique particles from current category for distractors
  const allParticles = [...new Set(getData().map(i => i.particle))];
  const distractors = shuffle(allParticles.filter(p => p !== item.particle)).slice(0, 3);
  const options = shuffle([item.particle, ...distractors]);

  const optsEl = document.getElementById('quizOptions');
  optsEl.innerHTML = options.map(o => `<button class="quiz-opt" data-val="${o}">${o}</button>`).join('');
  optsEl.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      optsEl.querySelectorAll('.quiz-opt').forEach(b => { b.classList.add('disabled'); b.style.pointerEvents = 'none'; });
      if (btn.dataset.val === item.particle) { btn.classList.add('correct'); score++; }
      else {
        btn.classList.add('wrong');
        optsEl.querySelectorAll('.quiz-opt').forEach(b => { if (b.dataset.val === item.particle) b.classList.add('correct'); });
      }
      document.getElementById('quizVerb').innerHTML = `${item.base} <span style="color:var(--lp-success);font-weight:700">${item.particle}</span>`;
      idx++;
      updProgress(idx, total);
      setTimeout(renderQuiz, 800);
    });
  });
  updProgress(idx, total);
}

function finishQuiz() {
  const elapsed = timedSeconds ? timedSeconds - (timer?.remaining ?? 0) : null;
  stopTimer();
  const pct = showResult({
    correct: score, total,
    containerEl: document.getElementById('resultOverlay'),
    onRestart: () => startMode(),
    onStudy: () => { mode = 'study'; document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === 'study')); startMode(); },
    elapsedSeconds: elapsed
  });
  recordScore(`phrasal-${currentCat}-quiz`, pct);
}

// ═══ WRITE ═══
let writeDeck = [], writeIdx = 0, writeScore = 0, writeTotal = 10;

function initWrite() {
  writeDeck = shuffle(getData());
  writeIdx = 0; writeScore = 0;
  writeTotal = Math.min(10, writeDeck.length);
  document.querySelector('[data-area="write"]').classList.add('show');
  renderWrite();
}

function renderWrite() {
  if (writeIdx >= writeTotal) { finishWrite(); return; }
  const item = writeDeck[writeIdx];

  document.getElementById('writeMeaning').textContent = item.es;
  document.getElementById('writeHint').textContent = `Complete: ${item.base} + ?`;

  // Count blanks in gap sentence
  const parts = item.verb.split(' ');
  const inputsEl = document.getElementById('writeInputs');
  inputsEl.innerHTML = parts.map((p, i) => `<input type="text" class="w-input" data-idx="${i}" autocomplete="off" spellcheck="false" placeholder="${i === 0 ? 'verb' : 'particle'}">`).join('');

  document.getElementById('writeGap').innerHTML = item.gap.replace(/___/g, '<span class="blank">___</span>');
  document.getElementById('writeFeedback').textContent = '';
  document.getElementById('writeFeedback').className = 'write-feedback';

  const inputs = inputsEl.querySelectorAll('.w-input');
  inputs[0]?.focus();
  // Tab through inputs, submit on Enter in last
  inputs.forEach((inp, i) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (i < inputs.length - 1) inputs[i + 1].focus();
        else doWriteCheck();
      }
    });
  });

  updProgress(writeIdx, writeTotal);
}

function doWriteCheck() {
  const item = writeDeck[writeIdx];
  const parts = item.verb.split(' ');
  const inputs = document.querySelectorAll('.w-input');
  let allCorrect = true;

  inputs.forEach((inp, i) => {
    const val = inp.value.trim().toLowerCase();
    const expected = parts[i].toLowerCase();
    if (val === expected) { inp.classList.add('correct'); }
    else { inp.classList.add('wrong'); allCorrect = false; }
  });

  const fb = document.getElementById('writeFeedback');
  if (allCorrect) {
    writeScore++;
    fb.textContent = '✓ Correct!';
    fb.className = 'write-feedback ok';
  } else {
    fb.textContent = `✗ ${item.verb}`;
    fb.className = 'write-feedback err';
  }

  writeIdx++;
  updProgress(writeIdx, writeTotal);
  setTimeout(renderWrite, 1200);
}

document.getElementById('writeCheck').addEventListener('click', doWriteCheck);
document.getElementById('writeSkip').addEventListener('click', () => { writeIdx++; renderWrite(); });

function finishWrite() {
  const pct = showResult({
    correct: writeScore, total: writeTotal,
    containerEl: document.getElementById('resultOverlay'),
    onRestart: () => startMode(),
    onStudy: () => { mode = 'study'; document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === 'study')); startMode(); }
  });
  recordScore(`phrasal-${currentCat}-write`, pct);
}

// ═══ BATTLE ═══
let battle = { p1: 0, p2: 0, round: 0, total: 10, claimer: null, deck: [], phase: 'claim' };

function initBattle() {
  const items = shuffle(getData());
  battle = { p1: 0, p2: 0, round: 0, total: Math.min(10, items.length), claimer: null, deck: items, phase: 'claim' };
  document.querySelector('[data-area="battle"]').classList.add('show');
  updateBattleScores();
  showBattleCard();
}

function showBattleCard() {
  if (battle.round >= battle.total) { showBattleResult(); return; }
  const item = battle.deck[battle.round];

  const card = document.getElementById('battleCard');
  card.classList.remove('flipped');
  document.getElementById('battleEmoji').textContent = CATEGORIES[currentCat].icon;
  document.getElementById('battleTerm').textContent = item.verb;
  document.getElementById('battleMeaning').textContent = item.es;
  document.getElementById('battleExample').textContent = item.example;

  document.getElementById('battleRound').textContent = `Round ${battle.round + 1} / ${battle.total}`;
  updProgress(battle.round + 1, battle.total);
  setBattlePhase('claim');
}

function setBattlePhase(phase) {
  battle.phase = phase;
  document.getElementById('battleActions').style.display = phase === 'claim' ? 'flex' : 'none';
  document.getElementById('battleJudge').style.display = phase === 'judge' ? 'flex' : 'none';
  document.getElementById('battleNext').style.display = phase === 'next' ? 'flex' : 'none';

  const instructions = { claim: 'Press 1 or 2 to claim · S to skip', judge: `Player ${battle.claimer} answers — was it correct?`, next: 'Press Space or → to continue' };
  document.getElementById('battleInstruction').textContent = instructions[phase] || '';
}

function battleClaim(player) {
  battle.claimer = player;
  document.getElementById('battleCard').classList.add('flipped');
  setBattlePhase('judge');
}

function battleSkip() { battle.round++; showBattleCard(); }

function battleJudge(correct) {
  if (correct) battle[`p${battle.claimer}`]++;
  else battle[`p${battle.claimer === 1 ? 2 : 1}`]++;
  updateBattleScores();
  // Show correct answer after judging
  const item = battle.deck[battle.round];
  const answerText = correct
    ? `✓ Correct! — ${item.es}`
    : `✗ Wrong — Answer: ${item.es}`;
  document.getElementById('battleInstruction').textContent = answerText;
  setBattlePhase('next');
  // Override instruction set by setBattlePhase
  document.getElementById('battleInstruction').textContent = answerText;
}

function battleNext() { battle.round++; showBattleCard(); }

function updateBattleScores() {
  document.getElementById('bp1').textContent = battle.p1;
  document.getElementById('bp2').textContent = battle.p2;
}

function showBattleResult() {
  const winner = battle.p1 > battle.p2 ? 'Player 1 wins! 🎉' : battle.p2 > battle.p1 ? 'Player 2 wins! 🎉' : "It's a tie! 🤝";
  const overlay = document.getElementById('resultOverlay');
  overlay.innerHTML = `<div class="result-box">
    <div class="result-title">${winner}</div>
    <div class="result-sub" style="font-size:1.2rem;margin:8px 0;">🔵 ${battle.p1} — ${battle.p2} 🔴</div>
    <div class="result-sub">${battle.total} rounds</div>
    <div class="result-btns"><button class="lp-btn lp-btn--success" id="rr">🔄 Rematch</button><button class="lp-btn lp-btn--ghost" id="rs">📖 Study</button></div>
  </div>`;
  overlay.classList.add('show');
  overlay.querySelector('#rr').addEventListener('click', () => { overlay.classList.remove('show'); initBattle(); });
  overlay.querySelector('#rs').addEventListener('click', () => { overlay.classList.remove('show'); mode='study'; document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode==='study')); startMode(); });
}

// Battle button handlers
document.getElementById('bClaim1').addEventListener('click', () => battleClaim(1));
document.getElementById('bClaim2').addEventListener('click', () => battleClaim(2));
document.getElementById('bSkip').addEventListener('click', () => battleSkip());
document.getElementById('bCorrect').addEventListener('click', () => battleJudge(true));
document.getElementById('bWrong').addEventListener('click', () => battleJudge(false));
document.getElementById('bNext').addEventListener('click', () => battleNext());

// ─── Init ───
startMode();
</script>
