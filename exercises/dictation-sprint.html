<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictation Sprint — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8860B'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="../js/lp-theme.js"></script>
<script src="../js/lp-input-zoom.js"></script>
<script src="../js/lp-nav-icons.js"></script>
<script src="../js/lp-platform-urls.js"></script>
<script src="../lp-guest-reset.js"></script>
<script src="../lp-login.js"></script>
<script src="../js/lp-nav-helpers.js"></script>
<script src="../js/lp-about.js"></script>
<style>body{background:#FFFFFF;color:#2C2418}[data-theme="dark"] body{background:#181B20;color:#E8EAED}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/lp-nav-active.css">
<link rel="stylesheet" href="../css/lp-about.css">
<link rel="stylesheet" href="../css/typed-answer-shell.css">
<link rel="stylesheet" href="../css/dictation-shell.css">
</head>
<body>
<div class="wrap" data-color="amber">

  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
  </div>

  <header class="header">
    <h1>🎙️ Dictation Sprint</h1>
    <div class="pill-bar pill-bar--scroll" role="tablist">
      <button class="pill-btn active" data-mode="practice" role="tab">📝 Practice</button>
      <button class="pill-btn" data-mode="timed" role="tab">⏱️ Timed</button>
    </div>
  </header>

  <div class="cat-bar" id="catBar"></div>

  <div class="no-tts-warning" id="noTtsWarning">
    ⚠️ Your browser doesn't support Text-to-Speech. This exercise requires audio playback.
  </div>

  <div class="progress">
    <div class="progress__labels"><span id="progTxt">0 / 15</span><span id="progPct">0%</span></div>
    <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
  </div>

  <div class="timer-bar" id="timerBar">
    <span class="timer-display" id="timerDisplay">3:00</span>
  </div>

  <div class="scroll-body">
    <div data-area="dictation">
      <div class="dict-card">
        <div class="dict-card__counter" id="dCounter">1 / 15</div>
        <div class="dict-card__hint" id="dHint">Daily routine</div>
        <div class="dict-card__controls">
          <button class="play-btn slow" id="playSlow" aria-label="Play slow" title="Slow">🐢</button>
          <button class="play-btn" id="playBtn" aria-label="Play audio" title="Play">🔊</button>
        </div>
        <div class="dict-card__plays" id="dPlays">Plays: 0 / 3</div>
        <div class="dict-card__playback" id="dPlayback"></div>
      </div>

      <div class="dict-input">
        <textarea id="dInput" placeholder="Type what you hear..." rows="2" autocomplete="off" autocapitalize="sentences" spellcheck="false"></textarea>
      </div>

      <div class="dict-feedback" id="dFeedback">
        <div class="dict-feedback__score" id="dScore"></div>
        <div class="dict-feedback__row" id="dUserRow">
          <span class="dict-feedback__label">You wrote</span>
          <p class="dict-feedback__text" id="dDiff"></p>
        </div>
        <div class="dict-feedback__row" id="dCorrectRow">
          <span class="dict-feedback__label">Answer</span>
          <p class="dict-feedback__text" id="dCorrect"></p>
        </div>
      </div>

      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="lp-btn lp-btn--primary" id="checkBtn">Check ✓</button>
        <button class="lp-btn lp-btn--ghost" id="nextBtn" style="display:none">Next →</button>
        <button class="lp-btn lp-btn--ghost" id="skipBtn">Skip →</button>
      </div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/dictation-sprint.js';
import { initDictationPractice } from '../js/dictation-engine.js';

initDictationPractice({
  categories: CATEGORIES,
  scoreKeyPrefix: 'dict',
  contentId: 'dictation-sprint',
});
</script>

<script type="module" src="../js/exercise-shell.js"></script>
</body>
</html>
