<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Formation — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8860B'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="../js/theme-init.js"></script>
<style>body{background:#FAF7F2;color:#2C2418}[data-theme="dark"] body{background:#1A1714;color:#EDE8E0}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<link rel="stylesheet" href="../css/sidebar.css">
<style>
  body { min-height: 100vh; padding: 0 14px; }
  .pill-btn.active { background: var(--lp-cat-amber); color: #fff; box-shadow: 0 2px 10px rgba(184,134,11,.25); }
  .progress__fill { background: var(--lp-cat-amber); }
  .cat-bar { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
  .cat-bar::-webkit-scrollbar { display: none; }
  [data-area] { display: none; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
  [data-area].show { display: flex; }
  .sentence-card { width: 100%; max-width: 720px; background: var(--lp-surface); border: 1.5px solid var(--lp-border); border-radius: var(--lp-radius-lg); padding: 22px 20px; text-align: center; box-shadow: var(--lp-shadow-sm); }
  .sentence-card .sc-icon { font-size: 1.6rem; margin-bottom: 6px; }
  .sentence-card .sc-text { font-family: var(--lp-font-display); font-size: 1.1rem; font-weight: 500; color: var(--lp-ink); line-height: 1.5; }
  .sentence-card .sc-text .blank { display: inline-block; min-width: 70px; border-bottom: 2.5px dashed var(--lp-cat-amber); color: var(--lp-cat-amber); font-weight: 700; padding: 0 4px; }
  .sentence-card .sc-counter { font-size: .62rem; font-weight: 700; color: var(--lp-muted); margin-top: 8px; }
  .root-word { font-size: .85rem; font-weight: 700; color: var(--lp-cat-amber); background: rgba(184,134,11,.08); padding: 6px 14px; border-radius: var(--lp-radius-sm); border: 1.5px solid rgba(184,134,11,.3); }
  .answer-input { width: 100%; max-width: 280px; padding: 12px 14px; font-size: 1rem; text-align: center; border-radius: .5rem; border: 2px solid var(--lp-border); background: var(--lp-surface); color: var(--lp-ink); outline: none; transition: border-color .2s; font-family: var(--lp-font-body); }
  .answer-input:focus { border-color: var(--lp-cat-amber); }
  .answer-input.correct { border-color: var(--lp-success); }
  .answer-input.wrong { border-color: var(--lp-error); }
  .explain-box { width: 100%; max-width: 720px; font-size: .75rem; font-weight: 600; color: var(--lp-ink-soft); background: var(--lp-bg-paper); border: 1px solid var(--lp-border); border-radius: var(--lp-radius-sm); padding: 10px 14px; text-align: center; min-height: 2.4em; line-height: 1.5; }
  .fc-card { max-width: 720px; height: 220px; }
  .wf-front .fc-term { font-size: 1.1rem; color: var(--lp-cat-amber); line-height: 1.4; }
  .wf-front .fc-detail { font-size: .82rem; color: var(--lp-ink-soft); margin-top: 4px; }
  .fc-back { background: color-mix(in srgb, var(--lp-cat-amber) 10%, var(--lp-surface)); border-color: var(--lp-cat-amber); }
  .scroll-body { padding: 8px 0 30px; }
  @media (max-width: 480px) { .answer-input { max-width: 240px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar"><a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
</div>
  <div class="header">
    <h1>🧩 Word Formation</h1>
    <div class="cat-bar" id="catBar"></div>
    <div class="pill-bar"><button class="pill-btn active" data-mode="study">📖 Study</button><button class="pill-btn" data-mode="practice">🎯 Practice</button><button class="pill-btn" data-mode="timed">⏱️ Timed</button></div>
    <div class="timer-bar" id="timerBar"><span class="timer-display" id="timerDisplay">1:00</span></div>
    <div class="progress"><div class="progress__labels"><span id="progTxt">0 / 12</span><span id="progPct">0%</span></div><div class="progress__track"><div class="progress__fill" id="progFill"></div></div></div>
  </div>
  <div class="scroll-body">
    <div data-area="practice"><div class="sentence-card"><div class="sc-icon" id="scIcon"></div><div class="sc-text" id="scText"></div><div class="sc-counter" id="scCounter"></div></div><div class="root-word" id="rootWord"></div><input class="answer-input" id="answerInput" type="text" placeholder="Type the correct form…" autocomplete="off" autocorrect="off" spellcheck="false"><div class="explain-box" id="explainBox"></div></div>
    <div data-area="study"><div class="fc-count" id="fcCounter">1 / 12</div><div class="fc-card" id="fcCard"><div class="fc-inner"><div class="fc-face wf-front"><div class="fc-emoji" id="fcEmoji">🧩</div><div class="fc-term" id="fcSentence"></div><div class="fc-detail" id="fcRoot"></div><div class="fc-hint">tap to see answer</div></div><div class="fc-face fc-back"><div class="fc-term" id="fcAnswer" style="font-size:1.4rem;color:var(--lp-success)"></div><div class="fc-detail" id="fcExplain"></div></div></div></div><div class="fc-nav"><button class="lp-btn lp-btn--ghost" id="shuffleBtn">🔀</button><button class="lp-btn lp-btn--ghost" id="prevBtn">←</button><button class="lp-btn lp-btn--success" id="nextBtn">→</button></div></div>
  </div>
  <div class="result-overlay" id="resultOverlay"></div>
</div>
<script type="module">
import { CATEGORIES } from '../data/word-formation.js';
import { shuffle, initTheme, toggleTheme, recordScore, Timer, formatTime, showResult } from '../js/utils.js';
import { initSwipe } from '../js/swipe.js';
initTheme();
document.getElementById('themeToggle')?.addEventListener('click', () => toggleTheme());
const catKeys = Object.keys(CATEGORIES);
let currentCat = catKeys[0], mode = 'study', deck = [], idx = 0, score = 0, total = 0, timer = null, answered = false;
function renderCatBar() { const bar = document.getElementById('catBar'); bar.innerHTML = catKeys.map(k => `<button class="cat-btn ${k===currentCat?'active':''}" data-cat="${k}">${CATEGORIES[k].icon} ${CATEGORIES[k].label}</button>`).join(''); bar.querySelectorAll('[data-cat]').forEach(btn => btn.addEventListener('click', () => { currentCat = btn.dataset.cat; bar.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat)); startMode(); })); }
renderCatBar();
document.querySelectorAll('[data-mode]').forEach(btn => btn.addEventListener('click', () => { mode = btn.dataset.mode; document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode)); startMode(); }));
function startMode() { stopTimer(); document.querySelectorAll('[data-area]').forEach(a => a.classList.remove('show')); document.getElementById('timerBar').classList.remove('show'); if (mode === 'practice') initPractice(false); else if (mode === 'timed') initPractice(true); else initStudy(); }
function stopTimer() { if (timer) { timer.stop(); timer = null; } }
function getData() { return CATEGORIES[currentCat].items; }
function updProgress(c, t) { const p = Math.round((c/t)*100); document.getElementById('progFill').style.width = p+'%'; document.getElementById('progTxt').textContent = `${c} / ${t}`; document.getElementById('progPct').textContent = p+'%'; }
function initPractice(timed) { deck = shuffle(getData()); idx = 0; score = 0; answered = false; total = Math.min(timed ? 10 : deck.length, deck.length); document.querySelector('[data-area="practice"]').classList.add('show'); if (timed) { document.getElementById('timerBar').classList.add('show'); timer = new Timer(total*8, r => { const el = document.getElementById('timerDisplay'); el.textContent = formatTime(r); el.classList.toggle('warn', r<=10); }, () => finishPractice()); timer.start(); } renderPractice(); }
function renderPractice() { if (idx >= total) { stopTimer(); finishPractice(); return; } answered = false; const item = deck[idx]; document.getElementById('scIcon').textContent = CATEGORIES[currentCat].icon; document.getElementById('scText').innerHTML = item.sentence.replace('___', '<span class="blank">?</span>'); document.getElementById('scCounter').textContent = `${idx+1} / ${total}`; document.getElementById('explainBox').textContent = ''; document.getElementById('rootWord').textContent = `Root: ${item.root}`; const input = document.getElementById('answerInput'); input.value = ''; input.className = 'answer-input'; input.disabled = false; input.focus(); updProgress(idx, total); }
function checkAnswer() { if (answered) return; const input = document.getElementById('answerInput'); const val = input.value.trim().toLowerCase(); const item = deck[idx]; if (!val) return; answered = true; input.disabled = true; const correct = val === item.correct.toLowerCase(); if (correct) { input.classList.add('correct'); score++; } else { input.classList.add('wrong'); } document.getElementById('scText').innerHTML = item.sentence.replace('___', `<span class="blank">${item.correct}</span>`); document.getElementById('explainBox').textContent = item.explain; idx++; updProgress(idx, total); setTimeout(renderPractice, 1600); }
document.getElementById('answerInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
function finishPractice() { const pct = showResult({ correct: score, total, containerEl: document.getElementById('resultOverlay'), onRestart: () => startMode(), onStudy: () => { mode = 'study'; document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === 'study')); startMode(); } }); recordScore(`wf-${currentCat}`, pct); }
function initStudy() { deck = shuffle(getData()); idx = 0; document.querySelector('[data-area="study"]').classList.add('show'); renderStudyCard(); }
function renderStudyCard() { const item = deck[idx]; document.getElementById('fcCard').classList.remove('flip'); document.getElementById('fcEmoji').textContent = CATEGORIES[currentCat].icon; document.getElementById('fcSentence').textContent = item.sentence.replace('___', '_____'); document.getElementById('fcRoot').textContent = `Root: ${item.root}`; document.getElementById('fcAnswer').textContent = item.correct; document.getElementById('fcExplain').textContent = item.explain; document.getElementById('fcCounter').textContent = `${idx+1} / ${deck.length}`; updProgress(idx+1, deck.length); }
document.getElementById('fcCard').addEventListener('click', () => document.getElementById('fcCard').classList.toggle('flip'));
document.getElementById('nextBtn').addEventListener('click', () => advanceCard(1));
document.getElementById('prevBtn').addEventListener('click', () => advanceCard(-1));
document.getElementById('shuffleBtn').addEventListener('click', () => { deck = shuffle(deck); idx = 0; renderStudyCard(); });
initSwipe(document.querySelector('[data-area="study"]'), { onNext: () => advanceCard(1), onPrev: () => advanceCard(-1) });

function advanceCard(dir) {
  const card = document.getElementById('fcCard');
  const inner = card.querySelector('.fc-inner');
  if (card.classList.contains('flip') && inner) {
    inner.style.transition = 'opacity .15s ease, transform .2s ease';
    inner.style.opacity = '0';
    card.classList.remove('flip');
    let done = false;
    const onDone = () => {
      if (done) return; done = true;
      inner.removeEventListener('transitionend', onDone);
      inner.style.transition = 'none';
      idx = (idx + dir + deck.length) % deck.length;
      renderStudyCard();
      void inner.offsetHeight;
      inner.style.transition = 'opacity .15s ease';
      inner.style.opacity = '1';
      setTimeout(() => { inner.style.transition = ''; }, 170);
    };
    inner.addEventListener('transitionend', onDone, { once: true });
    setTimeout(onDone, 250);
    return;
  }
  idx = (idx + dir + deck.length) % deck.length;
  renderStudyCard();
}

// Keyboard: Enter/Space = flip or advance, Arrows = navigate
document.addEventListener('keydown', e => {
  if (mode !== 'study') return;
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
      document.activeElement.blur();
    }
    const card = document.getElementById('fcCard');
    if (card.classList.contains('flip')) advanceCard(1);
    else card.classList.add('flip');
  } else if (e.key === 'ArrowRight') { e.preventDefault(); advanceCard(1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); advanceCard(-1); }
});

startMode();
</script>

<script type="module" src="../js/exercise-shell.js"></script>
</body>
</html>
