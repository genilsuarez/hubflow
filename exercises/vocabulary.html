<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8860B'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<style>
  body { min-height: 100vh; overflow-x: hidden; padding: 0 14px 40px; }
  .top-bar { margin-bottom: 2px; }
  .header { padding: 0; margin-bottom: 2px; }
  h1 { font-family: 'Newsreader', serif; font-weight: 600; font-size: .95rem; display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  h1 .accent { font-style: italic; font-weight: 400; color: var(--purple); }
  .back-link { color: var(--purple); font-size: .75rem; }
  .pill-btn.active { background: var(--purple); color: #fff; box-shadow: 0 2px 10px rgba(123,94,167,.25); }

  /* Category selector — compact scroll with fade */
  .cat-scroll-wrapper {
    position: relative;
    margin-bottom: 6px;
  }
  .cat-scroll-wrapper::before,
  .cat-scroll-wrapper::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; width: 28px;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity .2s;
  }
  .cat-scroll-wrapper::before {
    left: 0;
    background: linear-gradient(to right, var(--lp-bg-paper), transparent);
    border-radius: var(--lp-radius-sm) 0 0 var(--lp-radius-sm);
  }
  .cat-scroll-wrapper::after {
    right: 0;
    background: linear-gradient(to left, var(--lp-bg-paper), transparent);
    border-radius: 0 var(--lp-radius-sm) var(--lp-radius-sm) 0;
  }
  .cat-scroll-wrapper.fade-left::before { opacity: 1; }
  .cat-scroll-wrapper.fade-right::after { opacity: 1; }

  #catBar {
    display: flex;
    align-items: center;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    gap: 4px;
    padding: 6px 4px;
    scroll-behavior: smooth;
    background: var(--lp-bg-paper);
    border: 1.5px solid var(--lp-border);
    border-radius: var(--lp-radius-sm);
    transition: flex-wrap 0s;
  }
  #catBar::-webkit-scrollbar { display: none; }
  #catBar .pill-btn {
    flex: 0 0 auto;
    padding: 5px 11px;
    font-size: .64rem;
    min-height: unset;
    white-space: nowrap;
  }

  /* Expand toggle button — inside catBar, sticky right */
  .cat-expand-btn {
    flex: 0 0 auto;
    position: sticky;
    right: 0;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--lp-border);
    background: var(--lp-bg-paper);
    color: var(--lp-muted);
    font-size: .6rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, background .2s, color .2s;
    z-index: 3;
  }
  .cat-expand-btn:hover { background: var(--lp-surface); color: var(--lp-ink); }
  .cat-expand-btn:focus-visible { outline: 2px solid var(--lp-accent); outline-offset: 2px; }
  .cat-expand-btn[aria-expanded="true"] { transform: rotate(180deg); }

  /* Expanded state */
  .cat-scroll-wrapper.expanded #catBar {
    flex-wrap: wrap;
    overflow-x: visible;
    gap: 5px;
    padding: 8px 6px;
  }
  .cat-scroll-wrapper.expanded .cat-expand-btn {
    position: sticky;
    right: 0;
    bottom: 0;
    margin-left: auto;
  }
  .cat-scroll-wrapper.expanded::before,
  .cat-scroll-wrapper.expanded::after { opacity: 0 !important; }

  /* Mode bar */
  .header .pill-bar:not(.pill-bar--scroll) { padding: 2px; gap: 1px; margin-bottom: 2px; }
  .header .pill-bar:not(.pill-bar--scroll) .pill-btn { padding: 3px 8px; font-size: .65rem; min-height: unset; }

  /* Compact progress */
  #progressWrap { margin-bottom: 0; }
  #progressWrap .progress__labels { margin-bottom: 2px; font-size: .6rem; }

  /* Study area */
  [data-area] { display: none; flex-direction: column; align-items: center; gap: 4px; width: 100%; }
  [data-area].show { display: flex; }

  /* Flashcard overrides */
  .fc-card { max-width: 440px; height: 250px; }
  .fc-back { background: var(--c-vocab-soft); border-color: var(--purple); }
  [data-theme="dark"] .fc-back { background: var(--surface); border-color: var(--purple); }
  .fc-back .fc-term { color: var(--purple); font-size: 1.3rem; }
  .fc-back .fc-detail { font-size: .72rem; }

  /* Battle card */
  .battle-card { width: 100%; max-width: 360px; height: 140px; perspective: 1200px; position: relative; margin: 0 auto 8px; }
  .battle-card .fc-inner { position: absolute; inset: 0; border-radius: var(--radius-lg); transition: transform .55s var(--ease); transform-style: preserve-3d; }
  .battle-card.flipped .fc-inner { transform: rotateY(180deg); }
  .battle-card .fc-face { border-radius: var(--radius-lg); padding: 16px; }
  .battle-card .fc-emoji { font-size: 2.4rem; }
  .battle-card .fc-term { font-size: 1.4rem; }

  .battle-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .battle-instruction { font-size: .7rem; font-weight: 700; color: var(--muted); text-align: center; }
  .battle-round { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--muted); text-align: center; }

  #pairScore { font-size: .78rem; font-weight: 700; color: var(--muted); text-align: center; margin-top: 6px; }
  .match-instruction { font-size: .78rem; font-weight: 700; color: var(--muted); text-align: center; margin-bottom: 8px; }

  .scroll-body { padding: 0 0 40px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
    <div class="tb-actions">
    <a class="lp-icon-btn" id="portalLink" href="https://genilsuarez.github.io/deskflow/" aria-label="Ir al portal DeskFlow" title="Portal">🏠</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
  </div>
  </div>

  <div class="header">
    <h1>🧠 Vocabulary <span class="accent">Match</span></h1>

    <!-- Categories -->
    <div class="cat-scroll-wrapper" id="catWrapper">
      <div id="catBar">
        <button class="cat-expand-btn" id="catExpandBtn" aria-label="Expandir categorías" aria-expanded="false" title="Ver todas">▼</button>
      </div>
    </div>

    <!-- Modes -->
    <div class="pill-bar">
      <button class="pill-btn active purple" data-mode="study">📖 Study</button>
      <button class="pill-btn" data-mode="quiz">⚡ Quiz</button>
      <button class="pill-btn" data-mode="match">🔀 Match</button>
      <button class="pill-btn" data-mode="battle">⚔️ Battle</button>
      <button class="pill-btn" data-mode="timed">⏱️ Timed</button>
    </div>

    <!-- Timer -->
    <div class="timer-bar" id="timerBar">
      <span class="timer-display" id="timerDisplay">1:00</span>
    </div>

    <!-- Progress -->
    <div class="progress" id="progressWrap">
      <div class="progress__labels"><span id="progTxt">0 / 10</span><span id="progPct">0%</span></div>
      <div class="progress__track"><div class="progress__fill progress__fill--purple" id="progFill"></div></div>
    </div>
  </div>

  <div class="scroll-body">
    <!-- STUDY -->
    <div data-area="study">
      <div class="fc-count" id="fcCounter">1 / 25</div>
      <button class="listen-btn" id="speakBtn" aria-label="Listen to pronunciation" style="width:48px;height:48px;border-radius:50%;border:2px solid var(--purple);background:rgba(147,51,234,.08);font-size:1.2rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;">🔊</button>
      <div class="fc-card" id="fcCard">
        <div class="fc-inner">
          <div class="fc-face">
            <div class="fc-emoji" id="fcEmoji"></div>
            <div class="fc-term" id="fcWord"></div>
            <div class="fc-hint">tap to flip</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-emoji" id="fcBackEmoji" style="font-size:2rem;"></div>
            <div class="fc-term" id="fcBackWord"></div>
            <div class="fc-detail" id="fcBackMeaning"></div>
            <div class="fc-detail" id="fcBackExtra" style="font-size:.72rem;margin-top:4px;"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="btn btn--ghost" onclick="engine.shuffleDeck()">🔀</button>
        <button class="btn btn--ghost" onclick="engine.navCard(-1)">←</button>
        <button class="btn btn--purple" onclick="engine.navCard(1)">→</button>
      </div>
    </div>

    <!-- QUIZ -->
    <div data-area="quiz">
      <div class="quiz-prompt">
        <div class="quiz-prompt__emoji" id="quizEmoji"></div>
        <div class="quiz-prompt__label" id="quizLabel"></div>
        <div class="quiz-prompt__text" id="quizText"></div>
      </div>
      <div class="quiz-options" id="quizOptions"></div>
    </div>

    <!-- MATCH -->
    <div data-area="match">
      <div class="match-instruction">Tap one from each column to match</div>
      <div class="pair-grid" id="pairGrid"></div>
      <div id="pairScore"></div>
    </div>

    <!-- BATTLE -->
    <div data-area="battle">
      <div class="battle-scores">
        <div class="player-score p1"><span class="p-label">P1</span><span class="p-points" id="p1Score">0</span></div>
        <span class="vs-badge">vs</span>
        <div class="player-score p2"><span class="p-label">P2</span><span class="p-points" id="p2Score">0</span></div>
      </div>
      <div class="battle-round" id="battleRound">Round 1 / 10</div>
      <div class="battle-instruction" id="battleInstruction">Who knows? Tap your button!</div>

      <div class="battle-card" id="battleCard">
        <div class="fc-inner">
          <div class="fc-face">
            <div class="fc-emoji" id="battleEmoji"></div>
            <div class="fc-detail" id="battleHint" style="font-size:.78rem;font-family:'Manrope',sans-serif;text-align:center;color:var(--text);margin-top:4px;"></div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-term" id="battleBackTerm" style="font-size:1.3rem;font-weight:700;color:var(--purple);"></div>
            <div class="fc-detail" id="battleBackSpanish" style="font-size:.7rem;margin-top:4px;"></div>
          </div>
        </div>
      </div>

      <div class="battle-actions" id="battleClaim">
        <button class="btn btn--primary" onclick="engine.battleClaim(1)">🙋 P1</button>
        <button class="btn btn--ghost" onclick="engine.battleSkip()">⏭ Skip</button>
        <button class="btn btn--red" onclick="engine.battleClaim(2)">🙋 P2</button>
      </div>
      <div class="battle-actions" id="battleJudge" style="display:none;">
        <button class="btn btn--green" onclick="engine.battleJudge(true)">✓ Correct</button>
        <button class="btn btn--red" onclick="engine.battleJudge(false)">✗ Wrong</button>
      </div>
      <div class="battle-actions" id="battleNext" style="display:none;">
        <button class="btn btn--purple" onclick="engine.battleNext()">Next →</button>
      </div>
    </div>
  </div>

  <!-- Result Overlay -->
  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/vocabulary.js';
import { FlashcardEngine } from '../js/flashcard-engine.js';

// Vocabulary packs (Fase 4 del plan de recategorización): agrupan las 26
// subcategorías de vocabulary.js en paquetes temáticos accesibles vía
// exercises/vocabulary.html#pack=<name> — sin tocar flashcard-engine.js.
// Se usa hash (no query string) porque serve.json tiene cleanUrls:true, cuyo
// redirect .html→sin-extensión descarta el query string; el hash nunca viaja al servidor.
const PACKS = {
  idioms: { label: 'Idioms Pack', keys: ['idioms', 'bodyIdioms', 'healthIdioms', 'natureIdioms'] },
  soundNatural: { label: 'Sound Natural', keys: ['soundNative', 'saidAlternatives', 'neverUseVery', 'soundingNatural', 'becauseAlternatives'] },
  c1: { label: 'C1 Vocabulary', keys: ['dailyRoutineC1', 'foodDrinkC1', 'advancedVerbs', 'advancedPhrases'] },
  everyday: { label: 'Everyday Basics', keys: ['bodyParts', 'cooking', 'timeOfDay', 'weather', 'seasons', 'socialExpressions', 'personalityAdjectives', 'rhymingReduplication', 'sameWordDifferentMeaning', 'clothingAppearance', 'eggcorns', 'hobbies', 'telephoneEnglish'] },
};

const packParam = new URLSearchParams(location.hash.slice(1)).get('pack');
const pack = packParam && PACKS[packParam];
const activeCategories = pack
  ? Object.fromEntries(pack.keys.filter((k) => CATEGORIES[k]).map((k) => [k, CATEGORIES[k]]))
  : CATEGORIES;

if (pack) {
  const h1 = document.querySelector('h1');
  if (h1) h1.textContent = `🧠 ${pack.label}`;
  document.title = `${pack.label} — HubFlow`;
}

const engine = new FlashcardEngine({
  categories: activeCategories,
  storagePrefix: 'vocab',
  defaultCategory: Object.keys(activeCategories)[0],
});

// Expose for onclick handlers
window.engine = engine;

// ─── Category scroll fade indicators ───
const catBar = document.getElementById('catBar');
const catWrapper = document.getElementById('catWrapper');
const catExpandBtn = document.getElementById('catExpandBtn');

function updateFades() {
  if (!catBar || !catWrapper || catWrapper.classList.contains('expanded')) return;
  const { scrollLeft, scrollWidth, clientWidth } = catBar;
  catWrapper.classList.toggle('fade-left', scrollLeft > 8);
  catWrapper.classList.toggle('fade-right', scrollLeft + clientWidth < scrollWidth - 8);
}
catBar.addEventListener('scroll', updateFades);
new MutationObserver(updateFades).observe(catBar, { childList: true });
updateFades();

// ─── Expand/collapse toggle ───
catExpandBtn.addEventListener('click', () => {
  const expanded = catWrapper.classList.toggle('expanded');
  catExpandBtn.setAttribute('aria-expanded', expanded);
  if (!expanded) {
    // Collapse: scroll active into view
    const active = catBar.querySelector('.pill-btn.active');
    if (active) requestAnimationFrame(() => active.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' }));
    updateFades();
  }
});

// Flip on card click
document.getElementById('fcCard')?.addEventListener('click', () => engine.flipCard());
document.getElementById('battleCard')?.addEventListener('click', () => {
  document.getElementById('battleCard').classList.toggle('flipped');
});
</script>

<script>
// Local dev: rewrite portal link to localhost
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  const pl = document.getElementById('portalLink');
  if (pl) pl.href = 'http://localhost:3000/';
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a[href*="localhost:"]');
    if (a) {
      const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      const url = new URL(a.href);
      url.searchParams.set('theme', theme);
      a.href = url.toString();
    }
  });
}
</script>
</body>
</html>
