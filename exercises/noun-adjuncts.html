<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noun Adjuncts — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8860B'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<style>
  body { overflow-x: hidden; min-height: 100vh; padding: 0 14px 40px; }
  .header { padding: 6px 0; margin-bottom: 8px; }
  h1 { font-family: 'Newsreader', serif; font-weight: 600; font-size: clamp(1rem,3vw,1.4rem); display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .h1-suffix { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--c-noun); }
  .h1-label { font-family: 'Newsreader', serif; font-style: italic; font-weight: 400; color: var(--muted); font-size: .9em; }
  .level-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .level-pill { font-family: 'Manrope', sans-serif; font-size: .68rem; font-weight: 700; padding: 6px 12px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all .2s; min-height: 36px; display: flex; align-items: center; gap: 4px; }
  .level-pill.active { background: var(--c-noun); color: #fff; border-color: var(--c-noun); box-shadow: 0 2px 10px rgba(74,140,92,.25); }
  .level-pill.locked { opacity: .4; cursor: not-allowed; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; font-size: .62rem; font-weight: 700; color: var(--muted); }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend .dot { width: 9px; height: 9px; border-radius: 50%; }
  .legend .dot.red { background: var(--red); }
  .legend .dot.blue { background: var(--blue); }
  .legend .dot.green { background: var(--green); }
  .check-area { display: flex; gap: 8px; justify-content: center; margin-top: 14px; }
  #livesBar { display: none; text-align: center; font-size: 1.1rem; margin-bottom: 4px; }
  #livesBar.show { display: block; }
  #streakBar { display: none; text-align: center; font-size: .72rem; font-weight: 700; color: var(--green-dark); margin-bottom: 4px; }
  #streakBar.show { display: block; }
  .scroll-body { padding: 10px 0 40px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
    <div class="tb-actions">
    <a class="lp-icon-btn" id="portalLink" href="https://genilsuarez.github.io/deskflow/" aria-label="Ir al portal DeskFlow" title="Portal">🏠</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
  </div>
  </div>

  <div class="header">
    <h1>Noun <span class="h1-suffix">Adjuncts</span> <span class="h1-label">Compounds</span></h1>

    <div class="pill-bar">
      <button class="pill-btn active" data-mode="study">📖 Study</button>
      <button class="pill-btn" data-mode="challenge">⚡ Challenge</button>
      <button class="pill-btn" data-mode="timed">⏱️ Timed</button>
    </div>

    <div class="level-bar">
      <button class="level-pill active" data-level="beginner">🌱 Beginner</button>
      <button class="level-pill" data-level="intermediate">📗 Intermediate</button>
      <button class="level-pill" data-level="exceptions">⚡ Exceptions</button>
      <button class="level-pill" data-level="god">💀 God Mode</button>
    </div>

    <div class="timer-bar" id="timerBar">
      <span class="timer-display" id="timerDisplay">1:00</span>
    </div>
    <div id="livesBar"></div>
    <div id="streakBar"></div>

    <div class="progress">
      <div class="progress__labels"><span id="progTxt">0 / 16</span><span id="progPct">0%</span></div>
      <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
    </div>

    <div class="legend">
      <span><span class="dot red"></span> Genitivo 's / of</span>
      <span><span class="dot blue"></span> Noun + Noun</span>
      <span><span class="dot green"></span> -ing nominal</span>
    </div>
  </div>

  <div class="scroll-body">
    <div class="card-grid" id="cardGrid"></div>
    <div class="check-area">
      <button class="btn btn--primary" id="checkBtn">✓ Check All</button>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { LEVELS } from '../data/noun-adjuncts-data.js';
import { SpellingEngine } from '../js/spelling-engine.js';

new SpellingEngine({
  title: 'Noun Adjuncts',
  suffix: 'compounds',
  levels: LEVELS,
  storagePrefix: 'noun',
  accentColor: '--c-noun',
  rules: ['red', 'blue', 'green'],
  hasColorPicker: true,
  inputType: 'select',
  inputPlaceholder: 'choose modifier...',
  getPrompt: (item) => item.prompt,
  getAnswer: (item) => item.modifier,
  checkAnswer: (userInput, item) => {
    const correct = item.modifier.toLowerCase();
    if (userInput === correct) return true;
    if (item.accept && item.accept.map(a => a.toLowerCase()).includes(userInput)) return true;
    return false;
  },
});
</script>

<script>
// Local dev: rewrite portal link to localhost
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  const pl = document.getElementById('portalLink');
  if (pl) pl.href = 'http://localhost:3000/';
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a[href*="localhost:"]');
    if (a) {
      const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      const url = new URL(a.href);
      url.searchParams.set('theme', theme);
      a.href = url.toString();
    }
  });
}
</script>
</body>
</html>
