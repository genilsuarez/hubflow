<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Order — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23357ABD'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="../js/theme-init.js"></script>
<style>body{background:#FAF7F2;color:#2C2418}[data-theme="dark"] body{background:#1A1714;color:#EDE8E0}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<link rel="stylesheet" href="../css/typed-answer-shell.css">
<style>
  /* Prompt display — unique to this exercise, not part of the shared shell */
  .wo-card {
    width: 100%; max-width: 520px; background: var(--lp-surface); border: 1.5px solid var(--lp-border);
    border-radius: var(--lp-radius-lg); padding: 20px; box-shadow: var(--lp-shadow-sm);
  }
  .wo-prompt {
    font-family: var(--lp-font-display); font-size: .9rem; color: var(--lp-muted);
    margin-bottom: 12px; text-align: center;
  }
  .wo-pills {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 8px 0;
  }
  .wo-pill {
    display: inline-block; padding: 8px 14px; font-size: .85rem; font-weight: 600;
    background: var(--lp-bg-paper); border: 1.5px solid var(--lp-cat-teal); border-radius: var(--lp-radius-full);
    color: var(--lp-ink); cursor: default; min-height: 36px; line-height: 1.3;
  }
</style>
</head>
<body>
<div class="wrap" data-color="teal">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
    <div class="tb-actions">
      <a class="lp-icon-btn" id="portalLink" href="https://genilsuarez.github.io/deskflow/" aria-label="Ir al portal DeskFlow" title="Portal">🏠</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
    </div>
  </div>

  <header class="header">
    <h1>🧩 Word Order</h1>
    <div class="pill-bar pill-bar--scroll" role="tablist">
      <button class="pill-btn active" data-mode="practice" role="tab">📝 Practice</button>
      <button class="pill-btn" data-mode="timed" role="tab">⏱️ Timed</button>
    </div>
  </header>

  <div class="cat-bar" id="catBar"></div>

  <div class="progress">
    <div class="progress__labels"><span id="progTxt">0 / 10</span><span id="progPct">0%</span></div>
    <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
  </div>

  <div class="timer-bar" id="timerBar"><span class="timer-display" id="timerDisplay">3:00</span></div>

  <div class="scroll-body">
    <div data-area="practice" class="show">
      <div class="wo-card">
        <div class="wo-prompt">Arrange these words into a correct sentence:</div>
        <div class="wo-pills" id="woPills"></div>
      </div>
      <div class="item-counter" id="itemCounter"></div>

      <button class="btn btn--ghost btn--sm" id="hintBtn">💡 Hint</button>
      <div class="hint-box" id="hintBox"></div>

      <input class="answer-input" id="answerInput" placeholder="Type the correct sentence..." autocomplete="off" autocapitalize="sentences" spellcheck="false">

      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn--primary" id="checkBtn">Check ✓</button>
        <button class="btn btn--ghost" id="nextBtn" style="display:none">Next →</button>
      </div>

      <div class="explain-box" id="explainBox"></div>
      <div class="answers-list" id="answersList"></div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/word-order.js';
import { shuffle } from '../js/utils.js';
import { initTypedAnswerPractice } from '../js/typed-answer-engine.js';

initTypedAnswerPractice({
  categories: CATEGORIES,
  scoreKeyPrefix: 'wordorder',
  secondsPerQuestion: 25,
  renderPrompt(item) {
    const pills = shuffle([...item.words]);
    document.getElementById('woPills').innerHTML = pills.map(w => `<span class="wo-pill">${w}</span>`).join('');
  },
});
</script>

<script type="module" src="../js/portal-link.js"></script>
</body>
</html>
