<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confusing Words — HubFlow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8860B'/%3E%3Cpath d='M9 8h14v16H9z' stroke='white' stroke-width='2' fill='none'/%3E%3Cpath d='M12 12h8M12 16h6' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
<script src="../js/theme-init.js"></script>
<style>body{background:#FAF7F2;color:#2C2418}[data-theme="dark"] body{background:#1A1714;color:#EDE8E0}</style>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/exercise-enhanced.css">
<link rel="stylesheet" href="../css/sidebar.css">
<style>
  body { min-height: 100vh; padding: 0 14px; }
  .pill-btn.active { background: var(--lp-cat-purple); color: #fff; box-shadow: 0 2px 10px rgba(123,94,167,.25); }
  .progress__fill { background: var(--lp-cat-purple); }

  /* Category pills — scrollable (handled by .cat-bar-wrap in components.css) */
  .cat-bar { display: flex; gap: 4px; padding-bottom: 2px; }
  .cat-bar::-webkit-scrollbar { display: none; }

  [data-area] { display: none; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
  [data-area].show { display: flex; }

  /* Sentence card */
  .sentence-card {
    width: 100%; max-width: 720px; background: var(--lp-surface); border: 1.5px solid var(--lp-border);
    border-radius: var(--lp-radius-lg); padding: 22px 20px; text-align: center;
    box-shadow: var(--lp-shadow-sm);
  }
  .sentence-card .sc-icon { font-size: 1.6rem; margin-bottom: 6px; }
  .sentence-card .sc-text {
    font-family: var(--lp-font-display); font-size: 1.15rem; font-weight: 500;
    color: var(--lp-ink); line-height: 1.5;
  }
  .sentence-card .sc-text .blank {
    display: inline-block; min-width: 80px; border-bottom: 2.5px dashed var(--lp-cat-purple);
    color: var(--lp-cat-purple); font-weight: 700; padding: 0 4px;
  }
  .sentence-card .sc-counter {
    font-size: .62rem; font-weight: 700; color: var(--lp-muted); margin-top: 8px;
  }

  /* Options */
  .word-options { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 720px; }
  .word-opt {
    font-family: var(--lp-font-body); font-weight: 700; font-size: .88rem;
    padding: 12px 22px; border-radius: var(--lp-radius-sm); border: 1.5px solid var(--lp-border);
    background: var(--lp-surface); color: var(--lp-ink); cursor: pointer;
    transition: all .2s var(--lp-ease); min-width: 100px; text-align: center;
  }
  .word-opt:hover:not(.disabled) { border-color: var(--lp-cat-purple); background: rgba(123,94,167,.08); transform: translateY(-2px); }
  .word-opt.correct { border-color: var(--lp-success); background: var(--lp-success-soft); color: var(--lp-success-dark); }
  .word-opt.wrong { border-color: var(--lp-error); background: var(--lp-error-soft); color: var(--lp-error-dark); }
  .word-opt.disabled { cursor: default; opacity: .7; }
  [data-theme="dark"] .word-opt.correct { color: #6FE8A8; }
  [data-theme="dark"] .word-opt.wrong { color: #FF9F9F; }

  /* Explanation */
  .explain-box {
    width: 100%; max-width: 720px; font-size: .75rem; font-weight: 600; color: var(--lp-ink-soft);
    background: var(--lp-bg-paper); border: 1px solid var(--lp-border); border-radius: var(--lp-radius-sm);
    padding: 10px 14px; text-align: center; min-height: 2.4em; line-height: 1.5;
  }

  /* Next button (practice mode) */
  .btn--next {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--lp-font-body); font-weight: 700; font-size: .82rem;
    padding: 10px 28px; border-radius: var(--lp-radius-sm);
    border: none; cursor: pointer;
    background: var(--lp-cat-purple); color: #fff;
    box-shadow: 0 2px 8px rgba(123,94,167,.3);
    transition: all .2s var(--lp-ease);
    margin-top: 4px;
  }
  .btn--next:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(123,94,167,.4); }
  .btn--next:active { transform: translateY(0); }

  /* Study flashcard */
  .fc-card { max-width: 720px; height: 200px; }
  .cw-front .fc-term { font-size: 1.5rem; color: var(--lp-cat-purple); }
  .cw-front .fc-detail { font-size: .72rem; margin-top: 4px; }
  .fc-back { background: var(--lp-accent-soft); border-color: var(--lp-cat-purple); }

  .scroll-body { padding: 8px 0 30px; }

  @media (max-width: 480px) {
    .word-opt { min-width: 80px; padding: 10px 16px; font-size: .8rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="../index.html" class="lp-icon-btn" aria-label="Volver a HubFlow" title="Volver a HubFlow">←</a>
  </div>

  <div class="header">
    <h1>🔀 Confusing Words</h1>

    <!-- Category -->
    <div class="cat-bar-wrap" id="catBarWrap">
      <button class="cat-bar-arrow cat-bar-arrow--left" id="catArrowL" aria-label="Scroll left">‹</button>
      <div class="cat-bar" id="catBar"></div>
      <button class="cat-bar-arrow cat-bar-arrow--right" id="catArrowR" aria-label="Scroll right">›</button>
    </div>

    <!-- Modes -->
    <div class="pill-bar">
      <button class="pill-btn active" data-mode="study">📖 Study</button>
      <button class="pill-btn" data-mode="practice">🎯 Practice</button>
      <button class="pill-btn" data-mode="timed">⏱️ Timed</button>
    </div>

    <div class="timer-bar" id="timerBar"><span class="timer-display" id="timerDisplay">1:00</span></div>

    <div class="progress">
      <div class="progress__labels"><span id="progTxt">0 / 20</span><span id="progPct">0%</span></div>
      <div class="progress__track"><div class="progress__fill" id="progFill"></div></div>
    </div>
  </div>

  <div class="scroll-body">
    <!-- PRACTICE / TIMED -->
    <div data-area="practice">
      <div class="sentence-card">
        <div class="sc-icon" id="scIcon"></div>
        <div class="sc-text" id="scText"></div>
        <div class="sc-counter" id="scCounter"></div>
      </div>
      <div class="word-options" id="wordOptions"></div>
      <div class="explain-box" id="explainBox"></div>
      <button class="lp-btn lp-btn--primary" id="nextPracticeBtn" style="display:none">Next →</button>
    </div>

    <!-- STUDY -->
    <div data-area="study">
      <div class="fc-count" id="fcCounter">1 / 20</div>
      <div class="fc-card" id="fcCard">
        <div class="fc-inner">
          <div class="fc-face cw-front">
            <div class="fc-emoji" id="fcEmoji">🔀</div>
            <div class="fc-term" id="fcSentence"></div>
            <div class="fc-detail" id="fcHint"></div>
            <div class="fc-hint">tap to see answer</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-term" id="fcAnswer" style="font-size:1.3rem;color:var(--lp-success)"></div>
            <div class="fc-detail" id="fcExplain"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="lp-btn lp-btn--ghost" id="shuffleBtn">🔀</button>
        <button class="lp-btn lp-btn--ghost" id="prevBtn">←</button>
        <button class="lp-btn lp-btn--success" id="nextBtn">→</button>
      </div>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay"></div>
</div>

<script type="module">
import { CATEGORIES } from '../data/confusing-words.js';
import { shuffle, initTheme, toggleTheme, recordScore, Timer, formatTime, showResult } from '../js/utils.js';
import { initSwipe } from '../js/swipe.js';

initTheme();
document.getElementById('themeToggle')?.addEventListener('click', () => toggleTheme());

const catKeys = Object.keys(CATEGORIES);
let currentCat = catKeys[0];
let mode = 'study';
let deck = [], idx = 0, score = 0, total = 0;
let timer = null;
let timedSeconds = 0;

// ─── Category bar ───
function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = catKeys.map(k =>
    `<button class="cat-btn ${k === currentCat ? 'active' : ''}" data-cat="${k}">${CATEGORIES[k].icon} ${CATEGORIES[k].label}</button>`
  ).join('');
  bar.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      bar.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
      startMode();
    });
  });
}
renderCatBar();

// ─── Cat-bar scroll arrows ───
(function initCatArrows() {
  const wrap = document.getElementById('catBarWrap');
  const bar = document.getElementById('catBar');
  const arrowL = document.getElementById('catArrowL');
  const arrowR = document.getElementById('catArrowR');
  const SCROLL_STEP = 140;

  function updateArrows() {
    const canLeft = bar.scrollLeft > 4;
    const canRight = bar.scrollLeft < bar.scrollWidth - bar.clientWidth - 4;
    arrowL.classList.toggle('visible', canLeft);
    arrowR.classList.toggle('visible', canRight);
    wrap.classList.toggle('cat-bar-wrap--fade-left', canLeft && !canRight);
    wrap.classList.toggle('cat-bar-wrap--fade-right', !canLeft && canRight);
    wrap.classList.toggle('cat-bar-wrap--fade-both', canLeft && canRight);
  }

  arrowL.addEventListener('click', () => { bar.scrollBy({ left: -SCROLL_STEP, behavior: 'smooth' }); });
  arrowR.addEventListener('click', () => { bar.scrollBy({ left: SCROLL_STEP, behavior: 'smooth' }); });
  bar.addEventListener('scroll', updateArrows, { passive: true });
  new ResizeObserver(updateArrows).observe(bar);
  setTimeout(updateArrows, 50);
})();

// ─── Mode switching ───
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    startMode();
  });
});

function startMode() {
  stopTimer();
  document.querySelectorAll('[data-area]').forEach(a => a.classList.remove('show'));
  document.getElementById('timerBar').classList.remove('show');
  if (mode === 'practice') initPractice(false);
  else if (mode === 'timed') initPractice(true);
  else if (mode === 'study') initStudy();
}

function stopTimer() { if (timer) { timer.stop(); timer = null; } timedSeconds = 0; }

function getData() { return CATEGORIES[currentCat].items; }

function updProgress(current, t) {
  const pct = Math.round((current / t) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = `${current} / ${t}`;
  document.getElementById('progPct').textContent = pct + '%';
}

// ═══ PRACTICE / TIMED ═══
function initPractice(timed) {
  deck = shuffle(getData());
  idx = 0; score = 0;
  total = Math.min(timed ? 10 : deck.length, deck.length);
  document.querySelector('[data-area="practice"]').classList.add('show');

  if (timed) {
    document.getElementById('timerBar').classList.add('show');
    timedSeconds = total * 8;

    timer = new Timer(timedSeconds,
      r => { const el = document.getElementById('timerDisplay'); el.textContent = formatTime(r); el.classList.toggle('warn', r <= 10); },
      () => finishPractice()
    );
    timer.start();
  }
  renderPractice();
}

function renderPractice() {
  if (idx >= total) { finishPractice(); return; }
  const item = deck[idx];
  const cat = CATEGORIES[currentCat];

  document.getElementById('scIcon').textContent = cat.icon;
  document.getElementById('scText').innerHTML = item.sentence.replace('___', '<span class="blank">?</span>');
  document.getElementById('scCounter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('explainBox').textContent = '';
  document.getElementById('nextPracticeBtn').style.display = 'none';

  // Build options from the category pairs
  const opts = shuffle([...cat.pairs]);
  const optsEl = document.getElementById('wordOptions');
  optsEl.innerHTML = opts.map(o => `<button class="word-opt" data-val="${o}">${o}</button>`).join('');
  optsEl.querySelectorAll('.word-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      optsEl.querySelectorAll('.word-opt').forEach(b => { b.classList.add('disabled'); b.style.pointerEvents = 'none'; });

      const chosen = btn.dataset.val;
      const correct = item.correct.toLowerCase();
      // Match base form to conjugated: do→did/does/done/doing, make→made/makes/making
      const baseMap = { 'do': /^(do|did|does|done|doing)$/i, 'make': /^(make|made|makes|making)$/i, 'say': /^(say|said|says|saying)$/i, 'tell': /^(tell|told|tells|telling)$/i, 'bring': /^(bring|brought|brings|bringing)$/i, 'take': /^(take|took|takes|taken|taking)$/i, 'borrow': /^(borrow|borrowed|borrows|borrowing)$/i, 'lend': /^(lend|lent|lends|lending)$/i, 'watch': /^(watch|watched|watches|watching)$/i, 'look': /^(look|looked|looks|looking)$/i, 'see': /^(see|saw|sees|seen|seeing)$/i };
      const isCorrect = chosen === correct || chosen === item.correct || (baseMap[chosen] && baseMap[chosen].test(correct));

      if (isCorrect) { btn.classList.add('correct'); score++; }
      else {
        btn.classList.add('wrong');
        // Highlight the correct base-form option
        optsEl.querySelectorAll('.word-opt').forEach(b => {
          const bv = b.dataset.val;
          if (bv === correct || bv === item.correct || (baseMap[bv] && baseMap[bv].test(correct))) b.classList.add('correct');
        });
      }

      // Show sentence with answer filled
      document.getElementById('scText').innerHTML = item.sentence.replace('___', `<span class="blank">${item.correct}</span>`);
      document.getElementById('explainBox').textContent = item.explain;

      idx++;
      updProgress(idx, total);

      // Show "Next" button instead of auto-advancing
      const nextBtn = document.getElementById('nextPracticeBtn');
      nextBtn.style.display = 'inline-flex';
      nextBtn.focus();
      const advance = () => { nextBtn.style.display = 'none'; nextBtn.onclick = null; document.removeEventListener('keydown', onKey); renderPractice(); };
      const onKey = (e) => { if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); advance(); } };
      nextBtn.onclick = advance;
      document.addEventListener('keydown', onKey);
    });
  });
  updProgress(idx, total);
}

function finishPractice() {
  const elapsed = timedSeconds ? timedSeconds - (timer && timer.remaining != null ? timer.remaining : 0) : null;
  stopTimer();
  const pct = showResult({
    correct: score, total,
    containerEl: document.getElementById('resultOverlay'),
    onRestart: () => startMode(),
    onStudy: () => { mode = 'study'; document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === 'study')); startMode(); },
    elapsedSeconds: elapsed
  });
  recordScore(`conf-${currentCat}`, pct);
}

// ═══ STUDY ═══
function initStudy() {
  deck = shuffle(getData());
  idx = 0;
  document.querySelector('[data-area="study"]').classList.add('show');
  renderStudyCard();
}

function renderStudyCard() {
  const item = deck[idx];
  const card = document.getElementById('fcCard');
  card.classList.remove('flip');
  document.getElementById('fcEmoji').textContent = CATEGORIES[currentCat].icon;
  document.getElementById('fcSentence').innerHTML = item.sentence.replace('___', '___');
  document.getElementById('fcHint').textContent = `${CATEGORIES[currentCat].label}`;
  document.getElementById('fcAnswer').textContent = item.correct;
  document.getElementById('fcExplain').textContent = item.explain;
  document.getElementById('fcCounter').textContent = `${idx + 1} / ${deck.length}`;
  updProgress(idx + 1, deck.length);
}

document.getElementById('fcCard').addEventListener('click', () => document.getElementById('fcCard').classList.toggle('flip'));
document.getElementById('nextBtn').addEventListener('click', () => advanceCard(1));
document.getElementById('prevBtn').addEventListener('click', () => advanceCard(-1));
document.getElementById('shuffleBtn').addEventListener('click', () => { deck = shuffle(deck); idx = 0; renderStudyCard(); });
initSwipe(document.querySelector('[data-area="study"]'), { onNext: () => advanceCard(1), onPrev: () => advanceCard(-1) });

function advanceCard(dir) {
  const card = document.getElementById('fcCard');
  const inner = card.querySelector('.fc-inner');
  if (card.classList.contains('flip') && inner) {
    inner.style.transition = 'opacity .15s ease, transform .2s ease';
    inner.style.opacity = '0';
    card.classList.remove('flip');
    let done = false;
    const onDone = () => {
      if (done) return; done = true;
      inner.removeEventListener('transitionend', onDone);
      inner.style.transition = 'none';
      idx = (idx + dir + deck.length) % deck.length;
      renderStudyCard();
      void inner.offsetHeight;
      inner.style.transition = 'opacity .15s ease';
      inner.style.opacity = '1';
      setTimeout(() => { inner.style.transition = ''; }, 170);
    };
    inner.addEventListener('transitionend', onDone, { once: true });
    setTimeout(onDone, 250);
    return;
  }
  idx = (idx + dir + deck.length) % deck.length;
  renderStudyCard();
}

document.addEventListener('keydown', e => {
  if (mode !== 'study') return;
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    const card = document.getElementById('fcCard');
    if (card.classList.contains('flip')) advanceCard(1);
    else card.classList.add('flip');
  } else if (e.key === 'ArrowRight') { e.preventDefault(); advanceCard(1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); advanceCard(-1); }
});

// ─── Init ───
startMode();
</script>

<script type="module" src="../js/exercise-shell.js"></script>
</body>
</html>
