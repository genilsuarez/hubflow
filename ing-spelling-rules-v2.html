<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>-ing Spelling Rules v2</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --red:#FF6B6B;    --red-light:#FFECEC;   --red-dark:#CC3333;
  --blue:#4A90D9;   --blue-light:#E4F0FF;  --blue-dark:#1B5EA8;
  --green:#3DBE7A;  --green-light:#E2FAF0; --green-dark:#1E7A48;
  --bg:#FFF6EE; --text:#2E2828; --muted:#AAA;
  --surface:#fff; --border:#EDE8E2;
}
[data-theme="dark"]{
  --bg:#1a1a2e; --text:#eaeaea; --muted:#888;
  --surface:#16213e; --border:#2a2a4e;
  --red-light:#4a2020; --blue-light:#1a2d4a; --green-light:#1a3d2a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  transition:background .3s,color .3s;
}
@media(max-width:480px){
  html,body{overflow:auto;height:auto;min-height:100%;}
  body{min-height:100dvh;}
}

/* BACK + THEME BAR */
.top-bar{
  width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;
  padding:6px 14px 2px;flex-shrink:0;
}
.back-link{
  font-family:'Baloo 2',cursive;font-weight:700;font-size:.85rem;
  color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:4px;
  transition:opacity .2s;
}
.back-link:hover{opacity:.7;}
.theme-toggle{
  background:var(--surface);border:2px solid var(--border);border-radius:50px;
  padding:4px 10px;font-size:.75rem;cursor:pointer;color:var(--text);
  font-family:'Baloo 2',cursive;font-weight:700;transition:all .2s;
}
.theme-toggle:hover{border-color:var(--blue);}

/* HAMBURGER MENU — SIDEBAR */
.menu-toggle{
  background:none;border:none;cursor:pointer;font-size:1.3rem;
  color:var(--text);padding:4px;line-height:1;
  transition:transform .2s;
}
.menu-toggle:hover{transform:scale(1.1);}

.menu-overlay{
  display:none;position:fixed;inset:0;z-index:199;
  background:rgba(0,0,0,.4);
  opacity:0;transition:opacity .3s ease;
}
.menu-overlay.show{display:block;opacity:1;}

.menu-panel{
  position:fixed;top:0;left:0;bottom:0;
  width:260px;max-width:80vw;
  background:var(--surface);
  box-shadow:4px 0 30px rgba(0,0,0,.15);
  z-index:200;
  display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.menu-panel.show{transform:translateX(0);}

.menu-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 12px 8px;border-bottom:1.5px solid var(--border);
}
.menu-title{
  font-family:'Baloo 2',cursive;font-weight:800;font-size:.85rem;
  color:var(--text);display:flex;align-items:center;gap:5px;
}
.menu-close{
  background:none;border:none;cursor:pointer;
  font-size:1.2rem;color:var(--muted);padding:4px;
  border-radius:8px;transition:background .2s,color .2s;line-height:1;
}
.menu-close:hover{background:var(--border);color:var(--text);}

.menu-nav{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;
  gap:1px;padding:6px 8px;
}
.menu-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:8px;border:none;
  background:transparent;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:700;
  color:var(--text);transition:background .15s;
  width:100%;text-align:left;
}
.menu-item:hover{background:var(--border);}
.menu-item.active{background:var(--blue-light);color:var(--blue);}
[data-theme="dark"] .menu-item.active{color:#7AC7FF;}
.menu-item-icon{font-size:.85rem;width:18px;text-align:center;flex-shrink:0;}
.menu-item .menu-val{margin-left:auto;color:var(--blue);font-weight:800;font-size:.72rem;}

.menu-divider{
  height:1px;background:var(--border);margin:3px 10px;
}
.menu-section-label{
  font-family:'Baloo 2',cursive;font-size:.55rem;font-weight:800;
  color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
  padding:3px 10px 1px;
}

.menu-footer{
  padding:8px 12px;border-top:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:.6rem;color:var(--muted);font-weight:700;
}

/* RULES — compact mini in menu */
.menu-rules-mini{
  display:flex;gap:3px;padding:2px 10px 4px;
}
.mini-rule{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;
  font-size:.55rem;font-weight:700;padding:3px 4px;
  border-radius:6px;border:1.5px solid transparent;text-align:center;
}
.mini-rule.red{background:var(--red-light);border-color:var(--red);color:var(--red-dark);}
.mini-rule.blue{background:var(--blue-light);border-color:var(--blue);color:var(--blue-dark);}
.mini-rule.green{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
[data-theme="dark"] .mini-rule.red{color:#FF9F9F;}
[data-theme="dark"] .mini-rule.blue{color:#7AC7FF;}
[data-theme="dark"] .mini-rule.green{color:#6FE8A8;}

/* FIXED HEADER */
.header{
  width:100%;max-width:760px;
  padding:5px 14px 5px;
  background:var(--bg);
  border-bottom:2px solid var(--border);
  flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  z-index:10;
  transition:background .3s;
}
@media(max-width:480px){
  .header{position:sticky;top:0;padding:4px 10px;}
  .top-bar{padding:4px 10px 2px;}
}

/* TITLE */
.header-row{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;
}
h1{
  font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(.9rem,3vw,1.3rem);
  margin-bottom:0;line-height:1.2;
  background:linear-gradient(120deg,var(--red),#FF9F6B,var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-badge{
  display:flex;align-items:center;gap:3px;
  font-family:'Baloo 2',cursive;font-size:.7rem;font-weight:700;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:50px;padding:2px 8px;color:var(--muted);
}
.badge-icon{font-size:.75rem;}
.badge-val{color:var(--text);font-weight:800;}

/* STATS — displayed in menu sidebar */
.stat .val{color:var(--text);}

/* LEVEL — displayed in menu sidebar */

/* MODE TOGGLE */
.mode-bar{
  display:flex;background:var(--surface);border-radius:50px;padding:2px;gap:2px;
  box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:5px;
  border:2px solid var(--border);
}
.mode-btn{
  flex:1;font-family:'Baloo 2',cursive;font-size:.8rem;font-weight:700;
  padding:5px;border-radius:50px;border:none;cursor:pointer;
  transition:all .22s;color:var(--muted);background:transparent;
}
.mode-btn.active.study    {background:var(--blue);color:#fff;box-shadow:0 3px 10px rgba(74,144,217,.4);}
.mode-btn.active.challenge{background:linear-gradient(135deg,var(--red),#FF9F6B);color:#fff;box-shadow:0 3px 10px rgba(255,107,107,.4);}
.mode-btn.active.timed    {background:linear-gradient(135deg,#F7C948,#FF9F6B);color:#fff;box-shadow:0 3px 10px rgba(247,201,72,.4);}
@media(max-width:480px){
  .mode-bar{margin-bottom:4px;padding:2px;}
  .mode-btn{font-size:.68rem;padding:4px;}
  .level-btn{font-size:.62rem;padding:3px;}
}

/* TIMER */
.timer-bar{
  display:none;align-items:center;justify-content:center;gap:8px;margin-bottom:4px;
}
.timer-bar.show{display:flex;}
.timer-display{
  font-family:'Baloo 2',cursive;font-weight:800;font-size:1.1rem;
  color:var(--red);min-width:50px;text-align:center;
}
.timer-display.warn{animation:pulse .5s infinite alternate;}
@keyframes pulse{from{opacity:1}to{opacity:.4}}

/* STREAK */
.streak-bar{
  display:none;align-items:center;justify-content:center;gap:4px;margin-bottom:4px;
  font-family:'Baloo 2',cursive;font-weight:700;font-size:.8rem;color:var(--green-dark);
  animation:popIn .3s ease;
}
.streak-bar.show{display:flex;}

/* RULES */
.rules{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:5px;}
@media(max-width:480px){
  .rules{gap:3px;}
  .rule{padding:3px 4px 3px;font-size:.6rem;}
  .rule svg{width:12px;height:10px;}
  .rule-ex{font-size:.58rem;padding:0 4px;}
}
.rule{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 6px 4px;border-radius:10px;border:2px solid transparent;
  font-size:.7rem;font-weight:700;text-align:center;
}
.rule.red  {background:var(--red-light);  border-color:var(--red);  color:var(--red-dark);}
.rule.blue {background:var(--blue-light); border-color:var(--blue); color:var(--blue-dark);}
.rule.green{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
[data-theme="dark"] .rule.red  {color:#FF9F9F;}
[data-theme="dark"] .rule.blue {color:#7AC7FF;}
[data-theme="dark"] .rule.green{color:#6FE8A8;}
.rule svg{flex-shrink:0;width:16px;height:14px;}
.rule-ex{
  font-family:'Baloo 2',cursive;font-weight:800;font-size:.68rem;
  padding:0px 6px;border-radius:50px;
}
.rule.red   .rule-ex{background:rgba(255,107,107,.18);}
.rule.blue  .rule-ex{background:rgba(74,144,217,.18);}
.rule.green .rule-ex{background:rgba(61,190,122,.18);}

/* PROGRESS */
.prog-wrap{margin-bottom:0;}
.prog-labels{display:flex;justify-content:space-between;font-family:'Baloo 2',cursive;font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:2px;}
.prog-track{height:5px;background:var(--border);border-radius:50px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:50px;transition:width .5s cubic-bezier(.34,1.2,.64,1);width:0%;}

/* SCROLLABLE BODY */
.scroll-body{
  width:100%;max-width:760px;
  flex:1;overflow-y:auto;
  padding:8px 14px 30px;
  -webkit-overflow-scrolling:touch;
}
@media(max-width:480px){
  .scroll-body{flex:none;overflow-y:visible;padding:8px 10px 40px;}
}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;align-items:start;}
@media(max-width:500px){.grid{grid-template-columns:repeat(2,1fr);gap:5px;}}
@media(max-width:360px){.grid{grid-template-columns:repeat(2,1fr);gap:4px;}}

/* BUTTONS */
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}

/* HEART CARD */
.hcard{
  display:grid;
  grid-template-rows:auto auto auto auto auto auto;
  align-items:center;justify-items:center;
  gap:1px;animation:popIn .4s ease both;
}
.hcard:nth-child(1){animation-delay:.03s}.hcard:nth-child(2){animation-delay:.06s}
.hcard:nth-child(3){animation-delay:.09s}.hcard:nth-child(4){animation-delay:.12s}
.hcard:nth-child(5){animation-delay:.15s}.hcard:nth-child(6){animation-delay:.18s}
.hcard:nth-child(7){animation-delay:.21s}.hcard:nth-child(8){animation-delay:.24s}
.hcard:nth-child(9){animation-delay:.27s}.hcard:nth-child(10){animation-delay:.30s}
.hcard:nth-child(11){animation-delay:.33s}.hcard:nth-child(12){animation-delay:.36s}
.hcard:nth-child(13){animation-delay:.39s}.hcard:nth-child(14){animation-delay:.42s}
.hcard:nth-child(15){animation-delay:.45s}.hcard:nth-child(16){animation-delay:.48s}

/* THE HEART BUTTON */
.hbtn{
  position:relative;width:100%;padding-bottom:46%;
  background:none;border:none;cursor:pointer;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;outline:none;
}
.hbtn:hover:not(.done):not(.chal){transform:scale(1.08) rotate(-2deg);}
.hbtn:active{transform:scale(.95);}
.hbtn.chal{cursor:text;}
.hbtn.chal:hover{transform:scale(1.04);}
.hbtn.done{cursor:default;}
.hsvg{position:absolute;inset:0;width:100%;height:100%;}
.hpath{transition:fill .35s,stroke .35s;}
.hinner{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;padding:14% 9% 18%;pointer-events:none;
}
.verb{
  font-family:'Baloo 2',cursive;font-weight:700;
  font-size:clamp(.72rem,2.8vw,.92rem);color:var(--text);line-height:1;white-space:nowrap;
}
[data-theme="dark"] .verb{color:#fff;}
.ans{
  font-family:'Baloo 2',cursive;font-weight:800;
  font-size:clamp(.65rem,2.2vw,.82rem);
  opacity:0;transition:opacity .35s;white-space:nowrap;margin-top:0px;
}
.hbtn.done .ans{opacity:1;}
.hbtn.done.rule-red   .ans{color:var(--red-dark);}
.hbtn.done.rule-blue  .ans{color:var(--blue-dark);}
.hbtn.done.rule-green .ans{color:var(--green-dark);}
[data-theme="dark"] .hbtn.done.rule-red   .ans{color:#FF9F9F;}
[data-theme="dark"] .hbtn.done.rule-blue  .ans{color:#7AC7FF;}
[data-theme="dark"] .hbtn.done.rule-green .ans{color:#6FE8A8;}

/* EXPLANATION TOOLTIP */
.explanation{
  font-size:.6rem;font-weight:700;color:var(--muted);text-align:center;
  width:100%;min-height:1.8em;line-height:1.2;
  opacity:0;transition:opacity .3s;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hbtn.done~.audio-btn~.explanation{opacity:1;}

/* AUDIO BUTTON */
.audio-btn{
  background:none;border:none;cursor:pointer;font-size:.85rem;
  opacity:.5;transition:opacity .2s,transform .2s;padding:2px 0;line-height:1;
  height:1.2em;
}
.audio-btn:hover{opacity:1;transform:scale(1.2);}

/* CHALLENGE INPUT */
.cinput-wrap{display:none;flex-direction:column;align-items:center;gap:2px;width:100%;justify-self:stretch;}
.cinput-wrap.show{display:flex;}
.cinput{
  width:100%;font-family:'Baloo 2',cursive;font-size:clamp(.8rem,3vw,.95rem);
  font-weight:700;text-align:center;
  border:2px solid var(--border);border-radius:12px;
  padding:3px 5px;background:var(--surface);color:var(--text);
  outline:none;transition:border-color .2s,background .2s,box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
  -webkit-appearance:none;appearance:none;
}
@media(max-width:480px){.cinput{font-size:.75rem;padding:4px 4px;border-radius:10px;}}
.cinput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(74,144,217,.2);}
.cinput.ok   {border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
.cinput.wrong{border-color:var(--red);  background:var(--red-light);  color:var(--red-dark);animation:shake .32s;}
.cinput:disabled{opacity:1;cursor:default;}
.cinput::placeholder{color:var(--muted);}
[data-theme="dark"] .cinput.ok{color:#6FE8A8;}
[data-theme="dark"] .cinput.wrong{color:#FF9F9F;}
.cfeedback{font-size:1rem;min-height:1.2rem;line-height:1;text-align:center;}
.chint{font-size:.68rem;font-weight:800;color:var(--red-dark);min-height:.85rem;text-align:center;line-height:1.2;}

/* COLOR PICKER */
.cpicker{
  display:none;flex-direction:row;align-items:center;justify-content:center;gap:6px;width:100%;
  background:var(--surface);border:2px solid var(--border);border-radius:50px;padding:3px 8px;
  justify-self:stretch;
}
.cpicker.show{display:flex;}
.cpicker-row{display:flex;gap:6px;}
.cb{
  width:22px;height:22px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:transform .18s,box-shadow .18s;
  -webkit-tap-highlight-color:transparent;
}
@media(max-width:480px){
  .cpicker{padding:3px 6px;gap:4px;border-radius:30px;}
  .cpicker-row{gap:5px;}
  .cb{width:20px;height:20px;border-width:2.5px;}
}
.cb:hover{transform:scale(1.22);}
.cb.r{background:var(--red);}
.cb.b{background:var(--blue);}
.cb.g{background:var(--green);}
.cb.picked    {border-color:var(--text);transform:scale(1.18);box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--text);}
.cb.correct-c {border-color:var(--green-dark)!important;box-shadow:0 0 0 2px var(--green)!important;}
.cb.wrong-c   {border-color:var(--red-dark)  !important;box-shadow:0 0 0 2px var(--red)  !important;}
.cresult{font-size:.68rem;font-weight:800;color:var(--muted);min-height:.85rem;text-align:center;line-height:1.2;}

/* BUTTONS */
.btn{
  font-family:'Baloo 2',cursive;font-weight:700;font-size:.9rem;
  padding:10px 22px;border-radius:50px;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  display:flex;align-items:center;gap:5px;
}
@media(max-width:480px){.btn{font-size:.8rem;padding:8px 16px;}}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(.97);}
.btn-blue  {background:linear-gradient(135deg,#4A90D9,#7AC7FF);color:#fff;box-shadow:0 5px 18px rgba(74,144,217,.32);}
.btn-green {background:linear-gradient(135deg,var(--green),#6FE8A8);color:#fff;box-shadow:0 5px 18px rgba(61,190,122,.32);}
.btn-red   {background:linear-gradient(135deg,var(--red),#FF9F6B);  color:#fff;box-shadow:0 5px 18px rgba(255,107,107,.32);}
.btn-yellow{background:linear-gradient(135deg,#F7C948,#FFD56B);color:#fff;box-shadow:0 5px 18px rgba(247,201,72,.32);}
.btn-ghost {background:var(--surface);border:2.5px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--blue);}

/* SCORE */
.score{
  display:none;text-align:center;border-radius:16px;padding:14px 18px;margin-top:12px;
  font-family:'Baloo 2',cursive;font-weight:700;font-size:.9rem;
  animation:popIn .4s ease;
}
.score.great{background:var(--green-light);border:2px solid var(--green);color:var(--green-dark);}
.score.ok   {background:#FFFBEA;border:2px solid #ECC94B;color:#7B621A;}
.score.try  {background:var(--red-light);  border:2px solid var(--red);  color:var(--red-dark);}

/* CONFETTI CANVAS */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;}

/* STARS OVERLAY */
.stars-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.45);animation:fadeIn .3s ease;
}
.stars-overlay.show{display:flex;}
.stars-box{
  background:var(--surface);border-radius:28px;padding:32px 40px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
  max-width:380px;width:90%;
}
@media(max-width:480px){
  .stars-box{padding:24px 20px;border-radius:20px;max-width:300px;}
  .stars-title{font-size:1.2rem;}
  .stars-sub{font-size:.8rem;}
  .star{font-size:2.2rem;}
}
.stars-row{display:flex;justify-content:center;gap:8px;margin:12px 0 6px;}
.star{font-size:2.8rem;opacity:.25;transition:opacity .3s,transform .3s;}
.star.lit{opacity:1;transform:scale(1.15);}
.stars-title{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.5rem;margin-bottom:4px;color:var(--text);}
.stars-sub{font-size:.9rem;color:var(--muted);font-weight:700;margin-bottom:16px;}
.stars-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* HISTORY — in sidebar */
.history-list{padding:0 10px 2px;font-family:'Baloo 2',cursive;font-size:.63rem;}
.history-entry{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border);}
.history-entry:last-child{border:none;}
.history-entry .date{color:var(--muted);}
.history-entry .pct{font-weight:800;}
.history-entry .pct.great{color:var(--green-dark);}
.history-entry .pct.ok{color:#7B621A;}
.history-entry .pct.try{color:var(--red-dark);}
[data-theme="dark"] .history-entry .pct.great{color:#6FE8A8;}
[data-theme="dark"] .history-entry .pct.ok{color:#F7C948;}
[data-theme="dark"] .history-entry .pct.try{color:#FF9F9F;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}

<script>
/* ══════════════════════════════════════════════════════
   WORD SETS BY LEVEL
   ══════════════════════════════════════════════════════ */
const LEVELS={
  beginner:[
    {verb:"run",   ans:"running",  rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"wait",  ans:"waiting",  rule:"red",   why:"Two vowels before consonant → just add -ing"},
    {verb:"watch", ans:"watching", rule:"red",   why:"Ends in two consonants → just add -ing"},
    {verb:"sit",   ans:"sitting",  rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"dance", ans:"dancing",  rule:"blue",  why:"Silent 'e' at end → drop it"},
    {verb:"stop",  ans:"stopping", rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"play",  ans:"playing",  rule:"red",   why:"Ends in vowel+y → just add -ing"},
    {verb:"write", ans:"writing",  rule:"blue",  why:"Silent 'e' at end → drop it"},
    {verb:"cut",   ans:"cutting",  rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"make",  ans:"making",   rule:"blue",  why:"Silent 'e' at end → drop it"},
    {verb:"read",  ans:"reading",  rule:"red",   why:"Two vowels before consonant → just add -ing"},
    {verb:"study", ans:"studying", rule:"red",   why:"Ends in consonant+y → just add -ing (keep y)"},
    {verb:"shop",  ans:"shopping", rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"cook",  ans:"cooking",  rule:"red",   why:"Two vowels before consonant → just add -ing"},
    {verb:"swim",  ans:"swimming", rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"talk",  ans:"talking",  rule:"red",   why:"Ends in two consonants → just add -ing"},
  ],
  intermediate:[
    {verb:"prefer",  ans:"preferring", rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"begin",   ans:"beginning",  rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"forget",  ans:"forgetting", rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"travel",  ans:"travelling", rule:"green", why:"UK: double 'l' after short vowel"},
    {verb:"smile",   ans:"smiling",    rule:"blue",  why:"Silent 'e' at end → drop it"},
    {verb:"arrive",  ans:"arriving",   rule:"blue",  why:"Silent 'e' at end → drop it"},
    {verb:"hope",    ans:"hoping",     rule:"blue",  why:"Silent 'e' at end → drop it"},
    {verb:"invite",  ans:"inviting",   rule:"blue",  why:"Silent 'e' at end → drop it"},
    {verb:"listen",  ans:"listening",  rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"happen",  ans:"happening",  rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"visit",   ans:"visiting",   rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"open",    ans:"opening",    rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"plan",    ans:"planning",   rule:"green", why:"Short vowel + single consonant → double it"},
    {verb:"admit",   ans:"admitting",  rule:"green", why:"Stress on last syllable + CVC → double it"},
    {verb:"escape",  ans:"escaping",   rule:"blue",  why:"Silent 'e' at end → drop it"},
    {verb:"enjoy",   ans:"enjoying",   rule:"red",   why:"Ends in vowel+y → just add -ing"},
  ],
  exceptions:[
    {verb:"fix",     ans:"fixing",     rule:"red",   why:"Exception: 'x' counts as two sounds (ks) → don't double"},
    {verb:"see",     ans:"seeing",     rule:"red",   why:"Exception: 'ee' is not silent e → just add -ing"},
    {verb:"agree",   ans:"agreeing",   rule:"red",   why:"Exception: 'ee' is not silent e → just add -ing"},
    {verb:"dye",     ans:"dyeing",     rule:"red",   why:"Exception: keep 'e' to avoid confusion with 'dying'"},
    {verb:"lie",     ans:"lying",      rule:"blue",  why:"Exception: 'ie' changes to 'y' before -ing"},
    {verb:"die",     ans:"dying",      rule:"blue",  why:"Exception: 'ie' changes to 'y' before -ing"},
    {verb:"tie",     ans:"tying",      rule:"blue",  why:"Exception: 'ie' changes to 'y' before -ing"},
    {verb:"snow",    ans:"snowing",    rule:"red",   why:"Ends in 'w' → just add -ing (w is not doubled)"},
    {verb:"box",     ans:"boxing",     rule:"red",   why:"Exception: 'x' counts as two sounds → don't double"},
    {verb:"show",    ans:"showing",    rule:"red",   why:"Ends in 'w' → just add -ing"},
    {verb:"panic",   ans:"panicking",  rule:"green", why:"Exception: add 'k' before -ing to keep hard 'c' sound"},
    {verb:"picnic",  ans:"picnicking", rule:"green", why:"Exception: add 'k' before -ing to keep hard 'c' sound"},
    {verb:"age",     ans:"ageing",     rule:"red",   why:"Exception: keep 'e' (British) to preserve soft 'g'"},
    {verb:"be",      ans:"being",      rule:"red",   why:"Exception: irregular — just add -ing"},
    {verb:"canoe",   ans:"canoeing",   rule:"red",   why:"Exception: 'oe' ending → just add -ing"},
    {verb:"queue",   ans:"queueing",   rule:"red",   why:"Exception: keep 'e' (British spelling)"},
  ],
  god:[
    // -ie → -ying (tricky)
    {verb:"die",      ans:"dying",       rule:"blue",  why:"-ie → y + ing"},
    {verb:"lie",      ans:"lying",       rule:"blue",  why:"-ie → y + ing"},
    {verb:"vie",      ans:"vying",       rule:"blue",  why:"-ie → y + ing (to compete)"},
    // Keep -e (mandatory — ambiguity)
    {verb:"dye",      ans:"dyeing",      rule:"red",   why:"Keep -e: 'dying' already exists (die)"},
    {verb:"singe",    ans:"singeing",    rule:"red",   why:"Keep -e: 'singing' already exists (sing)"},
    {verb:"tinge",    ans:"tingeing",    rule:"red",   why:"Keep -e: preserves soft g distinction"},
    // Keep -e (vowel ending, not silent)
    {verb:"canoe",    ans:"canoeing",    rule:"red",   why:"-oe is pronounced, not silent → keep -e"},
    {verb:"hoe",      ans:"hoeing",      rule:"red",   why:"-oe ending → keep -e + ing"},
    {verb:"shoe",     ans:"shoeing",     rule:"red",   why:"-oe ending → keep -e + ing"},
    // -ee (not silent, just add)
    {verb:"see",      ans:"seeing",      rule:"red",   why:"-ee is a vowel sound, not silent e"},
    {verb:"flee",     ans:"fleeing",     rule:"red",   why:"-ee → just add -ing"},
    {verb:"guarantee",ans:"guaranteeing",rule:"red",   why:"-ee → just add -ing"},
    // -c → add -k
    {verb:"panic",    ans:"panicking",   rule:"green", why:"Add -k to keep hard /k/ sound"},
    {verb:"picnic",   ans:"picnicking",  rule:"green", why:"Add -k to keep hard /k/ sound"},
    {verb:"mimic",    ans:"mimicking",   rule:"green", why:"Add -k to keep hard /k/ sound"},
    {verb:"traffic",  ans:"trafficking", rule:"green", why:"Add -k to keep hard /k/ sound"},
    // Irregulars / weird ones
    {verb:"be",       ans:"being",       rule:"red",   why:"Irregular: -e is the word itself, keep it"},
    {verb:"ski",      ans:"skiing",      rule:"red",   why:"Ends in vowel -i → just add -ing"},
    {verb:"taxi",     ans:"taxiing",     rule:"red",   why:"Ends in vowel -i → add -ing (double i)"},
    // British -l doubling (unstressed)
    {verb:"travel",   ans:"travelling",  rule:"green", why:"British: double -l even without stress"},
    {verb:"cancel",   ans:"cancelling",  rule:"green", why:"British: double -l even without stress"},
    {verb:"fuel",     ans:"fuelling",    rule:"green", why:"British: double -l even without stress"},
    // CVC doubling with stress traps
    {verb:"refer",    ans:"referring",   rule:"green", why:"Stress on last syllable + CVC → double"},
    {verb:"occur",    ans:"occurring",   rule:"green", why:"Stress on last syllable + CVC → double"},
    {verb:"regret",   ans:"regretting",  rule:"green", why:"Stress on last syllable + CVC → double"},
    {verb:"commit",   ans:"committing",  rule:"green", why:"Stress on last syllable + CVC → double"},
    // Stress on FIRST = DON'T double (trap!)
    {verb:"offer",    ans:"offering",    rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"benefit",  ans:"benefiting",  rule:"red",   why:"Stress on FIRST syllable → don't double"},
    {verb:"orbit",    ans:"orbiting",    rule:"red",   why:"Stress on FIRST syllable → don't double"},
    // -w / -x (look like CVC but don't double)
    {verb:"relax",    ans:"relaxing",    rule:"red",   why:"-x = /ks/ two sounds → don't double"},
    {verb:"allow",    ans:"allowing",    rule:"red",   why:"-w after vowel → diphthong, don't double"},
    // Queue (British)
    {verb:"queue",    ans:"queueing",    rule:"red",   why:"British: keep -e (pronounced vowel)"},
    // Normal drop -e mixed in (to confuse)
    {verb:"achieve",  ans:"achieving",   rule:"blue",  why:"Silent -e → drop it normally"},
    {verb:"squeeze",  ans:"squeezing",   rule:"blue",  why:"Drop silent -e (the -ee stays, only final -e drops)"},
  ],
};

const RC_LIGHT={
  red:  {idle:"#FFECEC",stroke:"#FF6B6B",active:"#FFCECE"},
  blue: {idle:"#E4F0FF",stroke:"#4A90D9",active:"#C2DCFF"},
  green:{idle:"#E2FAF0",stroke:"#3DBE7A",active:"#B8F0D6"},
};
const RC_DARK={
  red:  {idle:"#5c2a2a",stroke:"#FF6B6B",active:"#803030"},
  blue: {idle:"#1e3a5f",stroke:"#4A90D9",active:"#2a4f7a"},
  green:{idle:"#1e4a35",stroke:"#3DBE7A",active:"#2a5f45"},
};
const NEU_LIGHT={fill:"#F5F2EE",stroke:"#D5CCBF"};
const NEU_DARK={fill:"#2a2a4e",stroke:"#444470"};

function getRC(){ return document.documentElement.getAttribute("data-theme")==="dark"?RC_DARK:RC_LIGHT; }
function getNEU(){ return document.documentElement.getAttribute("data-theme")==="dark"?NEU_DARK:NEU_LIGHT; }
// Keep RC/NEU as getters for compatibility
let RC=getRC(), NEU=getNEU();

let mode="study", level="beginner", st={}, words=[];
let streak=0, timerInterval=null, timeLeft=60;

/* ══ STORAGE ══ */
const STORE_KEY="learnhub_ing_v2";
function loadStore(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY))||{}; }catch(e){ return {}; }
}
function saveStore(data){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

function getStats(){
  const s=loadStore();
  return {
    best: s.best||null,
    played: s.played||0,
    history: s.history||[],
    failedWords: s.failedWords||{},
    theme: s.theme||"light",
  };
}
function recordScore(pct){
  const s=loadStore();
  s.played=(s.played||0)+1;
  if(!s.best||pct>s.best) s.best=pct;
  if(!s.history) s.history=[];
  s.history.unshift({date:new Date().toLocaleDateString(),pct,level,mode:mode==="timed"?"timed":"challenge"});
  if(s.history.length>10) s.history=s.history.slice(0,10);
  saveStore(s);
  renderStats();
}
function recordFail(verb){
  const s=loadStore();
  if(!s.failedWords) s.failedWords={};
  s.failedWords[verb]=(s.failedWords[verb]||0)+1;
  saveStore(s);
}
function renderStats(){
  const s=getStats();
  document.getElementById("bestScore").textContent=s.best!==null?s.best+"%":"—";
  document.getElementById("timesPlayed").textContent=s.played;
  // Header badge — show last score
  const badge=document.getElementById("headerBadge");
  if(s.best!==null){
    badge.style.display="flex";
    document.getElementById("headerLastScore").textContent=s.best+"%";
  }
  // History in sidebar
  const list=document.getElementById("historyList");
  if(s.history&&s.history.length>0){
    list.innerHTML=s.history.slice(0,5).map(h=>{
      const cls=h.pct===100?"great":h.pct>=60?"ok":"try";
      return `<div class="history-entry"><span class="date">${h.date} (${h.level||"—"})</span><span class="pct ${cls}">${h.pct}%</span></div>`;
    }).join("");
  } else {
    list.innerHTML='<div style="color:var(--muted);padding:4px 0;font-size:.7rem;">No games yet</div>';
  }
}

/* ══ THEME ══ */
function toggleTheme(){
  const s=loadStore();
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";
  if(isDark){
    document.documentElement.removeAttribute("data-theme");
    document.getElementById("themeToggle").innerHTML='<span class="menu-item-icon">🌙</span> Dark mode';
    s.theme="light";
  } else {
    document.documentElement.setAttribute("data-theme","dark");
    document.getElementById("themeToggle").innerHTML='<span class="menu-item-icon">☀️</span> Light mode';
    s.theme="dark";
  }
  saveStore(s);
  RC=getRC(); NEU=getNEU();
  build();
}
function applyTheme(){
  const s=getStats();
  if(s.theme==="dark"){
    document.documentElement.setAttribute("data-theme","dark");
    document.getElementById("themeToggle").innerHTML='<span class="menu-item-icon">☀️</span> Light mode';
    RC=getRC(); NEU=getNEU();
  }
}

/* ══ MENU ══ */
function toggleMenu(){
  const panel=document.getElementById("menuPanel");
  const overlay=document.getElementById("menuOverlay");
  panel.classList.add("show");
  overlay.classList.add("show");
}
function closeMenu(){
  document.getElementById("menuPanel").classList.remove("show");
  document.getElementById("menuOverlay").classList.remove("show");
}
function updateMenuChips(){
  const levels=["beginner","intermediate","exceptions","god"];
  levels.forEach(l=>{
    const el=document.getElementById("ml-"+l);
    if(el) el.classList.toggle("active",l===level);
  });
}

/* ══ AUDIO ══ */
function speak(text){
  if(!("speechSynthesis" in window)) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=0.85;
  speechSynthesis.speak(u);
}

/* ══ HAPTIC ══ */
function vibrate(ms){
  if(navigator.vibrate) navigator.vibrate(ms);
}

/* ══ SHUFFLE (spaced repetition aware) ══ */
function shuffle(arr){
  const s=loadStore();
  const fails=s.failedWords||{};
  // Weight by failures
  const weighted=[...arr].sort((a,b)=>(fails[b.verb]||0)-(fails[a.verb]||0));
  // Then shuffle within same-weight groups
  for(let i=weighted.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    if((fails[weighted[i].verb]||0)===(fails[weighted[j].verb]||0)){
      [weighted[i],weighted[j]]=[weighted[j],weighted[i]];
    }
  }
  return weighted;
}

/* ══ LEVEL ══ */
function setLevel(l){
  level=l;
  updateMenuChips();
  closeMenu();
  build();
}

/* ══ BUILD ══ */
function build(){
  stopTimer();
  words=shuffle(LEVELS[level]);
  const g=document.getElementById("grid");
  g.innerHTML=""; st={}; streak=0;
  updateStreak();

  words.forEach((w,i)=>{
    st[i]={done:false,spelledOk:false,colorPicked:null,locked:false,attempts:0};
    const c=document.createElement("div");
    c.className="hcard";
    const isC=(mode==="challenge"||mode==="timed");
    const fill=isC?NEU.fill:RC[w.rule].idle;
    const stroke=isC?NEU.stroke:RC[w.rule].stroke;
    c.innerHTML=`
      <button class="hbtn rule-${w.rule}${isC?" chal":""}" id="hb${i}" onclick="heartClick(${i})" aria-label="${w.verb}">
        <svg class="hsvg" viewBox="0 0 100 90">
          <path class="hpath" id="hp${i}"
            d="M50 85C50 85 5 52 5 27C5 13 16 4 28 4C37 4 46 10 50 18C54 10 63 4 72 4C84 4 95 13 95 27C95 52 50 85 50 85Z"
            fill="${fill}" stroke="${stroke}" stroke-width="3.5"/>
        </svg>
        <div class="hinner">
          <span class="verb">${w.verb}</span>
          <span class="ans" id="at${i}">${w.ans}</span>
        </div>
      </button>
      <button class="audio-btn" onclick="speak('${w.verb}, ${w.ans}')" aria-label="Listen to ${w.verb}">🔊</button>
      <span class="explanation" id="ex${i}">${w.why}</span>
      <div class="cinput-wrap${isC?" show":""}" id="cw${i}">
        <input class="cinput" id="ci${i}" type="text" placeholder="…ing"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          aria-label="Type the -ing form of ${w.verb}"
          oninput="onType(${i})" onkeydown="if(event.key==='Enter'){event.preventDefault();trySpell(${i})}">
        <span class="cfeedback" id="cf${i}" role="alert" aria-live="polite"></span>
        <span class="chint" id="ch${i}"></span>
      </div>
      <div class="cpicker" id="cp${i}" role="group" aria-label="Pick the rule color for ${w.verb}">
        <div class="cpicker-row">
          <button class="cb r" onclick="pickColor(${i},'red')" aria-label="Red: just add -ing"></button>
          <button class="cb b" onclick="pickColor(${i},'blue')" aria-label="Blue: drop e + -ing"></button>
          <button class="cb g" onclick="pickColor(${i},'green')" aria-label="Green: double last + -ing"></button>
        </div>
        <span class="cresult" id="cr${i}"></span>
      </div>`;
    g.appendChild(c);
  });

  renderButtons();
  updateProgress();
  document.getElementById("score").style.display="none";

  if(mode==="timed") startTimer();
}

/* ══ MODE ══ */
function setMode(m){
  mode=m;
  document.querySelector(".mode-btn.study").classList.toggle("active",m==="study");
  document.querySelector(".mode-btn.challenge").classList.toggle("active",m==="challenge");
  document.querySelector(".mode-btn.timed").classList.toggle("active",m==="timed");
  document.getElementById("timerBar").classList.toggle("show",m==="timed");
  build();
}

/* ══ TIMER ══ */
function startTimer(){
  timeLeft=60;
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=10){
      document.getElementById("timerDisplay").classList.add("warn");
    }
    if(timeLeft<=0){
      stopTimer();
      checkAll();
    }
  },1000);
}
function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById("timerDisplay").classList.remove("warn");
}
function updateTimerDisplay(){
  const m=Math.floor(timeLeft/60);
  const s=timeLeft%60;
  document.getElementById("timerDisplay").textContent=`${m}:${s.toString().padStart(2,"0")}`;
}

/* ══ STREAK ══ */
function updateStreak(){
  const bar=document.getElementById("streakBar");
  if(streak>=2){
    bar.classList.add("show");
    document.getElementById("streakText").textContent=`${streak} in a row!`;
  } else {
    bar.classList.remove("show");
  }
}

/* ══ STUDY: tap heart ══ */
function heartClick(i){
  if(mode==="challenge"||mode==="timed"){ focusInput(i); return; }
  const hb=document.getElementById(`hb${i}`);
  const hp=document.getElementById(`hp${i}`);
  if(hb.classList.contains("done")) return;
  hb.classList.add("done","boing");
  hp.setAttribute("fill",RC[words[i].rule].active);
  hp.setAttribute("stroke",RC[words[i].rule].stroke);
  setTimeout(()=>hb.classList.remove("boing"),400);
  st[i].done=true;
  speak(words[i].ans);
  vibrate(30);
  updateProgress();
}
function revealAll(){ words.forEach((_,i)=>{ if(!st[i].done) heartClick(i); }); }

/* ══ CHALLENGE: focus ══ */
function focusInput(i){
  const ci=document.getElementById(`ci${i}`);
  if(ci&&!ci.disabled) ci.focus();
}

/* ══ AUTO-ADVANCE ══ */
function advanceToNext(i){
  for(let n=i+1;n<words.length;n++){
    if(!st[n].spelledOk){
      setTimeout(()=>{
        const next=document.getElementById(`ci${n}`);
        if(next&&!next.disabled){
          next.focus();
          next.scrollIntoView({behavior:"smooth",block:"center"});
        }
      },300);
      return;
    }
  }
}

/* ══ CHALLENGE: typing ══ */
function onType(i){
  const ci=document.getElementById(`ci${i}`);
  ci.classList.remove("wrong");
  document.getElementById(`cf${i}`).textContent="";
  document.getElementById(`ch${i}`).textContent="";
}

function getHint(ans, attempts){
  const reveal=Math.min(attempts, ans.length-1);
  return ans.slice(0,reveal)+"…";
}

function trySpell(i){
  if(st[i].spelledOk) return;
  const ci=document.getElementById(`ci${i}`);
  const val=ci.value.trim().toLowerCase();
  ci.classList.remove("ok","wrong");
  void ci.offsetWidth;
  if(val===words[i].ans){
    ci.classList.add("ok"); ci.disabled=true;
    document.getElementById(`cf${i}`).textContent="✅";
    document.getElementById(`ch${i}`).textContent="";
    st[i].spelledOk=true;
    streak++;
    updateStreak();
    vibrate(30);
    const cp=document.getElementById(`cp${i}`);
    cp.classList.add("show","boing");
    const hb=document.getElementById(`hb${i}`);
    hb.classList.add("boing");
    setTimeout(()=>hb.classList.remove("boing"),400);
    speak(words[i].ans);
    updateProgress();
    advanceToNext(i);
  } else {
    ci.classList.add("wrong");
    st[i].attempts++;
    streak=0;
    updateStreak();
    vibrate([50,30,50]);
    recordFail(words[i].verb);
    if(st[i].attempts>=1){
      document.getElementById(`ch${i}`).textContent=`Hint: ${getHint(words[i].ans, st[i].attempts)}`;
    }
    const hb=document.getElementById(`hb${i}`);
    hb.style.animation="none"; void hb.offsetWidth;
    hb.style.animation="";
    ci.select();
  }
}

/* ══ COLOR PICK ══ */
function pickColor(i,color){
  if(!st[i].spelledOk||st[i].locked) return;
  st[i].colorPicked=color;
  const map={r:"red",b:"blue",g:"green"};
  document.querySelectorAll(`#cp${i} .cb`).forEach(btn=>{
    btn.classList.remove("picked");
    if(map[btn.classList[1]]===color) btn.classList.add("picked");
  });
  const hp=document.getElementById(`hp${i}`);
  hp.setAttribute("fill",RC[color].active);
  hp.setAttribute("stroke",RC[color].stroke);
  const hb=document.getElementById(`hb${i}`);
  hb.classList.remove("boing"); void hb.offsetWidth;
  hb.classList.add("boing");
  setTimeout(()=>hb.classList.remove("boing"),400);
  vibrate(20);
  updateProgress();
}

/* ══ CHECK ALL ══ */
function checkAll(){
  stopTimer();
  let spell=0,clr=0;
  words.forEach((w,i)=>{
    if(st[i].locked){spell++;clr++;return;}
    const ci=document.getElementById(`ci${i}`);
    const cf=document.getElementById(`cf${i}`);
    const ch=document.getElementById(`ch${i}`);
    const hp=document.getElementById(`hp${i}`);
    const cp=document.getElementById(`cp${i}`);
    const cr=document.getElementById(`cr${i}`);
    if(!st[i].spelledOk){
      const val=ci.value.trim().toLowerCase();
      if(val===w.ans){
        ci.classList.add("ok"); ci.disabled=true;
        cf.textContent="✅"; ch.textContent="";
        st[i].spelledOk=true;
        cp.classList.add("show");
      } else {
        ci.classList.add("wrong"); ci.disabled=true;
        cf.textContent="❌"; ch.textContent=`→ ${w.ans}`;
        recordFail(w.verb);
      }
    }
    if(st[i].spelledOk) spell++;
    const picked=st[i].colorPicked;
    const colorOk=picked===w.rule;
    const map={r:"red",b:"blue",g:"green"};
    cp.querySelectorAll(".cb").forEach(btn=>{
      const bc=map[btn.classList[1]];
      btn.disabled=true;
      btn.classList.remove("picked","correct-c","wrong-c");
      if(bc===w.rule) btn.classList.add("correct-c");
      if(bc===picked&&!colorOk) btn.classList.add("wrong-c");
    });
    if(picked) cr.textContent=colorOk?"✅ Correct!":`❌ → ${w.rule.toUpperCase()}`;
    else if(st[i].spelledOk) cr.textContent=`→ ${w.rule.toUpperCase()}`;
    if(colorOk) clr++;
    hp.setAttribute("fill",RC[w.rule].active);
    hp.setAttribute("stroke",RC[w.rule].stroke);
    st[i].locked=st[i].done=true;
  });
  updateProgress();
  renderButtons(true);

  const total=words.length;
  const pct=Math.round(((spell+clr)/(total*2))*100);
  const stars=pct===100?3:pct>=60?2:1;

  recordScore(pct);
  setTimeout(()=>showStars(stars,spell,clr,total,pct),400);
}

/* ══ STARS + CONFETTI ══ */
function showStars(stars,spell,clr,total,pct){
  const overlay=document.getElementById("starsOverlay");
  const title=document.getElementById("starsTitle");
  const sub=document.getElementById("starsSub");
  overlay.classList.add("show");
  [1,2,3].forEach(n=>{
    setTimeout(()=>{
      if(n<=stars) document.getElementById(`star${n}`).classList.add("lit");
    }, n*350);
  });
  if(stars===3){
    title.textContent="🏆 Perfect score!";
    sub.textContent=`${spell}/${total} spellings + ${clr}/${total} colours`;
    setTimeout(launchConfetti, 400);
    vibrate([100,50,100,50,200]);
  } else if(stars===2){
    title.textContent="⭐ Great job!";
    sub.textContent=`${spell}/${total} spellings · ${clr}/${total} colours (${pct}%)`;
    vibrate([50,30,50]);
  } else {
    title.textContent="💪 Keep practising!";
    sub.textContent=`${spell}/${total} spellings · ${clr}/${total} colours — you can do better!`;
  }
}
function closeStars(){
  document.getElementById("starsOverlay").classList.remove("show");
  [1,2,3].forEach(n=>document.getElementById(`star${n}`).classList.remove("lit"));
  stopConfetti();
}

/* ══ CONFETTI ══ */
const canvas=document.getElementById("confetti-canvas");
const ctx=canvas.getContext("2d");
let particles=[],animId=null;
const COLORS=["#FF6B6B","#4A90D9","#3DBE7A","#FF9F6B","#F7C948","#C97FE8"];

function launchConfetti(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  particles=Array.from({length:140},()=>({
    x:Math.random()*canvas.width,
    y:-10-Math.random()*canvas.height*.3,
    r:Math.random()*7+3,
    d:Math.random()*2+1,
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    tilt:Math.random()*10-5,
    tiltV:Math.random()*.2-.1,
    shape:Math.random()>.5?"circle":"rect",
  }));
  if(animId) cancelAnimationFrame(animId);
  drawConfetti();
}
function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.tilt*Math.PI/180);
    ctx.fillStyle=p.color;
    if(p.shape==="circle"){
      ctx.beginPath();ctx.arc(0,0,p.r,0,2*Math.PI);ctx.fill();
    } else {
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.4);
    }
    ctx.restore();
    p.y+=p.d+1.5;
    p.tilt+=p.tiltV;
    p.x+=Math.sin(p.y*.02)*1.2;
  });
  particles=particles.filter(p=>p.y<canvas.height+20);
  if(particles.length>0) animId=requestAnimationFrame(drawConfetti);
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}
function stopConfetti(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=[];
}

/* ══ PROGRESS ══ */
function updateProgress(){
  const done=mode==="study"
    ?Object.values(st).filter(x=>x.done).length
    :Object.values(st).filter(x=>x.spelledOk&&x.colorPicked!==null).length;
  const pct=Math.round(done/words.length*100);
  document.getElementById("progTxt").textContent=`${done} / ${words.length}`;
  document.getElementById("progPct").textContent=`${pct}%`;
  document.getElementById("progFill").style.width=pct+"%";
}

/* ══ BUTTONS ══ */
function renderButtons(checked=false){
  const row=document.getElementById("btnRow");
  row.innerHTML="";
  if(mode==="study"){
    row.innerHTML=`
      <button class="btn btn-blue"  onclick="revealAll()">✨ Show All</button>
      <button class="btn btn-ghost" onclick="build()">🔄 Reset</button>`;
  } else if(!checked){
    row.innerHTML=`
      <button class="btn btn-green" onclick="checkAll()">✅ Check Answers</button>
      <button class="btn btn-ghost" onclick="build()">🔄 Reset</button>`;
  } else {
    row.innerHTML=`
      <button class="btn btn-red"   onclick="setMode(mode)">🔄 Try Again</button>
      <button class="btn btn-ghost" onclick="setMode('study')">📖 Study</button>`;
  }
}

/* ══ INIT ══ */
applyTheme();
renderStats();
build();
</script>
